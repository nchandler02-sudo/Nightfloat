<script>
function parseMD(text,filename){
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  if(text.trim().startsWith('<!'))return{id:filename.replace(/\.md$/,''),title:filename.replace(/\.md$/,'').replace(/-/g,' '),tags:[],sections:{},quizzes:[],micros:[],refs:[]};
  var lines=text.split('\n'),id=filename.replace(/\.md$/,''),title=id.replace(/-/g,' '),tags=[],i,line;
  var inFM=false,fmEnd=0;
  for(i=0;i<lines.length;i++){line=lines[i].trim();if(i===0&&line==='---'){inFM=true;continue;}if(inFM&&line==='---'){fmEnd=i+1;break;}if(inFM){if(line.indexOf('title:')===0)title=line.substring(6).trim().replace(/^["']|["']$/g,'');if(line.indexOf('tags:')===0){var tm=line.match(/\[([^\]]*)\]/);if(tm)tags=tm[1].split(',').map(function(t){return t.trim();});}}}
  for(i=fmEnd;i<lines.length;i++){if(lines[i].trim().indexOf('# ')===0&&lines[i].trim().indexOf('## ')!==0){title=lines[i].trim().substring(2).trim();break;}}
  var secList=[],cur=null;
  for(i=fmEnd;i<lines.length;i++){line=lines[i];if(line.trim().indexOf('## ')===0){if(cur)secList.push(cur);cur={heading:line.trim().substring(3).trim(),lines:[]};}else if(cur){cur.lines.push(line);}}
  if(cur)secList.push(cur);
  var sections={},quizzes=[],micros=[],refs=[],qIdx=0;
  for(var s=0;s<secList.length;s++){
    var sec=secList[s],h=sec.heading.toLowerCase();
    if(/abim|quiz.*case|style.*case|pitfall/i.test(h)){var q=parseQuiz(sec.lines,id,qIdx);if(q){quizzes.push(q);qIdx++;}}
    else if(/check.*micro|check.*yourself|micro.*question/i.test(h)){micros=parseMicro(sec.lines,id);}
    else if(/reference|guideline.*ref/i.test(h)){refs=parseRefs(sec.lines);}
    else{var key='other';if(/panic/i.test(h))key='panic_card';else if(/brief.*overview|overview/i.test(h))key='brief_overview';else if(/icu|consult.*trigger/i.test(h))key='icu_consult_triggers';else if(/order/i.test(h))key='orders_to_place_now';else if(/cdi/i.test(h))key='cdi';sections[key]=parseBullets(sec.lines);}
  }
  return{id:id,title:title,tags:tags,sections:sections,quizzes:quizzes,micros:micros,refs:refs};
}
function parseBullets(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)r.push(l.substring(2));else if(l.length>0&&r.length>0)r[r.length-1]+=' '+l;}return r;}
function parseRefs(lines){var r=[];for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(l.indexOf('- ')===0)l=l.substring(2);else continue;var parts=l.split(/ [—|] /);if(parts.length>=2){var um=parts[parts.length-1].match(/https?:\/\/[^\s)]+/);r.push({label:parts[0].trim(),url:um?um[0]:''});}else{var um2=l.match(/https?:\/\/[^\s)]+/);r.push({label:l.replace(/https?:\/\/[^\s)]+/,'').trim(),url:um2?um2[0]:''});}}return r;}
function parseMicro(lines,topicId){var r=[],idx=0;for(var i=0;i<lines.length;i++){var l=lines[i].trim(),qm=l.match(/^-?\s*Q:\s*(.+)/);if(qm){var q=qm[1],a='';var inlineA=q.match(/^(.+?)\s+A:\s*(.+)$/);if(inlineA){q=inlineA[1];a=inlineA[2];}else{for(var j=i+1;j<lines.length;j++){var am=lines[j].trim().match(/^A:\s*(.+)/);if(am){a=am[1];i=j;break;}if(lines[j].trim().match(/^-?\s*Q:/))break;}}r.push({id:topicId+'M'+idx,q:q,a:a});idx++;}}return r;}
function parseQuiz(lines,topicId,qIdx){var sub={},ck='';for(var i=0;i<lines.length;i++){var l=lines[i];if(l.trim().indexOf('### ')===0){ck=l.trim().substring(4).trim().toLowerCase();sub[ck]=[];}else if(ck){sub[ck].push(l);}}if(!sub['stem']&&!sub['options'])return null;var stem=(sub['stem']||[]).filter(function(l){return l.trim().length>0;}).join(' ');var options=[];var ol=sub['options']||[];for(var o=0;o<ol.length;o++){var om=ol[o].trim().match(/^([A-E])\.\s*(.+)/);if(om)options.push(om[0]);}var cl=((sub['correct answer']||sub['correct']||[])[0]||'').trim();var correct=cl.charAt(0);if(!/[A-E]/.test(correct))correct='A';var rat=(sub['rationale']||sub['rationale (2\u20134 sentences)']||sub['rationale (2-4 sentences)']||[]).filter(function(l){return l.trim().length>0;}).join(' ');return{id:topicId+'Q'+qIdx,stem:stem,options:options,correct:correct,rationale:rat};}

<script>
window.PRETEST_DATA={"assessmentType": "pretest", "totalQuestions": 20, "questions": [{"id": "pre-01", "questionNumber": 1, "topicSlug": "sepsis-recognition-early-management", "topicTitle": "Sepsis Recognition & Early Management", "stem": "A 67-year-old man with diabetes presents with fever 38.8°C, confusion, BP 82/50 mmHg after 1 L crystalloid, and lactate 4.2 mmol/L. Blood cultures are pending. Which vasopressor should be initiated first to target MAP ≥65 mmHg?", "options": ["A. Dopamine", "B. Phenylephrine", "C. Norepinephrine", "D. Vasopressin", "E. Dobutamine"], "correct": "C", "rationale": "Per Surviving Sepsis Campaign 2021, norepinephrine is the first-line vasopressor for septic shock with persistent hypotension despite fluids. Dopamine (A) is inferior due to arrhythmia risk. Vasopressin (D) is second-line as an adjunct. Phenylephrine (B) and dobutamine (E) are not first-line for septic shock."}, {"id": "pre-02", "questionNumber": 2, "topicSlug": "undifferentiated-hypotension-shock-module", "topicTitle": "Undifferentiated Hypotension / Shock", "stem": "A 44-year-old man presents with acute dyspnea and hypotension. Bedside POCUS shows a normal LV with good squeeze, a severely dilated RV with septal flattening, clear lungs, and a flat IVC. Which shock category is most likely?", "options": ["A. Hypovolemic shock from hemorrhage", "B. Cardiogenic shock from LV failure", "C. Obstructive shock from massive pulmonary embolism", "D. Distributive shock from sepsis", "E. Cardiogenic shock from cardiac tamponade"], "correct": "C", "rationale": "A severely dilated RV with septal flattening, normal LV function, and clear lungs is the classic POCUS pattern for massive PE causing obstructive shock. Cardiogenic shock from LV failure (B) would show poor LV squeeze. Tamponade (E) shows pericardial effusion with diastolic RV collapse. Sepsis (D) typically shows a hyperdynamic LV with flat IVC."}, {"id": "pre-03", "questionNumber": 3, "topicSlug": "code-rapid-response-and-acls-essentials", "topicTitle": "Code/Rapid Response & ACLS Essentials", "stem": "A 64-year-old man collapses on the ward. The monitor shows ventricular fibrillation. High-quality CPR is initiated and a biphasic defibrillator is available. What is the correct first intervention?", "options": ["A. Administer epinephrine 1 mg IV before defibrillation", "B. Give amiodarone 300 mg IV before any shocks", "C. Defibrillate at 200 J biphasic and immediately resume compressions", "D. Intubate first to ensure airway control", "E. Deliver a 120 J synchronized cardioversion"], "correct": "C", "rationale": "In VF/pVT, early defibrillation at approximately 200 J biphasic with immediate resumption of CPR is the priority. Epinephrine 1 mg IV is given after the second shock per AHA ACLS. Amiodarone is considered for refractory VF/pVT. Intubation should not delay defibrillation. Synchronized cardioversion is for organized tachyarrhythmias with a pulse, not VF."}, {"id": "pre-04", "questionNumber": 4, "topicSlug": "shortness-of-breath-copd-adhf", "topicTitle": "Shortness of Breath (COPD/ADHF)", "stem": "A 68-year-old man with severe COPD presents with somnolence and wheeze. ABG: pH 7.28, PaCO₂ 72 mmHg, PaO₂ 82 mmHg on a nonrebreather with SpO₂ 96%. Which oxygen saturation target is most appropriate?", "options": ["A. 98–100%", "B. 94–96%", "C. 88–92%", "D. 85–88%", "E. No specific target; maximize FiO₂"], "correct": "C", "rationale": "In COPD with hypercapnia, the target is SpO₂ 88–92% per BTS oxygen guidelines and GOLD. Over-oxygenation (A, B) worsens hypercapnia through suppression of hypoxic drive and V/Q mismatch changes. The nonrebreather delivering SpO₂ 96% is contributing to CO₂ narcosis and should be reduced."}, {"id": "pre-05", "questionNumber": 5, "topicSlug": "decompensated-heart-failure", "topicTitle": "Decompensated Heart Failure", "stem": "A 62-year-old with HFrEF on furosemide 40 mg PO daily presents with acute pulmonary edema, BP 190/110 mmHg, and SpO₂ 86%. What is the most appropriate initial IV furosemide dose?", "options": ["A. 20 mg IV (half the home dose)", "B. 40 mg IV (equivalent to home dose)", "C. 80–100 mg IV (2–2.5× the home oral daily dose as IV)", "D. 200 mg IV continuous infusion immediately", "E. No diuretic until echocardiography is obtained"], "correct": "C", "rationale": "AHA/ACC/HFSA 2022 guidelines recommend an initial IV loop diuretic dose of 1–2.5× the patient's total daily oral dose as the IV equivalent, then reassess diuresis within 2–6 hours. For this patient on 40 mg PO daily, 80–100 mg IV is appropriate. Underdosing (A, B) is a common pitfall leading to inadequate decongestion."}, {"id": "pre-06", "questionNumber": 6, "topicSlug": "chest-pain-acs-post-rosc", "topicTitle": "Chest Pain (ACS/Post-ROSC)", "stem": "A 62-year-old man with inferior STEMI has BP 92/58 mmHg, elevated JVP, and clear lungs. SpO₂ is 95% on room air. Which of the following should be avoided?", "options": ["A. Aspirin 325 mg chewed", "B. Emergent PCI activation", "C. Sublingual nitroglycerin", "D. IV isotonic fluid bolus 250–500 mL", "E. Continuous cardiac monitoring"], "correct": "C", "rationale": "Inferior STEMI with hypotension, clear lungs, and elevated JVP suggests RV involvement. Nitrates reduce preload and can precipitate cardiogenic shock in RV infarction. The correct approach is IV fluid challenge and emergent reperfusion. Aspirin, PCI activation, and monitoring are all appropriate."}, {"id": "pre-07", "questionNumber": 7, "topicSlug": "arrhythmias-you-cant-miss", "topicTitle": "Arrhythmias You Can't Miss", "stem": "A 55-year-old woman on sotalol presents with syncope. ECG shows polymorphic VT with QTc 530 ms. She is awake with BP 92/56 mmHg. What is the most appropriate initial treatment?", "options": ["A. Amiodarone 150 mg IV over 10 minutes", "B. Magnesium sulfate 2 g IV over 10–15 minutes", "C. Diltiazem IV bolus", "D. Lidocaine IV bolus", "E. Immediate thrombolysis"], "correct": "B", "rationale": "Torsades de pointes (polymorphic VT with prolonged QT) is treated with magnesium sulfate 2 g IV, electrolyte optimization (K⁺ 4.0–4.5 mmol/L), removal of QT-prolonging drugs (sotalol), and overdrive pacing if recurrent. Amiodarone (A) can further prolong QT and worsen torsades — this is a critical pitfall."}, {"id": "pre-08", "questionNumber": 8, "topicSlug": "hypertensive-emergency-vs-urgency", "topicTitle": "Hypertensive Emergency vs Urgency", "stem": "A 62-year-old presents with sudden tearing chest pain, BP 208/118 mmHg, HR 112, and asymmetric arm blood pressures. You suspect aortic dissection. What is the correct initial pharmacologic sequence?", "options": ["A. IV nicardipine alone to target SBP <120 mmHg", "B. IV esmolol first, then add nicardipine to reach SBP <120 mmHg and HR 60–80", "C. Sublingual nifedipine for rapid BP reduction", "D. IV hydralazine to normalize blood pressure", "E. IV nitroprusside alone"], "correct": "B", "rationale": "In suspected aortic dissection, beta-blockade must come first to reduce aortic shear stress (HR 60–80), then a vasodilator is added to achieve SBP <120 mmHg. Pure vasodilation without rate control (A, C, D, E) increases shear and can worsen dissection propagation."}, {"id": "pre-09", "questionNumber": 9, "topicSlug": "neurologic-emergencies-status-epilepticus-and-stroke", "topicTitle": "Neurologic Emergencies (SE & Stroke)", "stem": "A 68-year-old with aphasia and right hemiparesis presents 90 minutes after last known well. BP is 198/112 mmHg. NCCT shows no hemorrhage. What must be done before IV alteplase is administered?", "options": ["A. Obtain CTA and CT perfusion imaging", "B. Lower BP to <185/110 mmHg", "C. Start aspirin 325 mg", "D. Complete MRI brain", "E. Achieve BP <140/90 mmHg"], "correct": "B", "rationale": "Before IV thrombolysis, BP must be lowered to <185/110 mmHg and maintained <180/105 mmHg for 24 hours post-bolus per AHA/ASA guidelines. CTA/perfusion is not required before starting IVT when NCCT excludes hemorrhage. Aspirin is contraindicated concurrently with thrombolysis. The target is not as low as 140/90."}, {"id": "pre-10", "questionNumber": 10, "topicSlug": "altered-mental-status", "topicTitle": "Altered Mental Status", "stem": "A 62-year-old with epilepsy has tonic-clonic seizures lasting 6 minutes. Glucose is 6.0 mmol/L. He has received no medications. What is the correct first-line treatment?", "options": ["A. IV phenytoin 20 mg/kg loading dose", "B. IV levetiracetam 60 mg/kg", "C. IV lorazepam 2 mg, repeated as needed", "D. IV propofol infusion", "E. IV dextrose 25 g"], "correct": "C", "rationale": "Convulsive status epilepticus requires immediate benzodiazepines as first-line per AES guidelines — lorazepam 0.1 mg/kg IV (max 4 mg) or midazolam 10 mg IM. Second-line agents (levetiracetam, fosphenytoin, valproate) follow if seizures persist. Propofol is for refractory SE. Glucose is normal, so dextrose is not indicated."}, {"id": "pre-11", "questionNumber": 11, "topicSlug": "alcohol-withdrawal-and-agitation", "topicTitle": "Alcohol Withdrawal & Agitation", "stem": "A 58-year-old with decompensated cirrhosis (ascites, INR 1.8) presents 16 hours after last drink with agitation, tremor, and CIWA-Ar 20. Which benzodiazepine is preferred?", "options": ["A. Diazepam 10 mg IV", "B. Chlordiazepoxide 100 mg PO", "C. Lorazepam 2–4 mg IV", "D. Midazolam 5 mg IV", "E. Alprazolam 2 mg PO"], "correct": "C", "rationale": "In decompensated liver disease, lorazepam is preferred because it undergoes glucuronidation without active metabolites, unlike diazepam and chlordiazepoxide which rely on hepatic oxidative metabolism and accumulate in cirrhosis. This is a key pharmacologic distinction per ASAM 2020 guidance."}, {"id": "pre-12", "questionNumber": 12, "topicSlug": "electrolyte-emergencies-hyperkalemia-hyponatremia", "topicTitle": "Electrolyte Emergencies (Hyperkalemia/Hyponatremia)", "stem": "A 72-year-old with CKD4 presents with weakness. ECG shows peaked T waves and QRS widening. K⁺ is 6.9 mmol/L. What is the most appropriate first medication?", "options": ["A. Regular insulin 10 units IV with 25 g dextrose", "B. Calcium gluconate 10% 1 g IV over 5–10 minutes", "C. Sodium polystyrene sulfonate 30 g PO", "D. Furosemide 40 mg IV", "E. Sodium bicarbonate 1 ampule IV"], "correct": "B", "rationale": "With ECG changes in severe hyperkalemia, IV calcium immediately stabilizes the myocardium and must be given first. Insulin/dextrose shifts potassium intracellularly but does not protect the heart. Polystyrene sulfonate and furosemide remove potassium but are too slow for acute membrane stabilization. The sequence is: stabilize → shift → remove."}, {"id": "pre-13", "questionNumber": 13, "topicSlug": "endocrine-crises", "topicTitle": "Endocrine Crises", "stem": "A 50-year-old on chronic prednisone (recently stopped) presents with hypotension refractory to fluids, nausea, and confusion. Cortisol level is pending. What is the best immediate action?", "options": ["A. Wait for cortisol results before treating", "B. Give hydrocortisone 100 mg IV now", "C. Start dexamethasone 4 mg IV for cerebral edema", "D. Begin fludrocortisone 0.1 mg PO", "E. Administer ACTH stimulation test before any steroids"], "correct": "B", "rationale": "Suspected adrenal crisis warrants immediate hydrocortisone 100 mg IV, then 200 mg/24h (continuous or 50 mg q6h). Treatment should never be delayed for lab confirmation per Endocrine Society guidelines. Dexamethasone does not provide adequate mineralocorticoid activity for acute crisis. Fludrocortisone is for chronic replacement, not acute crisis."}, {"id": "pre-14", "questionNumber": 14, "topicSlug": "fever-and-empiric-antibiotics", "topicTitle": "Fever & Empiric Antibiotics", "stem": "A 72-year-old with a chronic Foley catheter presents with fever, confusion, BP 88/54 mmHg, and lactate 4.2 mmol/L. WBC is 17 ×10⁹/L. What is the maximum acceptable time to administer broad-spectrum antibiotics?", "options": ["A. Within 30 minutes", "B. Within 1 hour", "C. Within 3 hours", "D. Within 6 hours", "E. After CT imaging confirms the source"], "correct": "B", "rationale": "Surviving Sepsis Campaign recommends antibiotics within 1 hour of septic shock recognition. Each hour of delay increases mortality. Cultures should be obtained first only if this does not delay therapy. Imaging should not delay antibiotics in shock."}, {"id": "pre-15", "questionNumber": 15, "topicSlug": "community-acquired-pneumonia", "topicTitle": "Community-Acquired Pneumonia", "stem": "A 67-year-old with COPD is admitted with CAP (fever, productive cough, RLL consolidation). He is stable on the ward with no MRSA/Pseudomonas risk factors. ECG shows QTc 510 ms. Which empiric regimen is most appropriate?", "options": ["A. Levofloxacin monotherapy", "B. Ceftriaxone plus azithromycin", "C. Ceftriaxone plus doxycycline", "D. Piperacillin-tazobactam plus vancomycin", "E. Azithromycin monotherapy"], "correct": "C", "rationale": "For non-severe inpatient CAP without MRSA/Pseudomonas risks, ATS/IDSA 2019 recommends β-lactam + macrolide or respiratory FQ. With QTc 510 ms, both macrolides and fluoroquinolones are contraindicated due to QT prolongation risk. β-lactam + doxycycline is the guideline-supported alternative in this scenario."}, {"id": "pre-16", "questionNumber": 16, "topicSlug": "gi-bleeding", "topicTitle": "GI Bleeding", "stem": "A 58-year-old with melena and orthostasis is admitted. Hb is 7.2 g/dL. He is hemodynamically stable after fluids. What prokinetic agent should be given before EGD to improve visualization?", "options": ["A. Metoclopramide 10 mg IV", "B. Erythromycin 250 mg IV", "C. Ondansetron 4 mg IV", "D. Pantoprazole 80 mg IV bolus", "E. Octreotide 50 mcg IV bolus"], "correct": "B", "rationale": "ACG UGIB guidance recommends erythromycin 250 mg IV given 20–90 minutes before EGD to improve gastric visualization and reduce the need for repeat endoscopy. Metoclopramide is not the recommended prokinetic for this indication. PPI and octreotide serve different purposes and do not clear the stomach."}, {"id": "pre-17", "questionNumber": 17, "topicSlug": "anaphylaxis", "topicTitle": "Anaphylaxis", "stem": "A 58-year-old inpatient develops generalized urticaria, hoarseness, wheeze, and BP 82 mmHg five minutes after starting IV cefazolin. What is the correct first-line treatment?", "options": ["A. IV diphenhydramine 50 mg", "B. IV methylprednisolone 125 mg", "C. IM epinephrine 0.3–0.5 mg to the lateral thigh", "D. IV norepinephrine infusion", "E. Nebulized albuterol"], "correct": "C", "rationale": "IM epinephrine 0.3–0.5 mg (1 mg/mL) to the lateral thigh is the first-line, time-critical treatment for anaphylaxis per all major guidelines (AAAAI/ACAAI, WAO, EAACI, RCUK). Antihistamines and steroids are adjuncts that must not delay epinephrine. IV pressors may follow if refractory after IM epinephrine and fluids."}, {"id": "pre-18", "questionNumber": 18, "topicSlug": "toxidromes-overdose-and-arrest-in-poisoning", "topicTitle": "Toxidromes, Overdose & Arrest in Poisoning", "stem": "A 32-year-old with agitated delirium, dry flushed skin, mydriasis, and urinary retention has ECG showing QRS 128 ms with tall R in aVR. What is the most important initial treatment?", "options": ["A. Physostigmine 1 mg IV", "B. Flumazenil 0.2 mg IV", "C. Sodium bicarbonate 1–2 mEq/kg IV bolus", "D. Haloperidol 10 mg IM", "E. Activated charcoal 50 g PO"], "correct": "C", "rationale": "QRS ≥100 ms with tall R in aVR indicates sodium-channel blockade (TCA or diphenhydramine). Sodium bicarbonate boluses targeting pH 7.50–7.55 and QRS narrowing is the priority. Physostigmine is contraindicated with QRS ≥100 ms due to risk of bradyasystole. Flumazenil risks seizures in mixed overdose. Antipsychotics can worsen cardiotoxicity."}, {"id": "pre-19", "questionNumber": 19, "topicSlug": "vte-pe-practicalities", "topicTitle": "VTE/PE Practicalities", "stem": "A 67-year-old with extensive bilateral PE is hypotensive (BP 78/48 mmHg) with RV:LV ratio 1.2 on CTPA and elevated troponin. He has no recent surgery or intracranial disease. UFH was started 20 minutes ago. What is the next best step?", "options": ["A. Continue UFH alone and observe", "B. Systemic thrombolysis with alteplase 100 mg IV over 2 hours", "C. Place an IVC filter", "D. Start a DOAC and stop UFH", "E. Catheter-directed therapy as universal first-line"], "correct": "B", "rationale": "High-risk (massive) PE with hypotension and RV dysfunction warrants immediate systemic thrombolysis when no absolute contraindication exists. UFH alone is inadequate in shock. IVC filters are not reperfusion therapy. DOACs are not used in unstable patients. Catheter-directed therapy is reserved for contraindications to systemic lysis or lysis failure."}, {"id": "pre-20", "questionNumber": 20, "topicSlug": "transfusion-reactions-and-urgent-transfusion", "topicTitle": "Transfusion Reactions & Urgent Transfusion", "stem": "A 66-year-old man develops fever, back pain, and dark urine 20 minutes into his first RBC transfusion. BP is 86/52 mmHg. The transfusion is stopped. What is the most important next step?", "options": ["A. Give acetaminophen and restart the transfusion", "B. Administer IV furosemide and resume at slower rate", "C. Send transfusion reaction workup including DAT and start aggressive IV fluids", "D. Switch to O-negative RBCs and continue", "E. Give IV methylprednisolone and restart"], "correct": "C", "rationale": "Fever, back pain, hemoglobinuria, and hypotension during transfusion suggest acute hemolytic reaction. The transfusion must remain stopped, reaction workup (including DAT) sent to blood bank, and aggressive isotonic fluids given to maintain UOP ≥1 mL/kg/h. No transfusion should be resumed until evaluated. Antipyretics, steroids, or diuretics are inappropriate without excluding hemolysis."}]};
window.POSTTEST_DATA={"assessmentType": "posttest", "totalQuestions": 20, "questions": [{"id": "post-01", "questionNumber": 1, "topicSlug": "sepsis-recognition-early-management", "topicTitle": "Sepsis Recognition & Early Management", "stem": "A 78-year-old woman with HFrEF (EF 25%) presents with leukocytosis, fever, and hypotension (BP 84/50 mmHg). She is dyspneic with bilateral pulmonary edema. Lactate is 3.2 mmol/L. After 500 mL crystalloid with minimal improvement, what is the best next step?", "options": ["A. Continue aggressive 30 mL/kg fluid resuscitation", "B. Start norepinephrine to target MAP ≥65 mmHg", "C. Switch to dopamine as first-line vasopressor", "D. Delay vasopressors pending echocardiography", "E. Give albumin 25% as sole volume replacement"], "correct": "B", "rationale": "Severe HFrEF increases risk of pulmonary edema with aggressive fluids. Early norepinephrine is recommended when fluid responsiveness is low or volume overload is present. The pitfall is assuming all sepsis patients tolerate full 30 mL/kg boluses — individualize to cardiac reserve. Dopamine is inferior due to arrhythmia risk per SSC 2021."}, {"id": "post-02", "questionNumber": 2, "topicSlug": "undifferentiated-hypotension-shock-module", "topicTitle": "Undifferentiated Hypotension / Shock", "stem": "A 72-year-old woman with acute hypotension (BP 78/42) has POCUS showing a dilated LV with poor squeeze, plethoric IVC, and diffuse B-lines. Lactate is 5.1 mmol/L. Which vasopressor strategy and consultation are most appropriate?", "options": ["A. High-dose phenylephrine and pulmonology consult", "B. Norepinephrine plus emergent cardiology evaluation for cardiogenic shock", "C. Epinephrine bolus and thrombolytics for suspected PE", "D. Volume resuscitation with 3 L crystalloid before any vasopressor", "E. Dobutamine alone without vasopressor support"], "correct": "B", "rationale": "POCUS findings of dilated LV with poor squeeze, plethoric IVC, and B-lines point to cardiogenic shock. Norepinephrine supports MAP while cardiology evaluation guides inotrope/mechanical support decisions. Large fluid boluses (D) will worsen pulmonary edema. Epinephrine increases arrhythmia risk in cardiogenic shock. Dobutamine alone (E) may worsen hypotension without vasopressor support."}, {"id": "post-03", "questionNumber": 3, "topicSlug": "code-rapid-response-and-acls-essentials", "topicTitle": "Code/Rapid Response & ACLS Essentials", "stem": "A 72-year-old woman with ESRD on hemodialysis develops PEA during a rapid response. The prior ECG showed peaked T waves. CPR is ongoing. Which intervention sequence is most appropriate?", "options": ["A. Sodium bicarbonate first to correct acidosis", "B. Calcium chloride 1 g IV, then insulin 10 units IV with dextrose 25 g", "C. Intubate first to correct hypoxia, then reassess", "D. Start norepinephrine before addressing electrolytes", "E. Delay treatment until confirmatory labs return"], "correct": "B", "rationale": "In PEA arrest with prior peaked T waves in an ESRD patient, life-threatening hyperkalemia is the presumed cause. Membrane stabilization with IV calcium must precede intracellular shift therapy (insulin/dextrose). Delaying for labs or prioritizing intubation/vasopressors over the reversible cause (hyperkalemia) risks continued arrest. Bicarbonate is not first-line for hyperkalemia unless severe acidosis or TCA toxicity."}, {"id": "post-04", "questionNumber": 4, "topicSlug": "shortness-of-breath-copd-adhf", "topicTitle": "Shortness of Breath (COPD/ADHF)", "stem": "A 72-year-old woman with chronic HFrEF on furosemide 40 mg PO BID presents with sudden severe dyspnea, pink frothy sputum, BP 220/110 mmHg, and SpO₂ 86% after missing antihypertensives. JVP is elevated with diffuse rales. Which combined therapy is most appropriate?", "options": ["A. IV morphine and low-dose IV fluids", "B. BiPAP plus IV nitroglycerin infusion with rapid uptitration, plus IV loop diuretic", "C. Oxygen by nasal cannula only; avoid NIV", "D. IV beta-blocker first for tachycardia", "E. Hold all therapies until BNP results return"], "correct": "B", "rationale": "Hypertensive flash pulmonary edema requires early NIV plus rapidly titrated IV nitroglycerin for afterload/preload reduction alongside IV loop diuretic. The pitfall is under-treating by using diuretics alone and delaying vasodilator/NIV. Morphine is harmful per AHA/ACC/HFSA 2022. Beta-blockers in acute pulmonary edema with tachycardia risk hemodynamic collapse."}, {"id": "post-05", "questionNumber": 5, "topicSlug": "decompensated-heart-failure", "topicTitle": "Decompensated Heart Failure", "stem": "A 74-year-old with HFrEF (EF 25%) and CKD4 (baseline Cr 2.8) is admitted for volume overload. After furosemide 120 mg IV, urine output is 60 mL/h and creatinine rises from 2.8 to 3.4 mg/dL. He is comfortable, warm, and normotensive. What is the best next step?", "options": ["A. Stop diuretics and give 1 L normal saline for AKI", "B. Continue current dose and recheck BMP tomorrow", "C. Escalate loop dose or continuous infusion and add metolazone 2.5–5 mg PO", "D. Start ultrafiltration immediately", "E. Start dobutamine for renal perfusion"], "correct": "C", "rationale": "This is cardiorenal syndrome — the creatinine rise reflects congestion, not hypovolemia. The critical pitfall is withholding decongestion due to creatinine rise. AHA/ACC/HFSA 2022 recommends stepped pharmacologic diuresis (escalated loop ± thiazide synergy like metolazone) before ultrafiltration. Inotropes are not indicated without hypoperfusion signs. Fluids will worsen congestion."}, {"id": "post-06", "questionNumber": 6, "topicSlug": "chest-pain-acs-post-rosc", "topicTitle": "Chest Pain (ACS/Post-ROSC)", "stem": "A 58-year-old is resuscitated from out-of-hospital VF arrest. He is intubated, comatose, and hemodynamically stable on low-dose norepinephrine. ECG shows no ST-elevation. SpO₂ is 97% on FiO₂ 40%. Head CT is normal. What is the best management strategy?", "options": ["A. Immediate coronary angiography for all post-ROSC patients", "B. Increase FiO₂ to 100% to maximize oxygen delivery", "C. Initiate temperature control at 36°C, maintain SpO₂ 92–98%, and ICU with selective angiography", "D. Start routine morphine infusion for sedation", "E. Begin empiric fibrinolysis for presumed occult STEMI"], "correct": "C", "rationale": "In comatose post-ROSC patients without ST-elevation, guidelines support active temperature control (fever prevention, commonly 36°C), avoidance of hyperoxia (target SpO₂ 92–98%), and selective angiography only if recurrent ischemia or shock emerges. Routine immediate cath without ST-elevation has not shown benefit. Hyperoxia worsens neurologic outcomes."}, {"id": "post-07", "questionNumber": 7, "topicSlug": "arrhythmias-you-cant-miss", "topicTitle": "Arrhythmias You Can't Miss", "stem": "A 62-year-old with palpitations becomes hypotensive (BP 78/48 mmHg). The monitor shows an irregular wide-complex tachycardia at 180/min with delta waves visible during brief slower intervals. He is confused and diaphoretic. What is the correct immediate treatment?", "options": ["A. Adenosine rapid IV push", "B. Diltiazem IV bolus", "C. Synchronized cardioversion", "D. Metoprolol IV bolus", "E. Digoxin IV load"], "correct": "C", "rationale": "Irregular wide-complex tachycardia with delta waves indicates AF with pre-excitation (WPW). When unstable (hypotension, confusion), immediate synchronized cardioversion is required. All AV nodal blockers (adenosine, diltiazem, beta-blockers, digoxin) are contraindicated as they can accelerate conduction down the accessory pathway and precipitate VF."}, {"id": "post-08", "questionNumber": 8, "topicSlug": "hypertensive-emergency-vs-urgency", "topicTitle": "Hypertensive Emergency vs Urgency", "stem": "A 74-year-old with acute ischemic stroke (NIHSS 6, not eligible for thrombolysis or thrombectomy) has BP 210/112 mmHg. He is comfortable with no chest pain, dyspnea, or AKI. What is the appropriate BP management?", "options": ["A. IV nicardipine to lower SBP to <140 mmHg in the first hour", "B. IV labetalol to reduce SBP by 30% immediately", "C. Allow permissive hypertension; treat only if SBP ≥220 or DBP ≥120", "D. IV nitroprusside to normalize BP quickly", "E. Oral captopril to achieve SBP <130 mmHg tonight"], "correct": "C", "rationale": "In AIS patients not receiving reperfusion therapy, guidelines generally avoid BP treatment unless ≥220/120 mmHg. If treated, reduce only ~15% in 24 hours to preserve cerebral perfusion. The pitfall is aggressive BP normalization, which can extend the ischemic penumbra and worsen outcomes. Per AHA 2024, treat the patient and clinical context, not the number."}, {"id": "post-09", "questionNumber": 9, "topicSlug": "neurologic-emergencies-status-epilepticus-and-stroke", "topicTitle": "Neurologic Emergencies (SE & Stroke)", "stem": "A 72-year-old on apixaban (last dose 3 hours ago) for AF develops left MCA syndrome with NIHSS 16. BP is 172/98 mmHg. NCCT shows no hemorrhage. CTA reveals proximal left M1 occlusion. What is the best approach?", "options": ["A. Give IV alteplase because within 4.5 hours", "B. Give tenecteplase 0.25 mg/kg because easier to administer", "C. Proceed directly to mechanical thrombectomy; withhold IV thrombolysis", "D. Reverse apixaban with andexanet alfa, then give alteplase", "E. Start heparin infusion while awaiting intervention"], "correct": "C", "rationale": "Recent DOAC ingestion (within ~48 hours) is a contraindication to IV thrombolysis in most cases. This patient has an LVO amenable to EVT, so proceed directly to thrombectomy without IVT. Reversing apixaban solely to enable thrombolysis is not routine and adds delay. The critical pitfall is administering thrombolysis despite recent DOAC use, risking major hemorrhage."}, {"id": "post-10", "questionNumber": 10, "topicSlug": "altered-mental-status", "topicTitle": "Altered Mental Status", "stem": "A 74-year-old woman on apixaban (last dose 3 hours ago) develops acute right-sided weakness and aphasia 45 minutes after last known well. Glucose is 7.2 mmol/L. NCCT shows no hemorrhage. A colleague wants to give IV alteplase. What should you recommend?", "options": ["A. Proceed with IV alteplase immediately", "B. Withhold thrombolysis; urgently evaluate for mechanical thrombectomy", "C. Lower BP to <140/90 before deciding", "D. Give full-dose IV heparin infusion", "E. Delay all therapy pending MRI brain"], "correct": "B", "rationale": "Recent factor Xa inhibitor use makes IV thrombolysis contraindicated due to hemorrhagic risk. The correct approach is rapid LVO evaluation for endovascular therapy if eligible, with BP management per stroke protocols. The pitfall is missing the anticoagulant exposure history and proceeding with lysis. Always verify last anticoagulant dose before irreversible reperfusion decisions."}, {"id": "post-11", "questionNumber": 11, "topicSlug": "alcohol-withdrawal-and-agitation", "topicTitle": "Alcohol Withdrawal & Agitation", "stem": "A 52-year-old non-cirrhotic man with CIWA-Ar 21 has received diazepam 10 mg IV × 4 doses over 40 minutes with minimal improvement. He remains severely agitated with HR 130 and BP 178/96. The team considers starting dexmedetomidine as monotherapy. What is the correct response?", "options": ["A. Start dexmedetomidine as sole treatment — it prevents seizures", "B. Continue escalating benzodiazepines and consider phenobarbital load; dexmedetomidine is an adjunct only", "C. Switch entirely to haloperidol for agitation control", "D. Administer phenytoin for seizure prophylaxis", "E. Stop all sedatives and observe"], "correct": "B", "rationale": "Dexmedetomidine does NOT prevent seizures or DTs and must not be used as monotherapy for AWS — it is an adjunct for autonomic hyperactivity per ASAM 2020 and SCCM PADIS. For benzodiazepine-refractory AWS, phenobarbital (10–15 mg/kg cumulative load) is evidence-supported. Haloperidol monotherapy lowers seizure threshold. Phenytoin is not recommended for AWS seizures."}, {"id": "post-12", "questionNumber": 12, "topicSlug": "electrolyte-emergencies-hyperkalemia-hyponatremia", "topicTitle": "Electrolyte Emergencies (Hyperkalemia/Hyponatremia)", "stem": "A 58-year-old with severe alcoholism and malnutrition has Na⁺ 112 mmol/L with confusion. After 1 L isotonic saline, she develops brisk diuresis (300 mL/h) and Na⁺ rises from 112 to 118 mmol/L in 4 hours. What is the most appropriate intervention?", "options": ["A. Continue isotonic saline at current rate", "B. Start 3% saline targeting +12 mmol/L in 24 hours", "C. Administer desmopressin 2 μg IV and give controlled 3% NaCl to cap correction", "D. Start tolvaptan 15 mg PO", "E. Observe — the sodium is improving appropriately"], "correct": "C", "rationale": "This patient has high ODS risk (alcoholism, malnutrition) and rapid overcorrection (6 mmol/L in 4 hours — already exceeding the ≤4–6 mmol/L/24h target for high-risk patients). A DDAVP clamp stops the aquaresis and allows controlled replacement. Tolvaptan is contraindicated in severe symptomatic hyponatremia and hypovolemia. Continuing saline or observing risks osmotic demyelination."}, {"id": "post-13", "questionNumber": 13, "topicSlug": "endocrine-crises", "topicTitle": "Endocrine Crises", "stem": "A 62-year-old on empagliflozin presents with nausea and malaise. Labs: glucose 193 mg/dL, β-hydroxybutyrate 3.8 mmol/L, pH 7.28, HCO₃⁻ 16 mmol/L, anion gap 18, K⁺ 4.2 mmol/L. What is the best management?", "options": ["A. Reassure — glucose is normal, so DKA is excluded", "B. Start insulin infusion with dextrose-containing fluids and stop SGLT2 inhibitor", "C. Give bicarbonate infusion until pH >7.35", "D. Start basal insulin only and observe", "E. Treat as HHS with aggressive fluids only"], "correct": "B", "rationale": "This is euglycemic DKA associated with SGLT2 inhibitors — ketoacidosis despite near-normal glucose. Treatment mirrors standard DKA: insulin plus dextrose-containing fluids to suppress ketogenesis while avoiding hypoglycemia. The SGLT2 inhibitor must be discontinued. The critical pitfall is dismissing DKA because the glucose is not markedly elevated."}, {"id": "post-14", "questionNumber": 14, "topicSlug": "fever-and-empiric-antibiotics", "topicTitle": "Fever & Empiric Antibiotics", "stem": "A 63-year-old woman aspirates during dinner and develops fever 38.6°C and a right lower lobe infiltrate 6 hours later. She is stable, with no abscess or empyema on CT, and no MRSA/Pseudomonas risk factors. Which empiric regimen is most appropriate?", "options": ["A. Ampicillin-sulbactam for routine anaerobic coverage", "B. Ceftriaxone plus azithromycin without anaerobic coverage", "C. Piperacillin-tazobactam plus vancomycin", "D. Levofloxacin plus metronidazole", "E. Clindamycin monotherapy"], "correct": "B", "rationale": "In uncomplicated aspiration-associated pneumonia without lung abscess or empyema, routine anaerobic coverage is NOT recommended per current evidence. Standard CAP regimens are appropriate. Extended anaerobic coverage does not improve mortality and increases C. difficile risk — the pitfall is reflexively adding anaerobic therapy for all aspiration events."}, {"id": "post-15", "questionNumber": 15, "topicSlug": "community-acquired-pneumonia", "topicTitle": "Community-Acquired Pneumonia", "stem": "A 68-year-old admitted with CAP received ceftriaxone, azithromycin, and vancomycin. On day 2 he is afebrile and improving. MRSA nares PCR is negative. Sputum culture is non-diagnostic. Creatinine is trending up. What is the best action?", "options": ["A. Continue all three antibiotics for 7 days", "B. Stop azithromycin only; continue ceftriaxone and vancomycin", "C. Stop vancomycin; continue ceftriaxone ± azithromycin to complete 5 days", "D. Switch vancomycin to linezolid and continue dual therapy", "E. Stop all antibiotics today"], "correct": "C", "rationale": "Negative MRSA nasal PCR has high negative predictive value (~95–97%) for MRSA pneumonia, supporting de-escalation off vancomycin when clinical risk is low and the patient is improving. Continuing ceftriaxone ± azithromycin to a 5-day total aligns with ATS/IDSA CAP guidance. De-escalation reduces nephrotoxicity risk from vancomycin without compromising outcomes."}, {"id": "post-16", "questionNumber": 16, "topicSlug": "gi-bleeding", "topicTitle": "GI Bleeding", "stem": "A 72-year-old on apixaban for AF presents with brisk hematochezia, SBP 82 mmHg, HR 122, and Hb 8.1 g/dL. After fluids and 1 unit pRBC, she remains unstable. What is the best diagnostic and treatment strategy?", "options": ["A. Urgent colonoscopy within 6 hours after rapid prep", "B. Octreotide infusion and schedule EGD tomorrow", "C. CT angiography of abdomen/pelvis now with plan for IR embolization if positive", "D. Tagged RBC scan to localize before other imaging", "E. High-dose IV PPI and observe 24 hours"], "correct": "C", "rationale": "For hemodynamically significant LGIB, CTA is recommended to localize bleeding and expedite IR embolization. Urgent colonoscopy has not improved key outcomes in severe LGIB — the pitfall is defaulting to colonoscopy in unstable patients. Tagged RBC scans are slower and less useful when CTA is available. Remember that brisk hematochezia can also be from an upper source."}, {"id": "post-17", "questionNumber": 17, "topicSlug": "anaphylaxis", "topicTitle": "Anaphylaxis", "stem": "A 72-year-old on metoprolol develops hypotension (SBP 72 mmHg), diffuse hives, and wheeze after vancomycin. He has received two appropriate IM epinephrine doses and 1.5 L fluids with minimal improvement. What is the best next step?", "options": ["A. IV epinephrine bolus push", "B. Start epinephrine infusion and add glucagon 1–5 mg IV over 5 min", "C. Methylprednisolone 125 mg IV and observe", "D. Diphenhydramine 50 mg IV and albuterol only", "E. Vasopressin infusion and avoid further epinephrine"], "correct": "B", "rationale": "Refractory anaphylaxis in patients on beta-blockers may require glucagon (bypasses β-receptors via cAMP) alongside an epinephrine infusion titrated to MAP goals. Avoid IV epinephrine bolus due to dosing error and arrhythmia risk — use a pump-driven infusion. The pitfall is under-treating β-blocker–refractory anaphylactic shock without adding glucagon."}, {"id": "post-18", "questionNumber": 18, "topicSlug": "toxidromes-overdose-and-arrest-in-poisoning", "topicTitle": "Toxidromes, Overdose & Arrest in Poisoning", "stem": "A 58-year-old is somnolent with BP 78/46 mmHg and HR 48 after ingesting extended-release verapamil 90 minutes ago. After 2 L crystalloid, calcium chloride 1 g IV, and norepinephrine at 0.2 μg/kg/min, he remains hypotensive. What is the most important next therapy?", "options": ["A. Glucagon 5 mg IV bolus", "B. Epinephrine infusion escalation alone", "C. High-dose insulin euglycemia therapy (1 U/kg bolus then 0.5–1 U/kg/h)", "D. Lipid emulsion as first-line therapy", "E. Atropine 1 mg IV q3 min up to 3 mg"], "correct": "C", "rationale": "High-dose insulin euglycemia therapy (HIET) is the early cornerstone for CCB-induced cardiogenic shock, improving inotropy and myocardial metabolism. Start 1 U/kg bolus then 0.5–1 U/kg/h with dextrose and electrolyte monitoring. Glucagon is more useful for β-blocker toxicity. Lipid emulsion is considered after standard therapies fail. Atropine alone is insufficient for severe CCB toxicity."}, {"id": "post-19", "questionNumber": 19, "topicSlug": "vte-pe-practicalities", "topicTitle": "VTE/PE Practicalities", "stem": "A 58-year-old woman with acute PE, SBP 82/50 mmHg, and RV dilation presents 10 days after a large ischemic stroke with hemorrhagic transformation. UFH is infusing. What is the best reperfusion strategy?", "options": ["A. Systemic thrombolysis with alteplase 100 mg over 2 hours", "B. Escalate UFH only and avoid all reperfusion", "C. Emergent catheter-directed embolectomy after multidisciplinary discussion", "D. IVC filter placement and stop anticoagulation", "E. Switch to rivaroxaban urgently"], "correct": "C", "rationale": "Recent intracranial hemorrhage is an absolute contraindication to systemic thrombolysis. In high-risk PE with shock, catheter-based or surgical embolectomy is the preferred reperfusion approach when lysis is contraindicated. The critical pitfall is proceeding with systemic lysis despite a clear absolute contraindication. IVC filter alone is insufficient in shock without reperfusion."}, {"id": "post-20", "questionNumber": 20, "topicSlug": "transfusion-reactions-and-urgent-transfusion", "topicTitle": "Transfusion Reactions & Urgent Transfusion", "stem": "A 28-year-old woman of unknown blood type presents with exsanguinating pelvic trauma. She is obtunded with BP 72/38 mmHg and HR 132. There is no time for crossmatch. Which blood product should be used to initiate massive transfusion?", "options": ["A. O-positive RBCs", "B. O-negative RBCs", "C. Type-specific uncrossmatched RBCs after abbreviated screen", "D. Delay transfusion until full crossmatch is complete", "E. Group AB plasma only until crossmatch returns"], "correct": "B", "rationale": "For females of childbearing potential with unknown blood type in life-threatening hemorrhage, O-negative RBCs are preferred to avoid RhD alloimmunization that could affect future pregnancies. The pitfall is using O-positive blood (acceptable for adult males or post-menopausal females when inventory is limited) without considering reproductive implications. Delaying transfusion for crossmatch in hemorrhagic shock is dangerous."}]};

window.TOPIC_FILES={"sepsis-recognition-early-management.md": "---\nfilename: sepsis-recognition-early-management.md\nid: sepsis-recognition-early-management\ntitle: Sepsis Recognition & Early Management\nslug: sepsis-recognition-early-management\ntags: [infectious-diseases, inpatient, night-float]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-20\nsource: IM_NightFloat_Engine\n---\n\n# Sepsis Recognition & Early Management\n\n## Panic Card\n- Recognize **sepsis = suspected infection + organ dysfunction**; evaluate quickly for **septic shock = vasopressor need + lactate >2 mmol/L despite fluids**.\n- Secure airway and target **SpO₂ 88–92%** if COPD risk or **≥94%** otherwise; begin **30 mL/kg** crystalloid bolus unless contraindicated.\n- Start broad‑spectrum antibiotics within **≤1 hour** of recognition; reassess coverage after cultures.\n- If hypotension persists, initiate **norepinephrine** to target **MAP ≥65 mmHg**.\n- Obtain **lactate** and repeat within 2–4 h if **≥2 mmol/L**.\n- Confirm Before Proceed: ensure no anaphylaxis history to chosen antibiotic class.\n\n## Brief Overview\n- Sepsis represents dysregulated host response to infection causing acute organ dysfunction; night‑float physicians must prioritize rapid recognition and early hemodynamic stabilization to prevent progression to shock.\n- **Guideline Must‑Know:** Surviving Sepsis Campaign (SSC 2021–2024) emphasizes treatment within **the first hour**, including antibiotics, lactate measurement, and fluid resuscitation.\n- **Guideline Must‑Know:** Initial fluids should be balanced crystalloids with **30 mL/kg** ideal body weight unless severe pulmonary edema or ESRD complicates the picture.\n- **Guideline Must‑Know:** Broad-spectrum antibiotics should be started **immediately after cultures**, but never delay antimicrobials >60 minutes in unstable patients.\n- **Guideline Must‑Know:** Persistent hypotension after fluids requires **norepinephrine as the first-line vasopressor**, titrated to **MAP ≥65 mmHg**; add vasopressin if escalation needed.\n- **Guideline Must‑Know:** Reassess fluid responsiveness frequently using dynamic measures (passive leg raise, stroke volume variation) to avoid volume overload, especially in HF or renal disease.\n- **Guideline Must‑Know:** Obtain **repeat lactate 2–4 hours** after elevated initial measurement to guide resuscitation adequacy.\n- Consider alternative shock etiologies (cardiogenic, obstructive, hemorrhagic) if MAP remains low despite pressors, especially with discordant exam findings.\n- Night‑float must differentiate sepsis from early septic shock; the presence of **lactate >2 mmol/L** despite adequate fluid challenge indicates tissue hypoperfusion requiring aggressive escalation.\n- Organ dysfunction markers include **acute mental status change**, **creatinine rise**, **oliguria**, **hypoxemia**, **bilirubin elevation**, and **thrombocytopenia**.\n- What must happen now: antibiotics; fluids; lactate; blood cultures; source assessment; reassessment of hemodynamics; pressors if needed.\n- What can wait: source‑specific imaging if patient unstable; consulting ID until after initial stabilization; elective line placement if peripheral access adequate.\n- Pitfalls: misattributing hypotension to dehydration and under‑treating shock; failing to repeat lactate; delaying antibiotics pending imaging; missing adrenal insufficiency in chronic steroid users.\n- Escalate to ICU for persistent hypotension, rising lactate, worsening respiratory failure, or early encephalopathy.\n- Avoid nephrotoxic agents when AKI present; renally dose antimicrobials; reassess coverage in 24 hours based on culture results.\n- In cirrhosis, maintain MAP targets but use caution with large fluid boluses—prefer albumin adjunct in SBP or large-volume paracentesis settings.\n- In pregnancy, maintain MAP goals but avoid hypotension aggressively; select antibiotic regimens safe for gestation.\n- If immunocompromised, broaden empiric therapy early and consider fungal coverage for indwelling lines or prolonged neutropenia.\n- Night‑float must document objective organ dysfunction clearly for CDI purposes to support accurate severity labeling.\n\n## Top ICU/Consult Triggers\n- Need for ongoing vasopressors to maintain **MAP ≥65 mmHg**.\n- Lactate **>4 mmol/L** or rising despite fluids.\n- Worsening hypoxemia requiring high‑flow nasal cannula or noninvasive ventilation.\n- New encephalopathy interfering with airway protection.\n- Rapidly rising creatinine or oliguria <0.5 mL/kg/h for >6 hours.\n\n## Orders to Place Now\n- Order: Blood cultures ×2 — {peripheral + line draw if applicable}\n- Order: Broad-spectrum antibiotics — {agent, dose, timing}\n- Order: Crystalloid bolus — {30 mL/kg, type, rate}\n- Order: Lactate level — {initial and repeat 2–4 h}\n- Order: Vasopressor initiation — {norepinephrine, starting dose}\n- Order: Infection source imaging — {CT/US site-based}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 67-year-old man with diabetes presents with fever, confusion, and hypotension. BP is 84/52 mmHg despite 1 L crystalloid. Lactate is 3.8 mmol/L. He has crackles bilaterally but oxygen saturation is 95% on 2 L nasal cannula. Blood cultures are pending.\n\n### Options\nA. Give additional 30 mL/kg crystalloid bolus\nB. Delay antibiotics until imaging is completed\nC. Start norepinephrine to target MAP ≥65 mmHg\nD. Administer hydrocortisone immediately\nE. Begin sodium bicarbonate infusion\n\n### Correct answer\nC\n\n### Rationale\nPersistent hypotension with **lactate >2 mmol/L** after fluids indicates septic shock requiring **norepinephrine** per SSC guidelines. Additional large boluses risk pulmonary edema. Antibiotic delay is contraindicated. Steroids are reserved for refractory shock. Bicarbonate does not improve outcomes.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 78-year-old woman with HFrEF (EF 25%) presents with leukocytosis and hypotension. She is dyspneic with pulmonary edema. Lactate is 3.2 mmol/L. She has received 500 mL crystalloid with minimal improvement.\n\n### Options\nA. Continue 30 mL/kg fluids\nB. Start norepinephrine now\nC. Switch to dopamine\nD. Delay vasopressors pending echo\nE. Give albumin instead of any crystalloids\n\n### Correct answer\nB\n\n### Rationale\nThe pitfall is assuming all sepsis patients tolerate full **30 mL/kg** boluses; severe HFrEF increases risk of fluid overload. Early **norepinephrine** is recommended when fluid responsiveness is low or pulmonary edema present. Dopamine is inferior due to arrhythmia risk. Albumin is adjunctive, not sole therapy.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Minimum MAP target in septic shock?\n  A: **MAP ≥65 mmHg** per SSC guidelines.\n- Q: Initial crystalloid bolus recommendation?\n  A: **30 mL/kg** ideal body weight unless contraindicated.\n- Q: Lactate threshold requiring repeat measurement?\n  A: **≥2 mmol/L** warrants reassessment within 2–4 h.\n- Q: First-line vasopressor in septic shock?\n  A: **Norepinephrine**.\n- Q: Max sodium correction per 24h in comorbid hyponatremia?\n  A: **≤8–10 mmol/L/24h**.\n\n## Guidelines & Key References\n- Surviving Sepsis Campaign Guidelines, 2021–2024.\n- IDSA Clinical Practice Guidelines for Infection Management, 2023.\n- AABB Transfusion Guidelines, 2023.\n- ATS/IDSA CAP Guidelines, 2020.\n- ADA Inpatient Diabetes Management Standards, 2024.\n\n## CDI: What to Document Clearly Tonight\n- Sepsis or septic shock with objective organ dysfunction.\n- Suspected or confirmed infection source and supporting evidence.\n- Hemodynamic status, lactate values, and need for vasopressors.\n- Respiratory failure, AKI, or encephalopathy criteria.\n- Treatment intensity: fluids, antibiotics, pressors, monitoring.\n", "undifferentiated_hypotension_shock_module.md": "# Undifferentiated Hypotension / Shock\n### Internal Medicine Night‑Float Education Engine Module\n\n## 1. High‑Yield Overview (Night‑Float Focused)\nUndifferentiated hypotension is a **life‑threat**, time‑dependent diagnostic emergency. Early differentiation between major shock categories determines interventions:\n\n**The 5 Major Shock Types**\n- **Hypovolemic** – hemorrhage, GI losses, third‑spacing.\n- **Cardiogenic** – ACS, arrhythmia, valvular catastrophe, RV failure.\n- **Obstructive** – PE, tamponade, tension PTX.\n- **Distributive** – sepsis, anaphylaxis, adrenal crisis, neurogenic.\n- **Dissociative** (rare) – CO, methemoglobinemia.\n\nUse a **structured bedside approach** to avoid missing reversible causes.\n\n---\n\n## 2. Immediate Stabilization (First 2–5 Minutes)\n\n### **Airway**\n- Assess mental status; consider early airway support if obtunded.\n\n### **Breathing**\n- O₂ to maintain SpO₂ > 94% unless COPD chronically low.\n- Ultrasound lung sliding + B‑lines screening.\n\n### **Circulation**\n- Large‑bore IV ×2 or IO.\n- Point‑of‑care **cardiac US** immediately:\n  - LV function (hyperdynamic vs depressed)\n  - RV size and septal bowing\n  - IVC (flat vs plethoric)\n  - Pericardial effusion\n  - Gross volume status\n\n### **Push reversible interventions early**\n- Suspected sepsis → **Immediate antibiotics**.\n- Suspected PE → Evaluate for thrombolysis criteria.\n- Suspected tamponade → Call for emergent pericardiocentesis.\n- Suspected tension PTX → Immediate needle decompression.\n\n---\n\n## 3. Diagnostic Framework (Bedside Algorithm)\n\n### **1. CVP/IVC assessment**\n- **Flat IVC** → Hypovolemic / distributive.\n- **Plethoric IVC** → Cardiogenic / obstructive.\n\n### **2. LV Function**\n- **Hyperdynamic, small cavity** → Sepsis or hypovolemia.\n- **Poor squeeze** → Cardiogenic (ACS, arrhythmia, myocarditis).\n\n### **3. RV Size / McConnell signs**\n- **Massively dilated RV** → Consider massive PE, RV infarct.\n\n### **4. Pericardial Space**\n- Effusion + diastolic RV collapse → Tamponade.\n\n### **5. Lungs**\n- Absent lung sliding → Tension pneumothorax.\n- Diffuse B‑lines → Volume overload / cardiogenic shock.\n\n### **6. Key labs**\n- Lactate, ABG/VBG, troponin, BNP, BMP, CBC\n- STAT EKG\n- Blood cultures if sepsis suspected\n- Consider cortisol if refractory shock\n\n---\n\n## 4. Vasopressor Strategy (Night‑Shift Practical)\n**First‑line (general):**  \n- **Norepinephrine** for most shock states, especially sepsis.\n\n**Second‑line choices:**\n- Vasodilatory refractory → Add **vasopressin**.\n- Cardiogenic → Consider **dobutamine** (if MAP adequate).\n- RV failure/PE → **Norepi** ± cautious **dobutamine**.\n- Anaphylaxis → **Epinephrine** first‑line.\n\nAvoid phenylephrine except for pure vasodilation (e.g., post‑intubation hypotension).\n\n---\n\n## 5. Common Night‑Float Pitfalls\n- Delaying **antibiotics** in suspected sepsis.\n- Giving **excess fluids** in cardiogenic shock.\n- Missing **obstructive shock** (RV strain, tamponade) on US.\n- Not treating **arrhythmias** as potential primary cause.\n- Assuming hypotension is “just sepsis” without ruling out hemorrhage.\n\n---\n\n## 6. CDI Micro‑Section\n**Key Documentation Phrases for Higher Specificity:**\n- “Shock—type suspected: septic vs cardiogenic vs hypovolemic vs obstructive.”\n- Document **lactate**, **vasopressor requirement**, and **response to fluids**.\n- Specify **source** in sepsis.\n- If cardiogenic: document **new EF**, cardiorenal involvement.\n- If hypovolemic: specify **hemorrhagic vs non‑hemorrhagic**.\n\n---\n\n## 7. Rapid Pocket Approach\n### **If MAP < 65:**\n1. **IV/IO access**\n2. **POCUS: Heart → IVC → Lungs**\n3. Categorize into:\n   - **Empty tank** (give fluids)\n   - **Weak pump** (pressors + inotropes)\n   - **Blocked circulation** (PE/PTX/tamponade interventions)\n   - **Leaky tank** (sepsis vasoplegia → norepi early)\n4. Start therapy while completing labs/imaging.\n\n---\n\n# ABIM‑Style Case #1\n### **Case**\nA 72‑year‑old woman presents with acute hypotension (BP 78/42), altered mentation, and tachypnea. Lung US shows lung sliding bilaterally with scattered B‑lines. Cardiac POCUS: dilated LV with poor squeeze, plethoric IVC.\n\n### **Question**\nMost appropriate initial intervention?\n\n### **Answer**\n**Initiate norepinephrine and obtain emergent cardiology evaluation for suspected cardiogenic shock.**\n\n---\n\n## Micro‑Questions (Case #1)\n1. **Bedside test to differentiate tamponade from cardiogenic shock?**  \n   POCUS showing **diastolic RV collapse**.\n2. **Vasopressor avoided in cardiogenic shock with arrhythmia risk?**  \n   **Epinephrine**.\n3. **Lab helpful for differentiating sepsis vs cardiogenic shock?**  \n   **Procalcitonin** or **BNP**.\n\n---\n\n# ABIM‑Style Case #2\n### **Case**\n44‑year‑old male with sudden dyspnea and hypotension. POCUS: normal LV, *severely dilated RV*, septal flattening, clear lungs.\n\n### **Question**\nMost appropriate intervention **right now**?\n\n### **Answer**\n**Start norepinephrine while preparing for systemic thrombolysis.**\n\n---\n\n## Micro‑Questions (Case #2)\n1. **Why avoid large fluid bolus in massive PE?**  \n   Worsens RV dilation.\n2. **Most specific POCUS sign for PE?**  \n   **McConnell sign**.\n3. **What lab may support PE but should not delay treatment?**  \n   **D‑dimer**.\n\n---\n\n## Quality‑Assurance Checklist\n- ✔ High‑yield summary\n- ✔ POCUS‑first algorithm\n- ✔ Vasopressor logic\n- ✔ CDI micro‑section\n- ✔ ABIM Case #1 + micro‑questions\n- ✔ ABIM Case #2 + micro‑questions\n- ✔ No hospital‑specific content\n", "code-rapid-response-and-acls-essentials.md": "---\nfilename: code-rapid-response-and-acls-essentials.md\nid: code-rapid-response-and-acls-essentials\ntitle: Code/Rapid Response & ACLS Essentials\nslug: code-rapid-response-and-acls-essentials\ntags: [acls, rapid-response, inpatient, emergency, night-float]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-20\nsource: IM_NightFloat_Engine\n---\n\n# Code/Rapid Response & ACLS Essentials\n\n## Panic Card\n- Confirm unresponsiveness and abnormal breathing; call Code/activate RRT; start high‑quality CPR with hard, fast, full recoil at **100–120/min**, depth **5–6 cm**, minimize pauses, attach defib/monitor/SpO₂/ETCO₂.\n- Give oxygen, secure IV/IO access; prepare epinephrine **1 mg IV/IO q3–5 min** for non‑shockable or after second shock; use **ETCO₂ ≥10 mmHg** to gauge CPR quality.\n- Defibrillate VF/pVT: **200 J biphasic** (manufacturer‑equivalent), resume CPR immediately; escalate energy for subsequent shocks; charge during compressions.\n- Treat H’s & T’s rapidly: hypoxia, hypovolemia, **H⁺ (acidosis)**, **hypo/hyper‑K⁺**, hypothermia; tension pneumothorax, tamponade, toxins, thrombosis (PE/MI).\n- Confirm Before Proceed: thrombolysis for suspected PE arrest or post‑ROSC MI — verify contraindications; if given, document **time, dose, and indications** precisely.\n\n## Brief Overview\n- Rapid response aims to prevent arrest via early recognition of deterioration; prioritize airway, breathing, circulation, neurologic status, reversible causes, and transfer needs.\n- **Guideline Must‑Know:** High‑quality CPR drives outcomes: compress at **100–120/min**, depth **5–6 cm**, allow full recoil, rotate compressors q2 min, minimize pauses to **<10 s**.\n- **Guideline Must‑Know:** Defibrillate VF/pVT as soon as possible; first shock **~200 J biphasic**, resume compressions immediately; give **epinephrine 1 mg IV/IO q3–5 min** after the second shock and thereafter.\n- **Guideline Must‑Know:** For asystole/PEA, prioritize epinephrine **1 mg q3–5 min** and search for H’s/T’s; defibrillation is not indicated in non‑shockable rhythms.\n- **Guideline Must‑Know:** Advanced airway only if it won’t interrupt compressions; if placed, target **SpO₂ 92–96%**, avoid hyperventilation (about **10 breaths/min** with continuous compressions), use waveform capnography.\n- **Guideline Must‑Know:** ETCO₂ **<10 mmHg** after 20 minutes suggests poor perfusion and low likelihood of ROSC; consider improving compressions, vasopressors, or reversible causes rather than stopping prematurely.\n- **Guideline Must‑Know:** Post‑ROSC: target **SpO₂ 92–96%**, **MAP ≥65 mmHg**, avoid hypotension, treat shock with norepinephrine first‑line, control temperature (active fever prevention), obtain 12‑lead ECG, evaluate for emergent cath if STEMI or high suspicion.\n- Early differentiated shock treatment: if sepsis suspected, give **balanced crystalloids 30 mL/kg** promptly, start norepinephrine if hypotension persists, and obtain cultures/antibiotics rapidly.\n- Airway failure (stridor, silent chest, rising CO₂, fatigue) or refractory hypoxemia warrants immediate escalation to advanced airway and ICU support; use NIPPV cautiously in altered mental status.\n- In bradycardia with instability, treat with **atropine 1 mg IV** (repeat q3–5 min to **max 3 mg**), then **transcutaneous pacing** or **dopamine 5–20 μg/kg/min**/**epinephrine 2–10 μg/min** infusion as needed.\n- In tachycardia with a pulse and instability (hypotension, shock, chest pain, altered mental status), perform **synchronized cardioversion** (energy per rhythm), correct electrolytes (**MgSO₄ 2 g IV** for torsades), and seek cardiology.\n- **Guideline Must‑Know:** Avoid routine sodium bicarbonate in cardiac arrest except for severe hyperkalemia, tricyclic overdose, or known severe acidosis with prolonged downtime; prioritize ventilation and perfusion first.\n- **Guideline Must‑Know:** For suspected PE arrest, consider systemic thrombolysis; typical dosing **alteplase 50 mg IV bolus** with repeat **50 mg** if no ROSC in 15–30 min, while continuing CPR; weigh bleeding risks carefully.\n- **Guideline Must‑Know:** For hyperkalemia arrest or pre‑arrest, give **calcium chloride 1 g IV** (or **calcium gluconate 3 g IV**), **insulin regular 10 units IV + dextrose 25 g**, **albuterol 10–20 mg neb**, and initiate **hemodialysis** if ESRD/refractory; sequence is membrane stabilization → shift → removal.\n- Distinguish opioid toxicity (miosis, hypoventilation): give **naloxone 0.4–2 mg IV/IN**; repeat as needed and prepare for withdrawal; ventilate first if apneic.\n- What must happen now: compressions/defib/epi, oxygenation/ventilation, rapid rhythm check q2 min, address H’s/T’s, early vasopressors for shock, activate ICU and specialty teams.\n- What can wait minutes: definitive airway if bag‑mask adequate, central access (use IO/large‑bore PIV now), comprehensive labs beyond immediate electrolytes/ABG if not affecting initial actions.\n- Pitfalls: long pauses for airway or pulse checks, hyperventilation, under‑defibrillation, delayed epinephrine in asystole/PEA, failure to treat hyperkalemia sequence, and missing PE/MI as reversible causes.\n- Call ICU/cardiology early for refractory shock, recurrent VF/pVT, need for pacing or cath lab activation; involve anesthesia for difficult airway or persistent hypoxemia.\n\n## Top ICU/Consult Triggers\n- Persistent hypotension with **MAP <65 mmHg** despite adequate fluids and vasopressors or escalating oxygen/vent support.\n- Refractory arrhythmia (recurrent VF/pVT, unstable VT, refractory bradycardia needing pacing) or need for mechanical ventilation.\n- Post‑ROSC coma requiring temperature management and invasive monitoring or suspected STEMI requiring emergent cath lab activation.\n- Severe metabolic derangements (e.g., **K⁺ ≥6.5 mmol/L** with ECG changes) or suspected massive PE requiring thrombolysis/thrombectomy.\n- Rapidly worsening respiratory failure with **SpO₂ <90%** on high‑flow/NIPPV or impending airway compromise.\n\n## Orders to Place Now\n- Order: Code/RRT activation — {location, patient_identifier, event_type}\n- Order: Defibrillation — {energy_J, rhythm, number_of_shocks, immediate_resume_CPR:true}\n- Order: Epinephrine 1 mg IV/IO q3–5 min — {first_dose_time, route, repeat_interval}\n- Order: Advanced airway management — {BVM_with_PEEP, waveform_capnography:true, ventilator_settings_if_intubated}\n- Order: Point‑of‑care testing — {glucose_now, VBG/ABG, electrolytes_with_K⁺, lactate}\n- Order: Post‑ROSC bundle — {SpO₂_target_92_96, MAP_goal_≥65, norepinephrine_start, 12‑lead_ECG, troponin, targeted_temperature_management}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 64‑year‑old man collapses on the ward. He is unresponsive with agonal respirations. Monitor shows ventricular fibrillation. High‑quality CPR is initiated, and a biphasic defibrillator is available.\n\n### Options\nA. Administer epinephrine 1 mg IV immediately, then defibrillate.\nB. Deliver a single 120 J synchronized shock and reassess rhythm.\nC. Defibrillate at 200 J biphasic and immediately resume compressions.\nD. Intubate first to ensure airway control, then defibrillate.\nE. Give amiodarone 300 mg IV before any shocks to increase success.\n\n### Correct answer\nC\n\n### Rationale\nEarly defibrillation is the priority in VF/pVT; deliver **~200 J biphasic** and resume CPR immediately, charging during compressions for the next shock if needed. Epinephrine **1 mg IV q3–5 min** follows after the second shock; antiarrhythmics (amiodarone/lidocaine) are considered after refractory VF/pVT. Airway interventions must not delay defibrillation.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 72‑year‑old woman with ESRD on hemodialysis develops pulseless electrical activity (PEA) during a rapid response for weakness and nausea. ECG prior to arrest showed peaked T waves. CPR is ongoing.\n\n### Options\nA. Give sodium bicarbonate 1 amp first to correct acidosis.\nB. Give calcium chloride 1 g IV immediately, then insulin 10 units IV with dextrose 25 g.\nC. Intubate first to correct hypoxia, then reassess.\nD. Start norepinephrine infusion before addressing electrolytes.\nE. Delay electrolyte therapy until confirmatory labs return.\n\n### Correct answer\nB\n\n### Rationale\nIn life‑threatening hyperkalemia with arrest/near‑arrest, **membrane stabilization with IV calcium** precedes intracellular shift (insulin/dextrose) and removal (dialysis). The pitfall is delaying calcium/insulin for labs or focusing on vasopressors/intubation first. Bicarbonate is not first‑line unless severe acidosis or TCA toxicity.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What is the target compression rate and depth during adult CPR?\n  A: 100–120/min and 5–6 cm with full recoil and minimal interruptions.\n- Q: When should epinephrine be given during VF/pVT arrest?\n  A: After the second defibrillation, then every 3–5 minutes thereafter.\n- Q: What ETCO₂ value suggests poor CPR quality and low likelihood of ROSC?\n  A: Persistently <10 mmHg after 20 minutes indicates low perfusion/poor prognosis.\n- Q: What is the first‑line pressor post‑ROSC for shock to maintain MAP ≥65 mmHg?\n  A: Norepinephrine is preferred; titrate to maintain MAP ≥65 mmHg.\n- Q: What is the immediate sequence for severe hyperkalemia with arrest?\n  A: Calcium for membrane stabilization → insulin/dextrose and albuterol to shift K⁺ → dialysis/removal.\n\n## Guidelines & Key References\n- American Heart Association (AHA) Adult ACLS Guidelines, 2020 with focused updates 2023–2025 — https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines/adult-advanced-life-support\n- ILCOR Consensus on Science with Treatment Recommendations (CoSTR), ongoing updates (2020–2025) — https://costr.ilcor.org\n- Surviving Sepsis Campaign Guidelines 2021 with 2024 updates — https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines\n- AABB Red Blood Cell Transfusion Guidelines 2023 — https://www.aabb.org/clinical-resources/guidelines\n- 2023–2025 AHA Focused Update on Post–Cardiac Arrest Care and Temperature Management — https://cpr.heart.org/en/resuscitation-science/cpr-and-ecc-guidelines/post-cardiac-arrest-care\n\n## CDI: What to Document Clearly Tonight\n- Cardiac arrest with initial rhythm (VF/pVT/PEA/asystole), witnessed/unwitnessed, downtime, ROSC times, ETCO₂ values.\n- Shock type (cardiogenic/septic/obstructive/hypovolemic), severity, **MAP targets**, vasopressors and doses.\n- Acute respiratory failure with mechanism (hypoxemic/hypercapnic), oxygen/vent settings, ABG values, escalation steps.\n- Life‑threatening hyperkalemia: severity (K⁺ level), ECG changes, immediate calcium/insulin/dextrose given, plan for dialysis.\n- Suspected PE/MI as arrest etiology: objective evidence (ECG, bedside echo, D‑dimer/imaging if obtained), decision regarding thrombolysis/cath.\n", "shortness-of-breath-copd-adhf.md": "---\nfilename: shortness-of-breath-copd-adhf.md\nid: shortness-of-breath-copd-adhf\ntitle: Shortness of Breath (COPD/ADHF)\nslug: shortness-of-breath-copd-adhf\ntags: [pulmonology, cardiology, inpatient, night-float, respiratory-failure, copd, heart-failure]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Shortness of Breath (COPD/ADHF)\n\n## Panic Card\n- Sit upright, apply monitored oxygen with clear target: **SpO₂ 88–92% if COPD/hypercapnia risk**; avoid over-oxygenation pending ABG/VBG. **SpO₂ 92–96%** if no hypercapnia risk. Obtain IV access, monitor, ABG/VBG, ECG. citeturn2search31\n- Start **noninvasive ventilation (BiPAP/CPAP)** for hypercapnic AECOPD with acidosis or for cardiogenic pulmonary edema with distress/hypoxemia; reassess gas exchange and mental status within 30–60 min. citeturn2search7\n- If hypertensive pulmonary edema: give **IV vasodilator (nitroglycerin) with rapid titration** plus NIV if no hypotension; avoid routine morphine. citeturn2search16\n- If volume overloaded ADHF: give **IV loop diuretic ~1–2.5× home daily dose (IV equivalent)**; target **net negative** with strict I/O and electrolytes. citeturn2search37\n- For suspected AECOPD: **short‑acting bronchodilator nebs (albuterol + ipratropium)** and **systemic steroids (prednisone 40 mg PO daily x5 d or methylprednisolone 40 mg IV daily if NPO)**. citeturn2search20\n\n## Brief Overview\n- Shortness of breath overnight often reflects two high‑risk clusters: acute exacerbation of COPD (AECOPD) and acute decompensated heart failure (ADHF). Distinguishing features overlap; bedside ultrasound (B‑lines vs hyperinflation), natriuretic peptides, and ABG/VBG help triage and guide therapy without delaying stabilization. citeturn2search16\n- **Guideline Must‑Know:** In suspected or known COPD, titrate oxygen to **SpO₂ 88–92%** to avoid oxygen‑induced hypercapnia; record the prescribed target on vitals flowsheets and reassess after gases return. citeturn2search31turn2search32\n- **Guideline Must‑Know:** Initiate **NIV** for AECOPD with **pH ≤7.35 and hypercapnia** or for cardiogenic pulmonary edema with persistent distress/hypoxemia; NIV reduces intubation and improves outcomes when applied with close monitoring and failure criteria. citeturn2search7\n- **Guideline Must‑Know:** For AECOPD, give **systemic corticosteroids** (e.g., **prednisone 40 mg PO daily for 5 days**) to shorten recovery and improve FEV₁; use **short‑acting bronchodilators** (albuterol ± ipratropium) as first‑line relievers. citeturn2search20\n- **Guideline Must‑Know:** Consider **antibiotics** in AECOPD when increased dyspnea, sputum purulence, and/or volume are present or when ventilatory support is required. Tailor to local resistance and severity. citeturn2search20\n- **Guideline Must‑Know:** In ADHF with congestion, use **IV loop diuretic** early (typical starting dose **~2–2.5× the outpatient PO daily dose as IV** for those on chronic diuretics; 40–80 mg IV furosemide BID if diuretic‑naïve) and adjust within 2 hours by urine response. citeturn2search37\n- **Guideline Must‑Know:** For **hypertensive pulmonary edema**, add **IV vasodilator (nitroglycerin)** to rapidly reduce preload/afterload and relieve dyspnea; pair with NIV if no contraindication; avoid routine morphine due to harm signals. citeturn2search16\n- **Guideline Must‑Know:** Use **natriuretic peptides (BNP/NT‑proBNP)** and **echocardiography** to confirm heart‑failure physiology and guide early management; integrate with clinical exam and imaging, not as sole arbiters. citeturn2search16\n- **Guideline Must‑Know:** Re‑initiate or optimize guideline‑directed medical therapy (as hemodynamics permit) before discharge in ADHF, but avoid starting/uptitrating vasodilatory agents during shock/hypotension. citeturn2search16\n- What must happen now: stabilize airway/breathing, set explicit **SpO₂** targets, decide on **NIV** vs intubation criteria, give bronchodilators and steroids for AECOPD, administer IV diuretic ± vasodilator for ADHF, and establish monitoring (telemetry, strict I/O, serial gases). citeturn2search7turn2search16\n- What can wait (after stabilization): comprehensive differential (PE, pneumonia, ACS, arrhythmia), inhaler education and device technique, vaccination counseling, sleep‑disordered breathing evaluation, and longitudinal HF optimization. citeturn2search16\n- Pitfalls: over‑oxygenation of COPD leading to CO₂ narcosis; under‑dosing initial IV loop diuretic causing diuretic resistance; delayed NIV in acidemic hypercapnia; failure to add vasodilator in hypertensive pulmonary edema; reflexive morphine use in ADHF. citeturn2search31turn2search37turn2search7turn2search16\n- Call ICU early for refractory hypoxemia/hypercapnia, shock, escalating NIV settings, or need for continuous vasodilators/pressors; involve cardiology/pulmonology for complex physiology, arrhythmias, or unclear etiology. citeturn2search7turn2search16\n- Disposition pearls: floor candidates need stable oxygen/NIV settings and improving diuresis; step‑down/ICU for frequent NIV adjustments, vasodilator drips, or concerning acidosis/encephalopathy. citeturn2search7turn2search16\n\n## Top ICU/Consult Triggers\n- Persistent **pH <7.30**, rising PaCO₂, or worsening encephalopathy despite NIV and bronchodilators. citeturn2search7\n- **Refractory hypoxemia** (e.g., **SpO₂ <88%** on high‑flow/NIV) or hemodynamic instability/shock. citeturn2search7\n- Need for **IV vasodilator/inotrope/pressor** infusions or rapidly escalating diuretic strategy with renal dysfunction. citeturn2search16\n- New ischemia/arrhythmia with pulmonary edema or high‑grade conduction disturbances. citeturn2search16\n\n## Orders to Place Now\n- Order: Noninvasive ventilation — {mode: BiPAP, IPAP {10–20} cmH₂O, EPAP {5–10} cmH₂O, backup rate {0–14}, reassess gases {30–60 min}} citeturn2search7\n- Order: Oxygen therapy — {device: Venturi/NC/HFNC, target SpO₂ {88–92% if COPD risk; 92–96% otherwise}, ABG/VBG {now + post‑NIV}} citeturn2search31\n- Order: Loop diuretic IV — {agent: furosemide/bumetanide, dose {~1–2.5× home PO daily dose IV or 40–80 mg IV BID if naïve}, monitor {UOP, BMP, Mg}} citeturn2search37\n- Order: Nitroglycerin infusion — {start {10–20 mcg/min}, titrate q5 min to symptom/BP, hold if SBP < {100} mmHg} citeturn2search16\n- Order: Bronchodilator nebulizers — {albuterol {2.5 mg} + ipratropium {0.5 mg} q20 min x3 then q4–6 h PRN wheeze/dyspnea} citeturn2search20\n- Order: Systemic corticosteroid — {prednisone {40 mg PO daily x5 d} or methylprednisolone {40 mg IV daily if NPO}} citeturn2search20\n\n## ABIM‑Style Question 1\n\n### Stem\nA 68‑year‑old man with severe COPD presents with acute dyspnea, wheeze, and somnolence. Vitals: BP 148/82 mmHg, HR 112, RR 28, SpO₂ 96% on nonrebreather. ABG: pH 7.28, PaCO₂ 72 mmHg, PaO₂ 82 mmHg. CXR without focal consolidation. He received albuterol/ipratropium nebs en route.\n\n### Options\nA. Continue high‑flow oxygen targeting SpO₂ 98–100% and reassess in 2 hours  \nB. Start BiPAP and titrate oxygen to SpO₂ 88–92%  \nC. Immediate endotracheal intubation and volume control ventilation  \nD. Give IV morphine 2 mg for dyspnea relief  \nE. Begin IV acetazolamide 500 mg for metabolic alkalosis\n\n### Correct answer\nB\n\n### Rationale\nIn acidemic hypercapnic AECOPD, **NIV** is first‑line and reduces intubation/mortality; oxygen should be **titrated to 88–92%** to avoid worsening CO₂ retention. Intubate if NIV fails or contraindicated. Morphine is not recommended for routine dyspnea management here. citeturn2search7turn2search31\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 72‑year‑old woman with chronic HFrEF on furosemide 40 mg PO BID presents with sudden severe dyspnea and pink frothy sputum after missing antihypertensives. BP 220/110 mmHg, HR 118, RR 32, SpO₂ 86% on 6 L NC; JVP elevated, diffuse rales. You consider giving only IV furosemide and waiting for effect.\n\n### Options\nA. Start BiPAP and **IV nitroglycerin infusion with rapid up‑titration**, plus IV loop diuretic  \nB. Give IV morphine and low‑dose IV fluids to “improve renal perfusion,” reassess later  \nC. Trial oxygen by nasal cannula only; avoid NIV due to aspiration risk  \nD. Start IV beta‑blocker for tachycardia before afterload reduction  \nE. Hold all therapies until BNP results return\n\n### Correct answer\nA\n\n### Rationale\nHypertensive flash pulmonary edema benefits from **early NIV** and **rapid‑titration IV nitroglycerin** to unload the heart, alongside loop diuretic; withholding vasodilator or relying on morphine/fluids is harmful. The pitfall is **under‑treating hypertensive pulmonary edema** by using diuretics alone and delaying vasodilator/NIV. citeturn2search7turn2search16\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What inpatient **SpO₂ target** should you write for known COPD with hypercapnia risk?  \n  A: **88–92%**; document the target and reassess with gases. citeturn2search31\n- Q: Initial **IV loop diuretic** dose if on furosemide 40 mg PO BID at home?  \n  A: About **100 mg IV BID** (~2.5× PO total daily dose as IV), then adjust within 2 hours by urine response. citeturn2search37\n- Q: First‑line ventilatory support for **AECOPD with acidemia**?  \n  A: **NIV (BiPAP/CPAP)** with close monitoring and failure criteria. citeturn2search7\n- Q: Hemoglobin threshold to consider **RBC transfusion** in a stable adult inpatient?  \n  A: A **restrictive threshold ~7 g/dL** (consider 7.5–8 g/dL in selected cardiac/orthopedic settings). citeturn2search3\n\n## Guidelines & Key References\n- GOLD Pocket Guide to COPD Diagnosis & Management, **2024**. https://goldcopd.org/wp-content/uploads/2024/02/POCKET-GUIDE-GOLD-2024-ver-1.2-11Jan2024_WMV.pdf citeturn2search20\n- ERS/ATS Clinical Practice Guideline: **Noninvasive Ventilation for Acute Respiratory Failure**, **2017**. https://publications.ersnet.org/content/erj/50/2/1602426 citeturn2search7\n- **2022 AHA/ACC/HFSA Guideline** for the Management of Heart Failure. https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000001063 citeturn2search16\n- **BTS Oxygen Guideline** for adults in healthcare/emergency settings, **2017**. https://bmjopenrespres.bmj.com/content/4/1/e000170 citeturn2search32\n- Diuretic Therapy in HF: **ACC Ten Points to Remember**, **2020** (DOSE‑informed inpatient dosing). https://www.acc.org/latest-in-cardiology/ten-points-to-remember/2020/03/09/15/28/diuretic-therapy-for-patients-with-heart-failure citeturn2search37\n\n## CDI: What to Document Clearly Tonight\n- Acute on chronic **hypercapnic and hypoxemic respiratory failure** due to **COPD exacerbation**; severity by **ABG (pH, PaCO₂)**; evidence: wheeze, increased sputum, ABG/VBG; treatment: NIV, bronchodilators, **prednisone 40 mg PO x5 d**; monitoring: gases, mental status. citeturn2search7turn2search20\n- **Acute decompensated heart failure** with **acute cardiogenic pulmonary edema** (hypertensive); etiology: medication nonadherence/afterload crisis; evidence: hypertensive emergency, rales, ultrasound B‑lines, BNP; treatment: **NIV + IV nitroglycerin + IV loop diuretic**; monitoring: telemetry, I/O, BMP. citeturn2search16\n- **Volume overload** severity with response to diuresis (net negative, weight change); objective metrics: urine output in first 2 h, daily weights, creatinine/electrolytes; thera
