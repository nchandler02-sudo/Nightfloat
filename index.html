g IV**, double q3–5 min) and **pralidoxime** when indicated; anticipate copious secretions and need for early intubation.  \n- Sedative‑hypnotic (GABAergic) overdoses: ensure **airway/ventilation**; avoid **flumazenil** except narrow indications; supportive care usually suffices.  \n- Consider **EXTRIP** recommendations for dialyzable toxins (e.g., **salicylate**, **lithium**, **metformin**, **phenobarbital**); early nephrology input can be lifesaving.  \n- “What must happen now” (first hour): airway/ventilation, ECG, glucose, core labs (BMP, **VBG/ABG**, lactate), targeted levels (acetaminophen, salicylate), antidotes, early call to **Poison Control (1‑800‑222‑1222)**, ICU if unstable.  \n- “What can wait” (after stabilization): confirmatory tox screens, extended release imaging for body packing as needed, comprehensive psych/safety assessment, step‑down of insulin/pressors once hemodynamics stabilize.\n\n## Top ICU/Consult Triggers\n- Persistent or recurrent **hemodynamic instability** despite fluids and high‑dose vasopressors or need for **HIET/ECMO**.\n- Refractory **seizures**, **hyperthermia >41°C**, or **severe metabolic acidosis** (**pH <7.2**) after initial measures.\n- **QRS ≥160 ms**, malignant ventricular arrhythmias, or rising troponin/RV strain in suspected toxin‑induced cardiotoxicity.\n- **Respiratory failure** requiring mechanical ventilation or escalating **FiO₂/PEEP**; impending airway from cholinergic secretions.\n- **Acetaminophen** toxicity with **INR ≥2**, encephalopathy, or rising aminotransferases suggesting evolving **acute liver failure**.\n\n## Orders to Place Now\n- Order: Airway management — {prepare RSI; avoid succinylcholine if hyperkalemia/rhabdo risk; use rocuronium}\n- Order: Naloxone — {0.04–0.4 mg IV titrate; may repeat q2–3 min; alternative 4 mg IN if no IV}\n- Order: Sodium bicarbonate bolus — {1–2 mEq/kg IV push for QRS widening; repeat to QRS <100 ms; target pH 7.50–7.55}\n- Order: High‑dose insulin euglycemia therapy — {regular insulin 1 U/kg IV bolus then 0.5–1 U/kg/h; start dextrose infusion; monitor glucose/K⁺/Mg²⁺/phosphate q15–60 min}\n- Order: 20% lipid emulsion — {1.5 mL/kg IV bolus then 0.25 mL/kg/min; consider repeat bolus; max ~10 mL/kg; monitor triglycerides}\n- Order: Activated charcoal — {50–100 g PO/NG once if ≤1 h since ingestion and airway protected}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 58‑year‑old man presents 90 minutes after ingesting an unknown amount of extended‑release verapamil. He is somnolent, BP 78/46 mmHg, HR 48 bpm, cool extremities, glucose 12.3 mmol/L, lactate 5.6 mmol/L. ECG shows sinus bradycardia without QRS widening. After 2 L crystalloid, **calcium chloride 1 g IV**, and norepinephrine to 0.2 μg/kg/min, he remains hypotensive.\n\n### Options\nA. Glucagon 5 mg IV bolus followed by 5 mg/h infusion  \nB. Epinephrine infusion escalation alone  \nC. High‑dose insulin euglycemia therapy (bolus **1 U/kg**, then **0.5–1 U/kg/h**)  \nD. Lipid emulsion as first‑line therapy  \nE. Atropine 1 mg IV q3 min up to 3 mg, then observe\n\n### Correct answer\nC\n\n### Rationale\nHigh‑dose insulin euglycemia therapy (HIET) is the **early** cornerstone for **CCB‑induced cardiogenic shock**, improving inotropy and metabolism; start **1 U/kg bolus then 0.5–1 U/kg/h** with dextrose and electrolyte monitoring. Calcium and catecholamines are adjuncts but often insufficient alone; glucagon is more useful for **β‑blocker** toxicity; lipid is considered when instability persists despite standard therapy. Guidelines and poison‑center protocols endorse early HIET in severe CCB toxicity with hypotension/bradycardia.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 32‑year‑old woman with severe agitated delirium, dry flushed skin, mydriasis, and urinary retention arrives after taking “sleeping pills.” ECG shows **QRS 128 ms** with tall terminal R in aVR. You consider physostigmine to reverse anticholinergic delirium.\n\n### Options\nA. Physostigmine 1 mg IV over 1 min with repeat dosing to effect  \nB. Lorazepam and external cooling; observe  \nC. Sodium bicarbonate **1–2 mEq/kg IV** bolus, repeat to QRS <100 ms, then reassess delirium  \nD. Flumazenil 0.2 mg IV  \nE. Haloperidol 10 mg IM\n\n### Correct answer\nC\n\n### Rationale\nThe **pitfall** is administering **physostigmine** in the setting of **sodium‑channel blockade** (e.g., TCA/diphenhydramine) evidenced by **QRS ≥100 ms**/**R in aVR**; this risks bradyasystole and seizures. First treat membrane toxicity with **sodium bicarbonate** and alkalinization; delirium often improves as cardiotoxicity resolves. Flumazenil is contraindicated in mixed/unknown overdoses; high‑dose antipsychotics can worsen hyperthermia and lower seizure threshold.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What QRS duration predicts seizures in TCA toxicity?  \n  A: **QRS >100 ms** predicts seizures; **>160 ms** predicts ventricular arrhythmias.\n- Q: Initial IV insulin bolus and infusion for HIET in severe CCB shock?  \n  A: **1 U/kg IV bolus**, then **0.5–1 U/kg/h** infusion with dextrose and electrolytes monitored closely.\n- Q: Preferred first‑line sedation for severe sympathomimetic toxicity with hyperthermia?  \n  A: **Benzodiazepines** aggressively plus **active cooling**; avoid pure beta‑blockers for hypertension.\n- Q: When is single‑dose activated charcoal reasonable?  \n  A: Within **≤1 h** of a potentially toxic ingestion if the **airway is protected** or intubated, and the agent binds charcoal.\n- Q: Opioid‑associated arrest—should naloxone delay CPR/defibrillation?  \n  A: No; **start CPR/AED immediately** and give **naloxone as soon as available** without interrupting resuscitation.\n\n## Guidelines & Key References\n- American Heart Association. **2025 AHA Guidelines, Part 10: Special Circumstances of Resuscitation (Poisoning)**. Circulation. https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000001380\n- American Heart Association. **2023 Focused Update on Adult ACLS & Management of Cardiac Arrest/Life‑Threatening Toxicity Due to Poisoning**. Summary: ABEM Clinical Policy Alert. https://www.abem.org/wp-content/uploads/2024/07/key-advances_-aha-updates-for-acls-2018-2019_clinical-policy-alert.pdf\n- ACMT Position Statement. **Guidance for the Use of Intravenous Lipid Emulsion** (2016/2017). https://link.springer.com/content/pdf/10.1007/s13181-016-0550-z.pdf and ACMT Interim Guidance (2022). https://www.acmt.net/wp-content/uploads/2022/06/PRS_111001_Interim-Guidance-for-the-Use-of-Lipid-Resuscitation-Therapy.pdf\n- AACT/EAPCCT. **Position Paper: Single‑Dose Activated Charcoal** (reaffirmed). https://www.clintox.org/wp-content/uploads/2016/04/Position-Statement-Single-Dose-Activated-Charcoal-1.pdf\n- AACT/EAPCCT. **Position Paper Update: Whole Bowel Irrigation** (2015). https://www.clintox.org/wp-content/uploads/2016/04/Position-Statement-Whole-Bowel-Irrigation-1.pdf\n- America’s Poison Centers, AACT, ACMT, CAPCCT. **Consensus Guidelines for Acetaminophen Poisoning** (2023). https://poisoncenters.org/news-alerts/13244374\n\n## CDI: What to Document Clearly Tonight\n- Acute toxic encephalopathy due to {specific agent/class} with intent {accidental/suicidal/undetermined}; complication(s) {respiratory failure/shock/seizures/arrhythmia}.\n- Cardiotoxicity details: **QRS** {value}, rhythm/arrhythmia, **MAP**, vasopressor needs; interventions (bicarbonate, HIET, lipid, ECMO).\n- Objective evidence: agent levels (e.g., acetaminophen, salicylate), ABG/VBG, lactate, creatinine kinase for rhabdomyolysis, temperature curve, imaging if applicable.\n- Treatments/antidotes given with doses/titration: naloxone, sodium bicarbonate, calcium, insulin/dextrose protocol, lipid emulsion, benzodiazepines; response to therapy.\n- Risk and safety: aspiration risk and airway protection status for decontamination; Poison Control consulted; monitoring plan (telemetry, serial ECGs, labs).\n", "vte-pe-practicalities.md": "---\nfilename: vte-pe-practicalities.md\nid: vte-pe-practicalities\ntitle: VTE/PE Practicalities\nslug: vte-pe-practicalities\ntags: [pulmonary-embolism, vte, night-float]\nlevel: resident\nestimated_time_min: 20\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# VTE/PE Practicalities\n\n## Panic Card\n- Assess airway/breathing/circulation; titrate oxygen to **SpO₂ ≥92%**; if shock, start norepinephrine to target **MAP ≥65 mmHg** and obtain large‑bore IV access.\n- Start parenteral anticoagulation unless absolute contraindication; prefer unfractionated heparin (UFH) if any chance of procedures/lysis (short half‑life, reversible).\n- If PE with hypotension or cardiac arrest, activate PE/PERT pathway and get stat bedside echo for RV failure; prepare for systemic thrombolysis or catheter/surgical reperfusion.\n- “Confirm Before Proceed”: screen absolute contraindications before systemic thrombolysis (intracranial pathology, recent major surgery/bleed, uncontrolled hypertension).\n- If deteriorating despite support, escalate rapidly: consider systemic thrombolysis (alteplase **100 mg IV over 2 h**) or catheter‑directed/surgical embolectomy; involve ICU and cardiology/IR/CT surgery early.\n\n## Brief Overview\n- **Guideline Must‑Know:** Risk‑stratify early: high‑risk (massive) = **sustained SBP <90 mmHg** or need for vasopressors; intermediate‑risk = normotension with RV dysfunction and/or positive troponin/BNP; low‑risk = none of the above (ESC/ERS; AHA/ACC; CHEST; ASH).\n- **Guideline Must‑Know:** Use sPESI/PESI to guide level of care and early discharge; **sPESI 0** suggests low short‑term mortality if reliable follow‑up and no concerning comorbidity.\n- **Guideline Must‑Know:** RV dysfunction can be defined by echo or CTPA (**RV:LV ≥1.0**) plus biomarker elevation; intermediate‑high risk requires monitored setting and early team discussion.\n- **Guideline Must‑Know:** Initiate anticoagulation promptly once PE is likely and bleeding risk acceptable; parenteral therapy is preferred if unstable or if reperfusion might be needed; choose UFH when procedural/lysis pathways are on the table.\n- **Guideline Must‑Know:** UFH dosing: **80 units/kg IV bolus** then **18 units/kg/h** infusion with aPTT or anti‑Xa titration; consider reduced/omit bolus in tenuous patients pending lysis/catheter therapy.\n- **Guideline Must‑Know:** LMWH (enoxaparin) **1 mg/kg SC q12h** (or **1 mg/kg daily** if **CrCl <30 mL/min**) is preferred over UFH in stable patients without procedures expected; lower HIT risk and more predictable.\n- **Guideline Must‑Know:** Direct oral anticoagulants are first‑line for most hemodynamically stable patients: apixaban **10 mg BID ×7 d → 5 mg BID**; rivaroxaban **15 mg BID ×21 d → 20 mg daily**; avoid in **CrCl <30 mL/min**, significant liver disease, pregnancy, or triple‑positive antiphospholipid syndrome.\n- **Guideline Must‑Know:** High‑risk PE (shock/hypotension) warrants immediate reperfusion; systemic thrombolysis (alteplase **100 mg over 2 h**) is standard when no absolute contraindication exists; catheter‑directed therapy or surgical embolectomy are alternatives when bleeding risk is high or lysis fails.\n- Distinguish what must happen now (stabilize ABCs, start anticoagulation, risk‑stratify, call PERT/ICU if intermediate‑high/high risk) versus what can wait (thrombophilia testing, long‑term anticoagulation duration discussion, outpatient exercise counseling).\n- Pitfalls: missing occult RV strain in “normal BP” patients (watch for rising troponin/BNP, **lactate >2 mmol/L**, tachycardia, escalating O₂); delaying anticoagulation for hours while waiting for imaging in a high‑probability case without bleeding risk.\n- Consider IVC filter only if **absolute contraindication to anticoagulation** or recurrent PE despite **therapeutic** anticoagulation; plan removal once anticoagulation can resume.\n- Treat cancer‑associated VTE with a DOAC or LMWH; choose LMWH or apixaban preferentially when GI/GU bleeding risk is high; coordinate with oncology for procedures and drug‑drug interactions.\n- Pregnancy/postpartum: favor LMWH throughout; avoid DOACs and warfarin in pregnancy; consult MFM; adapt imaging to minimize radiation while ensuring diagnosis.\n- Subsegmental PE without DVT and low recurrence risk may be observed with close follow‑up; if high risk (active cancer, reduced cardiopulmonary reserve, pregnancy), anticoagulate.\n- “Confirm Before Proceed”: irreversible steps include systemic thrombolysis and urgent anticoagulation reversal; re‑check last head imaging, recent surgeries, and platelet count before proceeding.\n- Disposition: low‑risk, reliable patients may be managed early‑discharge/outpatient on DOACs; intermediate‑high risk needs monitored unit; high‑risk goes to ICU with vasopressor/hemodynamic support.\n- Follow‑up: arrange 3‑month reassessment to decide on indefinite therapy for unprovoked VTE; screen persistent dyspnea for CTEPH; ensure anticoagulant adherence and bleeding surveillance.\n\n## Top ICU/Consult Triggers\n- Hypotension (**SBP <90 mmHg** for ≥15 min) or vasopressor requirement, or **MAP <65 mmHg** despite fluids.\n- Evidence of RV failure with biomarker elevation (troponin/BNP), **RV:LV ≥1.0**, or severe hypoxemia requiring high‑flow/NIV or escalating FiO₂.\n- Rising **lactate >2 mmol/L**, syncope, or recurrent/progressive PE on therapy.\n- Contraindication to anticoagulation with ongoing PE, or consideration of thrombolysis/catheter/surgical embolectomy.\n- Cardiac arrest or peri‑arrest physiology; activate PERT and consider lysis/embolectomy/ECMO.\n\n## Orders to Place Now\n- Order: Unfractionated heparin infusion — {weight_kg, initial_bolus=80 U/kg (yes/no), infusion=18 U/kg/h, monitoring=aPTT_or_antiXa_goal, platelet_count_baseline}\n- Order: CT pulmonary angiography — {renal_function_check, contrast_allergy_status, pregnancy_test_if_applicable, IV_access_confirmed}\n- Order: Bedside transthoracic echocardiogram — {RV_size_function, RV:LV_ratio, TAPSE, PASP_estimate, pericardial_effusion}\n- Order: Cardiac biomarkers and lactate — {troponin, BNP/NT‑proBNP, lactate, baseline_Hgb_platelets_type_and_screen}\n- Order: Lower‑extremity venous duplex ultrasound — {if_subsegmental_PE_or_uncertain_source, timing=within_24h}\n- Order: Alteplase for PE (if indicated) — {dose=100 mg_IV_over_2h, exclusion_checklist_complete=yes, post‑lysis_echo_and_hgb_checks}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 67‑year‑old man with sudden dyspnea and pleuritic chest pain is hypotensive (BP 78/48 mmHg), tachycardic, and hypoxemic on 6 L nasal cannula. CTPA shows extensive bilateral PE with **RV:LV 1.2**. Troponin is elevated. He has no history of recent surgery or intracranial disease. UFH was started 20 minutes ago.\n\n### Options\nA. Continue UFH alone and observe in ICU  \nB. Systemic thrombolysis with alteplase **100 mg IV over 2 h**  \nC. Place an IVC filter and continue UFH  \nD. Catheter‑directed thrombolysis as first‑line in all high‑risk PE  \nE. Start a DOAC now and stop UFH\n\n### Correct answer\nB\n\n### Rationale\nHigh‑risk (massive) PE with hypotension and RV dysfunction warrants immediate reperfusion; systemic thrombolysis with alteplase **100 mg over 2 h** is recommended when no absolute contraindication exists. UFH alone is inadequate in shock; IVC filters are not first‑line when anticoagulation is feasible; DOACs are not used in unstable patients; catheter‑directed therapy is reserved for bleeding risk or failed lysis.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 58‑year‑old woman with acute PE, **SBP 82/50 mmHg**, RV dilation on echo, and rising lactate presents 10 days after a large ischemic stroke with hemorrhagic transformation. UFH is infusing.\n\n### Options\nA. Systemic thrombolysis with alteplase **100 mg over 2 h**  \nB. Escalate UFH only and avoid reperfusion therapies  \nC. Emergent catheter‑directed embolectomy/thrombolysis after multidisciplinary discussion  \nD. Insert IVC filter and stop anticoagulation  \nE. Switch to rivaroxaban urgently\n\n### Correct answer\nC\n\n### Rationale\nRecent intracranial hemorrhage is an absolute contraindication to systemic thrombolysis; in high‑risk PE with shock, catheter‑based or surgical embolectomy is preferred while continuing UFH. The pitfall is proceeding with systemic lysis despite a clear absolute contraindication; IVC filter alone is insufficient in shock without reperfusion.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What RV/LV ratio on CTPA signals RV strain that upstages risk?  \n  A: **RV:LV ≥1.0** suggests RV dysfunction and supports intermediate‑risk categorization.\n- Q: What is the weight‑based UFH starting regimen for PE?  \n  A: **80 U/kg IV bolus** then **18 U/kg/h** infusion with aPTT/anti‑Xa titration.\n- Q: First‑line outpatient regimen for stable PE without severe kidney/liver disease?  \n  A: Apixaban **10 mg BID ×7 d → 5 mg BID** or rivaroxaban **15 mg BID ×21 d → 20 mg daily**.\n- Q: When is an IVC filter appropriate?  \n  A: Only for **absolute contraindication to anticoagulation** or recurrent PE despite verified therapeutic anticoagulation.\n\n## Guidelines & Key References\n- ESC/ERS Guidelines for Acute Pulmonary Embolism, 2019 — European Society of Cardiology (overview page with links) https://www.escardio.org/guidelines/clinical-practice-guidelines/acute-pulmonary-embolism-diagnosis-and-management-of/\n- CHEST Antithrombotic Therapy for VTE Disease, 2021 — American College of Chest Physicians (full text) https://journal.chestnet.org/article/S0012-3692(21)01506-3/fulltext\n- ASH 2020 Guidelines: Treatment of DVT and PE — American Society of Hematology (Blood Advances) https://ashpublications.org/bloodadvances/article/4/19/4693/463998/\n- AHA Scientific Statement: Interventional Therapies for Acute PE, 2019 — Circulation https://www.ahajournals.org/doi/pdf/10.1161/CIR.0000000000000707\n- PERT Consortium Consensus Practice for Acute PE, 2019 — Clinical and Applied Thrombosis/Hemostasis (PDF) https://acforum-excellence.org/Resource-Center/resource_files/1364-2019-06-13-052732.pdf\n\n## CDI: What to Document Clearly Tonight\n- Acute pulmonary embolism with risk category (high‑risk with shock / intermediate‑high with RV strain / low‑risk) + objective data (CTPA **RV:LV**, troponin/BNP, lactate, echo findings).\n- Etiology/association: provoked vs unprovoked; transient risk (recent surgery, immobilization) vs persistent (active cancer, APS).\n- Right heart failure/cor pulmonale status and presence/absence of hypoxemic respiratory failure; hemodynamic instability (**MAP**, vasopressors).\n- Treatment and intensity: therapeutic anticoagulation (agent, **dose**, monitoring), thrombolysis or catheter/surgical embolectomy (timing, response), IVC filter if placed with indication.\n- Bleeding risk/contraindications explicitly stated (recent ICH/surgery, platelet count), and plan for duration of anticoagulation and follow‑up.\n", "transfusion-reactions-and-urgent-transfusion.md": "---\nfilename: transfusion-reactions-and-urgent-transfusion.md\nid: transfusion-reactions-and-urgent-transfusion\ntitle: Transfusion Reactions & Urgent Transfusion\nslug: transfusion-reactions-and-urgent-transfusion\ntags: [internal-medicine, inpatient, night-float]\nlevel: resident\nestimated_time_min: 15\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Transfusion Reactions & Urgent Transfusion\n\n## Panic Card\n- Stop transfusion immediately; keep IV line open with 0.9% saline; perform ABCs; place on monitor; target **MAP ≥65 mmHg** and **SpO₂ 92–96%**.\n- Verify patient ID and unit numbers; send bag/tubing to blood bank; draw post‑reaction specimens (EDTA + clotted) for **DAT, hemolysis labs, repeat type/screen**.\n- For anaphylaxis: give **epinephrine 0.3–0.5 mg IM** (1 mg/mL), airway/oxygen, IV fluids; add H1/H2 blocker and steroids after epinephrine.\n- For suspected acute hemolysis (fever, back/chest pain, hemoglobinuria, hypotension/DIC): aggressive isotonic fluids, maintain **UOP ≥1 mL/kg/h**, early vasopressors if needed, labs for DIC.\n- Massive bleeding/instability: activate MTP; give RBC:plasma:platelets in balanced ratios; **warm all products**; give **calcium** to counter citrate; obtain fibrinogen and consider **cryo if fibrinogen <1.5–2.0 g/L**.\n- Confirm Before Proceed: emergency‑release uncrossmatched blood and Rh selection (O‑negative for females of childbearing potential) are high‑impact decisions—double‑check indication and documentation.\n\n## Brief Overview\n- Transfusion reactions cluster into acute hemolytic, febrile nonhemolytic, allergic (urticaria → anaphylaxis), TRALI, TACO, bacterial contamination/sepsis, and delayed hemolytic; initial steps are the same: stop transfusion, maintain IV with saline, re‑ID, and notify blood bank promptly.\n- **Guideline Must‑Know:** AABB recommends restrictive RBC thresholds (e.g., **Hb <7 g/dL** in stable adults, higher in ACS/neurologic injury); transfuse **1 unit → ~1 g/dL (10 g/L)** rise; reassess after each unit.\n- **Guideline Must‑Know:** For emergency release, type O RBC is acceptable; choose **O‑negative** for females of childbearing potential and **O‑positive** may be used for adult males/post‑menopausal females if inventory is constrained.\n- **Guideline Must‑Know:** TRALI presents within **≤6 h** with acute hypoxemia, bilateral infiltrates, and noncardiogenic edema; management is supportive (oxygen/ventilation); do not give diuretics for TRALI.\n- **Guideline Must‑Know:** TACO is hydrostatic pulmonary edema within **≤6 h** with hypertension, JVP elevation, BNP rise; treat with **IV loop diuretics**, oxygen, and slow future transfusions with volume management.\n- **Guideline Must‑Know:** Acute hemolytic reaction (often ABO) features fever, flank/back pain, hypotension, hemoglobinuria, DAT positive; treat with fluids, maintain **UOP ≥1 mL/kg/h**, correct coagulopathy, pressors for **MAP ≥65 mmHg**.\n- **Guideline Must‑Know:** For anaphylaxis during transfusion, the first‑line therapy is **IM epinephrine 0.3–0.5 mg**, airway/oxygen/fluids; consider IgA deficiency if severe; future transfusions may need washed/IgA‑deficient products.\n- Febrile nonhemolytic reaction: fever/rigors without hemolysis; after evaluation and exclusion of serious causes, antipyretics may be used; resume only if reaction workup and clinical assessment support safety.\n- Suspect bacterial contamination with severe fever, rigors, hypotension early in platelet transfusion or after any product; obtain blood cultures, start **broad‑spectrum antibiotics**, and culture the product via blood bank.\n- **Guideline Must‑Know:** In massive hemorrhage, activate MTP early; use balanced resuscitation (e.g., RBC:plasma:platelets approximating **1:1:1** or viscoelastic‑guided); **warm products** and monitor **ionized calcium** and **fibrinogen**.\n- **Guideline Must‑Know:** Plasma dose **10–15 mL/kg** for coagulopathy; cryoprecipitate (10‑unit pool) typically raises fibrinogen by **~100 mg/dL (~1 g/L)**; target **fibrinogen ≥1.5–2.0 g/L** in hemorrhage.\n- Platelet transfusion: one apheresis unit raises count by **~30–50 ×10⁹/L**; transfuse if **<10 ×10⁹/L** prophylactically, or **<50 ×10⁹/L** with active bleeding/procedure (higher for CNS/ocular).\n- Distinguish TRALI vs TACO using timing, hemodynamics, BNP, and echo when feasible; both require oxygen and monitoring; ICU if escalating oxygen/vent needs or shock.\n- What must happen now: stop transfusion, stabilize ABCs, notify blood bank, send reaction workup, start syndrome‑specific therapy (epi for anaphylaxis, diuretics for TACO, fluids/pressors for hemolysis, antibiotics if sepsis).\n- What can wait: secondary testing (e.g., extended antigen workups), long‑term alloimmunization prevention strategy, and outpatient follow‑up documentation once the patient stabilizes.\n- Pitfalls: continuing transfusion after “just giving acetaminophen” without excluding hemolysis; mislabeling TRALI as TACO (or vice versa); failing to give O‑negative emergency blood to a woman of childbearing potential; neglecting calcium during MTP.\n- Confirm Before Proceed: thrombolytics for hemorrhagic shock from non‑thrombotic causes are inappropriate; emergency‑release uncrossmatched units require explicit documentation of risk acceptance and prompt post‑issue compatibility testing.\n\n## Top ICU/Consult Triggers\n- Persistent or worsening hypoxemia (e.g., **SpO₂ <90%** on high‑flow oxygen) or need for noninvasive/invasive ventilation after suspected TRALI/TACO.\n- Hemodynamic instability or shock requiring vasopressors after suspected hemolytic reaction or septic transfusion reaction.\n- Massive hemorrhage with ongoing transfusion requirement despite MTP, **lactate rising**, or **fibrinogen <1.5 g/L** refractory to cryo.\n- Overt DIC or multiorgan dysfunction (AKI, altered mental status) associated with a transfusion reaction.\n\n## Orders to Place Now\n- Order: Transfusion reaction workup — {patient identifiers, unit number(s), pre/post specimens, DAT, hemolysis panel, repeat type and screen}\n- Order: Hold and return implicated blood product to blood bank — {unit number(s), tubing attached}\n- Order: Epinephrine IM — {0.3–0.5 mg of 1 mg/mL, lateral thigh, repeat q5–15 min as needed}\n- Order: Massive transfusion protocol activation — {yes; notify lab/blood bank; goal RBC:plasma:platelets ≈1:1:1; include cryoprecipitate per fibrinogen}\n- Order: Emergency‑release uncrossmatched RBC — {O‑negative vs O‑positive per policy; {number of units}; document indication}\n- Order: Furosemide IV — {e.g., 20–40 mg IV now for TACO; hold if hypotension or hypovolemia}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 66‑year‑old man with GI bleeding receives his first unit of RBCs. After 20 minutes he develops fever (38.9°C), chills, back pain, and dark urine. BP is 86/52 mmHg, HR 118/min. The nurse stops the transfusion and maintains IV access with normal saline. Which is the best next step?\n\n### Options\nA. Administer acetaminophen and restart transfusion once afebrile  \nB. Give IV furosemide and resume transfusion at a slower rate  \nC. Send a transfusion reaction workup (including DAT) and begin aggressive IV fluids  \nD. Switch to O‑negative RBCs and continue the transfusion  \nE. Administer IV methylprednisolone and immediately restart transfusion\n\n### Correct answer\nC\n\n### Rationale\nSuspected acute hemolytic transfusion reaction requires immediate laboratory confirmation (including **DAT**) and aggressive resuscitation with isotonic fluids to maintain **UOP ≥1 mL/kg/h**, with pressors as needed, before any further transfusion is considered. Antipyretics, steroids, or diuretics are inappropriate without excluding hemolysis; the transfusion should not be resumed until evaluated per AABB hemovigilance guidance.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 28‑year‑old woman (unknown blood type) presents with exsanguinating pelvic trauma. She is obtunded, BP 72/38 mmHg, HR 132/min. There is no time for crossmatch. Which immediate blood product choice is most appropriate to initiate massive transfusion?\n\n### Options\nA. Emergency‑release O‑positive RBCs  \nB. Emergency‑release O‑negative RBCs  \nC. Type‑specific, uncrossmatched RBCs after an abbreviated screen  \nD. Delay transfusion until full crossmatch is complete  \nE. Group AB plasma only until RBC crossmatch returns\n\n### Correct answer\nB\n\n### Rationale\nFor females of childbearing potential with unknown type in life‑threatening hemorrhage, **O‑negative RBCs** are preferred to avoid RhD alloimmunization; this is a common pitfall when inventories are tight. Type‑specific or crossmatched units are ideal but unsafe to delay in hemorrhagic shock.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: TRALI vs TACO—what is the key management difference?  \n  A: TRALI is noncardiogenic; provide supportive oxygen/ventilation; avoid routine diuretics. TACO is hydrostatic; give IV loop diuretics and slow future transfusions.\n- Q: What fibrinogen target do you use during massive bleeding?  \n  A: Maintain fibrinogen **≥1.5–2.0 g/L**; give cryoprecipitate or fibrinogen concentrate to achieve this.\n- Q: What is the minimum urine output target during suspected acute hemolysis?  \n  A: Aim **≥1 mL/kg/h** with isotonic fluids; add vasopressors if needed for MAP goals.\n- Q: Standard plasma dose for coagulopathy correction?  \n  A: **10–15 mL/kg** of plasma; recheck INR/PT and clinical bleeding after dosing.\n\n## Guidelines & Key References\n- AABB Red Blood Cell Transfusion Guidelines (2023) — https://www.aabb.org/clinical-resources/guidelines  \n- AABB Circular of Information for the Use of Human Blood and Blood Components (current edition) — https://www.aabb.org/regulatory-and-advocacy/regulatory-affairs/circular-of-information  \n- International Consensus on TRALI (revised definition, 2019) — https://www.isbtweb.org/working-parties/haemovigilance/definitions.html  \n- British Society for Haematology: Guidelines on the investigation and management of acute transfusion reactions (2020) — https://b-s-h.org.uk/guidelines  \n\n## CDI: What to Document Clearly Tonight\n- Acute transfusion reaction: type (e.g., acute hemolytic, TRALI, TACO, allergic/anaphylaxis), acuity, suspected cause (e.g., ABO incompatibility vs volume overload), severity (shock/respiratory failure/DIC), objective evidence (vitals, DAT, hemolysis labs, imaging), and treatments given.\n- Hemorrhagic shock due to {source}: acuity and stage, objective evidence (BP, lactate, Hgb trend, INR/fibrinogen/platelets), interventions (MTP activated, products/doses, calcium, warming, TXA if used), response.\n- Anaphylaxis due to blood product: trigger, organ systems involved, objective evidence (hypotension, airway edema, hypoxemia), epinephrine dose and response, adjuncts, need for ICU/airway.\n- TACO vs TRALI: document diagnostic rationale, timing (≤6 h), hemodynamics, BNP/echo/x‑ray findings, oxygen/ventilation needs, diuretic use (for TACO) or avoidance (for TRALI).\n"};

  {id:'assessment-complete',n:'Assessment Complete',e:'📋',cat:'assessment',cond:'assessmentComplete'}
];
const SHOP_DATA={
  avatars:[{id:'avatar-1',n:"Caffeinated Intern",d:"Running on espresso and adrenaline",p:100,e:'☕'},{id:'avatar-2',n:"Stethoscope Samurai",d:"Auscultation is an art form",p:150,e:'🩺'},{id:'avatar-3',n:"Pager Phantom",d:"You swear you heard it ring… again",p:200,e:'📟'},{id:'avatar-4',n:"IV Wizard",d:"First-stick success rate: mythical",p:250,e:'🧙'},{id:'avatar-5',n:"Night Owl",d:"Peak performance between 2–5 AM",p:300,e:'🦉'},{id:'avatar-6',n:"Code Captain",d:"Runs codes like a well-oiled machine",p:350,e:'🫀'},{id:'avatar-7',n:"Lactate Hunter",d:"No occult shock escapes your watch",p:400,e:'🔍'},{id:'avatar-8',n:"Attending Energy",d:"Radiates calm confidence at 4 AM",p:500,e:'👑'}],

};
const WEEKLYS=[{n:"Triple Threat",d:"Complete 3 topic quizzes in one session",t:3},{n:"Five-Alarm Call",d:"Study 5 different topics this week",t:5},{n:"Question Blitz",d:"Answer 20 questions in a single day",t:20},{n:"Perfect Page",d:"Get a perfect score on any quiz",t:1},{n:"Pre/Post Showdown",d:"Complete both the pre-test and post-test",t:1},{n:"Streak Builder",d:"Log in 5 consecutive days this week",t:5},{n:"XP Avalanche",d:"Earn 500 XP in a single week",t:500}];

const def=()=>({un:'',pgy:'',obc:false,pre:{done:false,ans:{},sc:0,cq:0,perTopic:{}},post:{done:false,ans:{},sc:0,perTopic:{}},tc:{},xp:0,lv:1,coins:0,clif:0,streak:{c:0,ld:null},badges:[],topO:[],qa:{},mf:[],sv:{},shop:{p:[],eq:{av:null}},hs:{c:0},snd:false,dl:[],wc:{w:null,p:0},theme:'dark',bsd:null});
function ld(){try{var s=localStorage.getItem(SK);if(s){var p=JSON.parse(s);var d=def();p.pre={...d.pre,...(p.pre||{})};p.post={...d.post,...(p.post||{})};p.streak={...d.streak,...(p.streak||{})};p.shop={...d.shop,...(p.shop||{})};p.shop.eq={...d.shop.eq,...(p.shop&&p.shop.eq||{})};p.hs={...d.hs,...(p.hs||{})};p.wc={...d.wc,...(p.wc||{})};return{...d,...p};}}catch(e){}return def();}
function sv(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}
function getL(x){for(var i=LEVELS.length-1;i>=0;i--)if(x>=LEVELS[i].x)return LEVELS[i];return LEVELS[0];}
function getN(x){for(var i=0;i<LEVELS.length;i++)if(x<LEVELS[i].x)return LEVELS[i];return null;}
function getMult(s){if(s>=8)return 3;if(s>=6)return 2.5;if(s>=4)return 2;if(s>=2)return 1.5;return 1;}
function getIW(){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);var w=new Date(d.getFullYear(),0,4);return 1+Math.round(((d.getTime()-w.getTime())/86400000-3+(w.getDay()+6)%7)/7);}
function getWC(){return WEEKLYS[getIW()%7];}
function renderBT(t){if(!t)return t;t=t.replace(/\*\*Guideline Must[\s\u2011-]Know:\*\*/gi,'<span class="gltag">Guideline</span>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\{([^}]+)\}/g,'<span class="hlpill">$1</span>');return t;}
function compTC(tid,st,td){
  var opened=(st.topO||[]).includes(tid);
  var svw=(st.sv||{})[tid]||[];
  var totalSec=td?Object.keys(td.sections||{}).length+(td.refs&&td.refs.length?1:0):0;
  var qa=st.qa||{};
  var qAns=0,totalQ=td?(td.quizzes||[]).length:0;
  for(var i=0;i<totalQ;i++)if(qa[tid+'Q'+i])qAns++;
  var mFlip=0,totalM=td?(td.micros||[]).length:0;
  for(var i=0;i<totalM;i++)if((st.mf||[]).includes(tid+'M'+i))mFlip++;
  var crit=0;if(opened)crit++;if(svw.length>=4)crit++;if(totalQ>0&&qAns>=totalQ)crit++;if(totalM>0&&mFlip>=totalM)crit++;
  return{opened,svw:svw.length,totalSec,qAns,totalQ,mFlip,totalM,crit,done:crit>=3};
}

/* ═══ MAIN APP ═══ */
function App(){
  const[state,setState]=useState(ld);
  const[topics,setTopics]=useState([]);
  const[loading,setLoading]=useState(true);
  const[lprog,setLprog]=useState(0);
  const[view,setView]=useState('home');
  const[selTopic,setSelTopic]=useState(null);
  const[drawer,setDrawer]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[showShop,setShowShop]=useState(false);
  const[showProfile,setShowProfile]=useState(false);

  useEffect(()=>{sv(state);},[state]);
  useEffect(()=>{document.body.style.overflow=drawer?'hidden':'';},[drawer]);

  useEffect(()=>{
    async function load(){
      try{
        let files=window.TOPIC_MANIFEST||null;
        let embedded=window.TOPIC_FILES||null;
        if(!files){
          const res=await fetch('topics/manifest.json');
          if(!res.ok)throw new Error('No manifest');
          const data=await res.json();
          files=data.topics||data;
        }
        const loaded=[];
        for(let i=0;i<files.length;i++){
          try{
            let txt=null;
            if(embedded&&embedded[files[i]]){txt=embedded[files[i]];}
            else{const r=await fetch('topics/'+files[i]);if(!r.ok)continue;txt=await r.text();}
            if(!txt||txt.trim().startsWith('<!'))continue;
            loaded.push(window.parseMD(txt,files[i]));
          }catch(e){}
          setLprog(Math.round(((i+1)/files.length)*100));
        }
        setTopics(loaded);
        setState(prev=>{const tc={...prev.tc};loaded.forEach(t=>{tc[t.id]=compTC(t.id,prev,t);});return{...prev,tc};});
      }catch(e){console.warn('No manifest',e);}
      setLoading(false);
    }
    load();
  },[]);

  useEffect(()=>{
    if(loading)return;
    const today=new Date().toISOString().slice(0,10);
    setState(prev=>{
      const dl=[...prev.dl];if(!dl.includes(today))dl.push(today);
      const last=prev.streak.ld;let c=prev.streak.c;
      if(last){const diff=Math.floor((new Date(today)-new Date(last))/86400000);if(diff===1)c++;else if(diff>1)c=1;}else c=1;
      return{...prev,dl,streak:{c,ld:today},bsd:prev.bsd||today};
    });
  },[loading]);

  const addToast=useCallback((msg,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3000);
  },[]);

  const mult=useMemo(()=>getMult(state.streak.c),[state.streak.c]);

  const awardXP=useCallback((base)=>{
    const total=Math.round(base*mult);
    setState(prev=>{
      const nx=prev.xp+total;const ol=getL(prev.xp),nl=getL(nx);
      let nc=prev.coins+Math.floor(total/10),ncl=prev.clif+Math.floor(total/10);
      if(nl.l>ol.l){nc+=50;ncl+=50;try{confetti({particleCount:100,spread:70,origin:{y:0.6}})}catch(e){}}
      return{...prev,xp:nx,lv:nl.l,coins:nc,clif:ncl};
    });
    addToast(`+${total} XP${mult>1?' (×'+mult.toFixed(1)+')':''}`,'xp');
  },[mult,addToast]);

  const checkBadges=useCallback((ns)=>{
    const earned=[...ns.badges];const nb=[];
    BADGES.forEach(b=>{
      if(earned.includes(b.id))return;let u=false;
      if(b.cat==='topic'){(ns.topO||[]).forEach(tid=>{(b.kw||[]).forEach(kw=>{if(tid.includes(kw))u=true;});});}
      else if(b.cond==='s2')u=ns.streak.c>=2;
      else if(b.cond==='s4')u=ns.streak.c>=4;
      else if(b.cond==='s8')u=ns.streak.c>=8;
      else if(b.cond==='q100')u=Object.keys(ns.qa||{}).length>=100;
      else if(b.cond==='t15')u=(ns.topO||[]).length>=15;
      else if(b.cond==='hot5')u=ns.hs.c>=5;
      else if(b.cond==='c500')u=ns.clif>=500;
      else if(b.cond==='all20')u=(ns.topO||[]).length>=20;
      else if(b.cond==='assessed')u=ns.post&&ns.post.done;
      if(u){earned.push(b.id);nb.push(b);}
    });
    if(nb.length){nb.forEach(b=>addToast(`🏅 ${b.e} ${b.n}`,'badge'));try{confetti({particleCount:50,spread:60})}catch(e){}}
    return earned;
  },[addToast]);

  const openTopic=useCallback((topic)=>{
    setSelTopic(topic);setView('detail');setDrawer(false);
    setState(prev=>{
      const opened=[...prev.topO];
      if(!opened.includes(topic.id)){opened.push(topic.id);setTimeout(()=>awardXP(75),100);}
      const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,topO:opened},topic);
      const ns={...prev,topO:opened,tc};ns.badges=checkBadges(ns);return ns;
    });
  },[awardXP,checkBadges]);

  const cl=useMemo(()=>getL(state.xp),[state.xp]);
  const nl=useMemo(()=>getN(state.xp),[state.xp]);
  const xpPct=useMemo(()=>nl?((state.xp-cl.x)/(nl.x-cl.x))*100:100,[state.xp,cl,nl]);
  const compCount=useMemo(()=>Object.values(state.tc).filter(v=>v&&v.done).length,[state.tc]);
  const eqAv=useMemo(()=>{const av=(state.shop&&state.shop.eq&&state.shop.eq.av)||null;if(av){const it=SHOP_DATA.avatars.find(a=>a.id===av);return it?it.e:'❤️';}return'❤️';},[state.shop]);
  const blockDay=useMemo(()=>Math.min(28,Math.max(1,Math.floor((Date.now()-new Date(state.bsd||Date.now()).getTime())/86400000)+1)),[state.bsd]);

  if(loading)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
    <h2 style={{fontFamily:'Playfair Display'}}>🌙 The Night Shift</h2>
    <p style={{color:'var(--t3)',fontSize:'.85rem'}}>Survive the page, own the call.</p>
    <div className="lbar"><div className="lfill" style={{width:lprog+'%'}}/></div>
    <p style={{color:'var(--t3)',fontSize:'.75rem'}}>Loading... {lprog}%</p>
  </div>;

  if(!state.obc)return<Onboarding state={state} setState={setState} setView={setView}/>;
  if(view==='pretest')return<Assessment type="pretest" data={window.PRETEST_DATA} state={state} setState={setState} setView={setView} addToast={addToast}/>;
  if(view==='pretest-results')return<PretestResults state={state} setView={setView}/>;
  if(view==='posttest')return<Assessment type="posttest" data={window.POSTTEST_DATA} state={state} setState={setState} setView={setView} addToast={addToast} awardXP={awardXP} checkBadges={checkBadges}/>;
  if(view==='posttest-results')return<PosttestResults state={state} setView={setView}/>;
  if(view==='comparison')return<ComparisonView state={state} setView={setView}/>;

  return<div className={`wrap ${state.theme==='light'?'light':''}`}>
    <div className="tcontainer">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>
    <div className="mob">
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button style={{background:'none',border:'none',color:'var(--t1)',fontSize:'1.4rem',cursor:'pointer'}} onClick={()=>setDrawer(!drawer)}>☰</button>
        <span style={{fontSize:'.8rem',fontWeight:600}}>{cl.n}</span>
        {mult>1&&<span className="mult">×{mult.toFixed(1)}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12,fontSize:'.85rem'}}>
        <span>🪙 {state.coins}</span>
        <span style={{cursor:'pointer'}} onClick={()=>setState(p=>({...p,theme:p.theme==='dark'?'light':'dark'}))}>{state.theme==='dark'?'🌙':'☀️'}</span>
      </div>
    </div>
    <div className={`ov${drawer?' on':''}`} onClick={()=>setDrawer(false)}/>
    <div className={`side${drawer?' on':''}`}>
      <div className="slogo"><h2>🌙 The Night Shift</h2><span className="tag">Survive the page, own the call.</span></div>
      <div style={{fontSize:'.85rem',color:'var(--t2)',textAlign:'center'}}>Welcome, {state.un}!</div>
      <div className="sdiv"/>
      <div>
        <div className="xplbl"><span>{cl.n} (Lv.{cl.l})</span>{mult>1&&<span className="mult">×{mult.toFixed(1)}</span>}</div>
        <div className="xpbar"><div className="xpfill" style={{width:xpPct+'%'}}/></div>
        <div className="xptxt">{state.xp} / {nl?nl.x:'MAX'} XP</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <div style={{flex:1}}><div style={{fontSize:'.75rem',color:'var(--t2)',marginBottom:3}}>Topics {compCount}/20</div><div className="minibar"><div className="minifill" style={{width:(compCount/20*100)+'%',background:'linear-gradient(90deg,#10b981,#06b6d4)'}}/></div></div>
        <div style={{flex:1}}><div style={{fontSize:'.75rem',color:'var(--t2)',marginBottom:3}}>Day {blockDay}/28</div><div className="minibar"><div className="minifill" style={{width:(blockDay/28*100)+'%',background:'linear-gradient(90deg,#6366f1,#a855f7)'}}/></div></div>
      </div>
      <div className="stats"><span>🪙 {state.coins}</span><span>🔥 {state.streak.c}</span><span>{eqAv}</span></div>
      <div className="sdiv"/>
      <button className="sbtn" onClick={()=>{setView('home');setDrawer(false);}}>🏠 Home</button>
      <button className="sbtn" onClick={()=>setShowShop(true)}>🛒 Shop</button>
      <button className="sbtn" onClick={()=>setShowProfile(true)}>🏅 Profile & Badges</button>
      {compCount>=16?
        <button className="sbtn ul" onClick={()=>{if(!state.post.done)setView('posttest');else setView('comparison');setDrawer(false);}}>📝 {state.post.done?'View Comparison':'Take Post-Test'}</button>:
        <button className="sbtn lk" disabled>🔒 Post-Test ({compCount}/16 topics)</button>}
      <div className="sdiv"/>
      <div className="wwidget">
        <div className="wt">📅 Weekly Challenge</div>
        <div className="wn">{getWC().n}</div>
        <div className="minibar"><div className="minifill" style={{width:Math.min(100,(state.wc.p||0)/getWC().t*100)+'%',background:'linear-gradient(90deg,#f59e0b,#ef4444)'}}/></div>
        <div style={{fontSize:'.65rem',color:'var(--t3)',marginTop:2}}>{Math.min(state.wc.p||0,getWC().t)}/{getWC().t} — {getWC().d}</div>
      </div>
      <div className="sdiv"/>
      <div style={{fontSize:'.75rem',color:'var(--t3)',fontWeight:600}}>TOPICS</div>
      <div className="tlist">{topics.map(t=>{const tc=state.tc[t.id];const done=tc&&tc.done;return<div key={t.id} className="titem" onClick={()=>openTopic(t)}><span style={{fontSize:'.7rem',flexShrink:0}}>{done?'✅':'⬜'}</span><span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span></div>;})}</div>
      <div className="sdiv"/>
      <div className="ttog" onClick={()=>setState(p=>({...p,theme:p.theme==='dark'?'light':'dark'}))}>{state.theme==='dark'?'🌙 Dark':'☀️ Light'}</div>
      <div className="sbot">
        <button onClick={()=>setState(p=>({...p,snd:!p.snd}))}>{state.snd?'🔊':'🔇'} Sound</button>
        <button onClick={()=>{if(confirm('Reset all progress?')){localStorage.removeItem(SK);window.location.reload();}}}>🔄 Reset</button>
      </div>
    </div>
    <div className="main">
      {view==='home'&&<Home state={state} topics={topics} openTopic={openTopic} compCount={compCount} setView={setView}/>}
      {view==='detail'&&selTopic&&<Detail topic={selTopic} state={state} setState={setState} setView={setView} awardXP={awardXP} addToast={addToast} topics={topics} checkBadges={checkBadges}/>}
    </div>
    {showShop&&<ShopModal state={state} setState={setState} onClose={()=>setShowShop(false)} addToast={addToast}/>}
    {showProfile&&<ProfileModal state={state} onClose={()=>setShowProfile(false)} setView={setView}/>}
  </div>;
}

function Onboarding({state,setState,setView}){
  const[name,setName]=useState('');const[pgy,setPgy]=useState('');
  return<div className={state.theme==='light'?'light':''}><div className="obscreen"><div className="obcard">

    <button className="anxt" disabled={!name.trim()||!pgy} onClick={()=>{setState(p=>({...p,un:name.trim(),pgy,obc:true,pre:{...p.pre,startedAt:new Date().toISOString()}}));setView('pretest');}}>Begin Pre-Test →</button>
    <button style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontSize:'.82rem',marginTop:12,padding:'8px 16px',textDecoration:'underline'}} disabled={!name.trim()||!pgy} onClick={()=>{setState(p=>({...p,un:name.trim(),pgy,obc:true,pre:{...p.pre,done:false}}));setView('home');}}>Skip Pre-Test for now</button>
  </div></div></div>;
}

function Assessment({type,data,state,setState,setView,addToast,awardXP,checkBadges}){
  const qs=data.questions;
  const key=type==='pretest'?'pre':'post';
  const[ci,setCi]=useState(state[key].cq||0);
  const[sel,setSel]=useState(null);
  const ans=useRef({...(state[key].ans||{})});
  const submit=()=>{
    if(!sel)return;ans.current[ci]=sel;
    setState(p=>{const a={...p[key],ans:{...ans.current},cq:ci+1};return{...p,[key]:a};});
    if(ci<qs.length-1){setCi(ci+1);setSel(null);}
    else{
      let sc=0;const perTopic={};
      qs.forEach((q,i)=>{const correct=ans.current[i]===q.correct;if(correct)sc++;perTopic[q.topicSlug]={correct,userAnswer:ans.current[i],correctAnswer:q.correct};});
      setState(p=>{
        const upd={...p[key],done:true,completedAt:new Date().toISOString(),ans:{...ans.current},sc,perTopic,cq:0};
        const ns={...p,[key]:upd};
        if(type==='posttest'&&checkBadges){const earned=[...ns.badges];BADGES.forEach(b=>{if(!earned.includes(b.id)&&b.cond==='assessed'&&ns.post&&ns.post.done)earned.push(b.id);});ns.badges=earned;}
        return ns;
      });
      if(type==='posttest'&&awardXP)awardXP(500);
      setView(type+'-results');
    }
  };
  const q=qs[ci];
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="ascreen">
    <div className="ahead">
      <h2 className="atitle">{type==='pretest'?'📋 Pre-Test: Baseline':'📝 Post-Test: Final'}</h2>
      <p style={{color:'var(--t2)',fontSize:'.85rem'}}>{type==='pretest'?'20 ABIM-style questions · No penalty':'20 ABIM-style questions · Show growth'}</p>
      <div className="aprog"><div className="apfill" style={{width:(ci/qs.length)*100+'%'}}/></div>
      <div className="aqnum">Question {ci+1} of {qs.length}</div>
    </div>
    <div className="astem">{q.stem}</div>
    {q.options.map((opt,oi)=>{const letter=opt.charAt(0);return<div key={oi} className={`aopt${sel===letter?' sel':''}`} onClick={()=>setSel(letter)}>{opt}</div>;})}
    <button className="anxt" disabled={!sel} onClick={submit}>{ci<qs.length-1?'Next →':'Finish Assessment'}</button>
  </div></div>;
}

function PretestResults({state,setView}){
  const sc=state.pre.sc;const pct=Math.round(sc/20*100);
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📋 Pre-Test Results</h2>
    <div className="rscore" style={{color:pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444'}}>{sc}/20</div>
    <div className="rsub">{pct}% — {pct>=80?'Strong foundation!':pct>=60?'Good start!':pct>=40?'Solid baseline!':'Perfect starting point!'}</div>
    <div className="rmsg">Your pre-test establishes a baseline. Complete topics, then take the post-test to measure growth.</div>
    {window.PRETEST_DATA.questions.map((q,i)=><div key={i} className="rrow"><span className="rn">{q.topicTitle}</span><span className="rs">{state.pre.ans[i]===q.correct?'✅':'❌'}</span></div>)}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('home')}>Start Learning →</button>
  </div></div>;
}

function PosttestResults({state,setView}){
  const sc=state.post.sc;const pct=Math.round(sc/20*100);
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📝 Post-Test Results</h2>
    <div className="rscore" style={{color:pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444'}}>{sc}/20</div>
    <div className="rsub">{pct}%</div>
    {window.POSTTEST_DATA.questions.map((q,i)=><div key={i} className="rrow"><span className="rn">{q.topicTitle}</span><span className="rs">{state.post.ans[i]===q.correct?'✅':'❌'}</span></div>)}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('comparison')}>View Comparison →</button>
  </div></div>;
}

function ComparisonView({state,setView}){
  const preS=state.pre.sc||0,postS=state.post.sc||0,diff=postS-preS;
  const prePT=state.pre.perTopic||{},postPT=state.post.perTopic||{};
  const improved=[],maintained=[],gaps=[];
  window.PRETEST_DATA.questions.forEach(q=>{
    const slug=q.topicSlug;const preC=(prePT[slug]||{}).correct;const postC=(postPT[slug]||{}).correct;
    if(!preC&&postC)improved.push(q.topicTitle);else if(preC&&postC)maintained.push(q.topicTitle);else gaps.push(q.topicTitle);
  });
  return<div className={state.theme==='light'?'light':''} style={{minHeight:'100vh'}}><div className="rscreen">
    <h2>📊 Pre vs Post Comparison</h2>
    <div className="scomp"><span>{preS}/20</span><span style={{fontSize:'1.2rem',color:diff>0?'#10b981':diff===0?'#f59e0b':'#ef4444'}}>→</span><span style={{color:diff>0?'#10b981':diff===0?'#f59e0b':'#ef4444'}}>{postS}/20</span></div>
    <p style={{color:'var(--t2)',marginBottom:20}}>{diff>0?`+${diff} questions improved! 🎉`:diff===0?'Same score — review focus areas':'Review topics below'}</p>
    <div className="csec"><div className="cst">Topic-by-Topic</div>
      {improved.map((t,i)=><div key={'i'+i} className="crow ig"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>❌→✅</span></div>)}
      {maintained.map((t,i)=><div key={'m'+i} className="crow"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>✅→✅</span></div>)}
      {gaps.map((t,i)=><div key={'g'+i} className="crow gap"><span style={{flex:1,textAlign:'left'}}>{t}</span><span>⚠️</span></div>)}
    </div>
    {gaps.length>0&&<div className="fbox"><div className="ft">📌 Focus Areas</div>{gaps.map((t,i)=><div key={i} className="fi">• {t}</div>)}</div>}
    <button className="anxt" style={{marginTop:24}} onClick={()=>setView('home')}>← Back to Home</button>
  </div></div>;
}

function Home({state,topics,openTopic,compCount,setView}){
  return<div>
    <h2 style={{fontSize:'1.4rem',marginBottom:4}}>Your Endocrinology Dashboard</h2>
    <p style={{color:'var(--t2)',fontSize:'.85rem',marginBottom:20}}>{compCount}/20 topics completed · {state.xp} XP earned</p>
    {state.pre.done&&<div className="prhcard" onClick={()=>setView('pretest-results')}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:'.85rem',color:'var(--t2)'}}>📋 Pre-Test: {state.pre.sc}/20 ({Math.round(state.pre.sc/20*100)}%)</span>
        <span style={{fontSize:'.75rem',color:'var(--t3)'}}>Details →</span>
      </div>
    </div>}
    <div className={`pohcard${compCount>=16?' ul':''}`}>
      <div style={{fontSize:'1rem',fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>{compCount>=16?'📝':'🔒'} Post-Test Assessment</div>
      <div className="minibar" style={{height:8,marginBottom:4}}><div className="minifill" style={{width:Math.min(100,compCount/16*100)+'%',background:'linear-gradient(90deg,#6366f1,#a855f7)'}}/></div>
      <div style={{fontSize:'.8rem',color:'var(--t2)'}}>{compCount>=16?(state.post.done?`✅ ${state.post.sc}/20 (${Math.round(state.post.sc/20*100)}%)`:'Unlocked! Take it now.'):`Complete ${Math.max(0,16-compCount)} more topics (${compCount}/16)`}</div>
      {compCount>=16&&<button className="anxt" style={{marginTop:12,display:'inline-block'}} onClick={()=>setView(state.post.done?'comparison':'posttest')}>{state.post.done?'View Comparison':'Take Post-Test →'}</button>}
    </div>
    <h3 style={{fontSize:'1.1rem',marginBottom:12}}>Topics</h3>
    <div className="hgrid">{topics.map((t,i)=>{const tc=state.tc[t.id];const done=tc&&tc.done;return<div key={t.id} className="tcard" onClick={()=>openTopic(t)}>
      <div className="acc" style={{background:COLORS[i%COLORS.length]}}/>
      <div className="ttl">{t.title}</div>
      <div className="tags">{t.tags.slice(0,3).map((tag,ti)=><span key={ti} className="tg">{tag}</span>)}</div>
      <div className="meta"><span>{(t.quizzes||[]).length} quiz</span><span>{(t.micros||[]).length} micro</span><span>{Object.keys(t.sections||{}).length} sec</span></div>
      {done&&<div className="comp">✅</div>}
    </div>;})}</div>
  </div>;
}

function SectionObs({secKey,isViewed,markViewed,info,items}){
  const ref=useRef(null);const marked=useRef(isViewed);
  useEffect(()=>{marked.current=isViewed;},[isViewed]);
  useEffect(()=>{
    if(marked.current||!ref.current)return;
    const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting&&!marked.current){marked.current=true;markViewed(secKey);obs.disconnect();}});},{threshold:0.3});
    obs.observe(ref.current);return()=>obs.disconnect();
  },[secKey,markViewed]);
  return<div ref={ref} className={`sec ${info.cls}`}>
    <div className="shead"><div className="stitle">{info.title}</div>{isViewed&&<span className="sviewed">✓ Viewed</span>}</div>
    <ul>{items.map((item,i)=><li key={i} dangerouslySetInnerHTML={{__html:renderBT(item)}}/>)}</ul>
  </div>;
}

function Detail({topic,state,setState,setView,awardXP,addToast,topics,checkBadges}){
  const[flipped,setFlipped]=useState({});const[quizState,setQuizState]=useState({});
  const viewedRef=useRef(new Set((state.sv||{})[topic.id]||[]));
  const markViewed=(secKey)=>{
    setState(prev=>{const svw={...prev.sv};const arr=[...(svw[topic.id]||[])];if(!arr.includes(secKey)){arr.push(secKey);awardXP(40);}svw[topic.id]=arr;const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,sv:svw},topic);return{...prev,sv:svw,tc};});
  };
  const answerQuiz=(qid,letter,correct)=>{
    if(quizState[qid])return;setQuizState(p=>({...p,[qid]:{ans:letter,correct}}));
    setState(prev=>{const qa={...prev.qa};qa[qid]=letter;let hs={...prev.hs};if(correct){hs.c=(hs.c||0)+1;awardXP(50);}else{hs.c=0;awardXP(15);}const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,qa},topic);const ns={...prev,qa,hs,tc};ns.badges=checkBadges(ns);return ns;});
  };
  const flipMicro=(mid)=>{
    setFlipped(p=>({...p,[mid]:true}));
    setState(prev=>{const mf=[...prev.mf];if(!mf.includes(mid)){mf.push(mid);awardXP(20);}const tc={...prev.tc};tc[topic.id]=compTC(topic.id,{...prev,mf},topic);return{...prev,mf,tc};});
  };
  const secMap={panic_card:{title:'🚨 Panic Card',cls:'panic'},brief_overview:{title:'📖 Brief Overview',cls:'overview'},icu_consult_triggers:{title:'🏥 ICU/Consult Triggers',cls:'icu'},orders_to_place_now:{title:'📋 Orders to Place Now',cls:'orders'},cdi:{title:'📊 CDI',cls:'cdi'},other:{title:'📝 Additional Notes',cls:'overview'}};
  const secOrder=['panic_card','brief_overview','icu_consult_triggers','orders_to_place_now','cdi','other'];
  const viewed=(state.sv||{})[topic.id]||[];
  return<div className="detail">
    <button className="dbk" onClick={()=>setView('home')}>← Back to Topics</button>
    <h2 className="dtitle">{topic.title}</h2>
    <div className="dtags">{topic.tags.map((t,i)=><span key={i} className="dtag">{t}</span>)}</div>
    {secOrder.filter(k=>topic.sections[k]&&topic.sections[k].length>0).map(key=>{
      const info=secMap[key]||{title:key,cls:'overview'};const isV=viewed.includes(key);
      return<SectionObs key={key} secKey={key} isViewed={isV} markViewed={markViewed} info={info} items={topic.sections[key]}/>;
    })}
    {topic.quizzes.map((q,qi)=>{const qs2=quizState[q.id];return<div key={q.id} className="qcard">
      <div className="qlbl">ABIM-Style Question {qi+1}</div><div className="qstem">{q.stem}</div>
      {q.options.map((opt,oi)=>{const letter=opt.charAt(0);let cls='qopt';if(qs2){if(letter===q.correct)cls+=' ok';else if(letter===qs2.ans&&!qs2.correct)cls+=' bad';else cls+=' dis';}return<div key={oi} className={cls} onClick={()=>answerQuiz(q.id,letter,letter===q.correct)}>{opt}</div>;})}
      {qs2&&<div className="qrat"><strong>{qs2.correct?'✅ Correct!':'❌ Incorrect.'}</strong> {q.rationale}</div>}
    </div>;})}
    {topic.micros.length>0&&<div><h3 style={{fontSize:'1.1rem',margin:'20px 0 12px'}}>🔬 Micro Questions</h3>
      {topic.micros.map(m=><div key={m.id} className="mcard" onClick={()=>flipMicro(m.id)}>
        <div className="mq">Q: {m.q}</div>
        {(flipped[m.id]||(state.mf||[]).includes(m.id))&&<div className="ma">A: {m.a}</div>}
      </div>)}</div>}
    {topic.refs.length>0&&<div style={{marginTop:20}} onClick={()=>markViewed('refs')}>
      <h3 style={{fontSize:'1.1rem',marginBottom:12}}>📚 References</h3>
      {topic.refs.map((r,i)=>r.url?<a key={i} className="rlink" href={r.url} target="_blank" rel="noopener noreferrer">{r.label||r.url}</a>:<div key={i} className="rlink">{r.label}</div>)}</div>}
  </div>;
}

function ShopModal({state,setState,onClose,addToast}){
  const buy=(item)=>{if(state.shop.p.includes(item.id))return;if(state.coins<item.p){addToast('Not enough coins!');return;}setState(prev=>({...prev,coins:prev.coins-item.p,shop:{...prev.shop,p:[...prev.shop.p,item.id]}}));addToast(`Purchased ${item.e} ${item.n}`,'badge');};
  const equip=(id)=>{setState(prev=>{const eq=(prev.shop&&prev.shop.eq)||{av:null};return{...prev,shop:{...prev.shop,eq:{...eq,av:eq.av===id?null:id}}};});};
  return<div className="molay" onClick={onClose}><div className="mocnt" onClick={e=>e.stopPropagation()}>
    <button className="mocls" onClick={onClose}>✕</button>
    <h3 className="motitle">🛒 Shop — 🪙 {state.coins}</h3>
    <div style={{marginBottom:16}}><div className="mosect">Avatars</div><div className="sgrid">{SHOP_DATA.avatars.map(item=>{const owned=state.shop.p.includes(item.id);const eq=state.shop&&state.shop.eq&&state.shop.eq.av===item.id;return<div key={item.id} className={`sitem${owned?' own':''}`} onClick={()=>owned?equip(item.id):buy(item)}><div className="se">{item.e}</div><div className="sn">{item.n}</div><div className="sd">{item.d}</div>{owned?<div className="so">{eq?'✅ Equipped':'Tap to equip'}</div>:<div className="sp">🪙 {item.p}</div>}</div>;})}</div></div>
    <div><div className="mosect">Memes</div><div className="sgrid">{SHOP_DATA.memes.map(item=>{const owned=state.shop.p.includes(item.id);return<div key={item.id} className={`sitem${owned?' own':''}`} onClick={()=>buy(item)}><div className="se">{item.e}</div><div className="sn">{item.n}</div><div className="sd">{item.d}</div>{owned?<div className="so">✅ Owned</div>:<div className="sp">🪙 {item.p}</div>}</div>;})}</div></div>
  </div></div>;
}

function ProfileModal({state,onClose,setView}){
  return<div className="molay" onClick={onClose}><div className="mocnt" onClick={e=>e.stopPropagation()}>
    <button className="mocls" onClick={onClose}>✕</button>
    <h3 className="motitle">{state.un}'s Profile</h3>
    <div style={{fontSize:'.85rem',color:'var(--t2)',marginBottom:16}}>{state.pgy} · Level {getL(state.xp).l} {getL(state.xp).n} · {state.xp} XP · 🪙 {state.coins} · 🔥 {state.streak.c}d streak · {(state.topO||[]).length} topics</div>
    <div style={{marginBottom:16}}><div className="mosect">Badges ({state.badges.length}/{BADGES.length})</div>
      <div className="bgrid">{BADGES.map(b=>{const has=state.badges.includes(b.id);return<div key={b.id} className={`bitem${has?'':' lk'}`}><div className="be">{b.e}</div><div className="bn">{has?b.n:'???'}</div></div>;})}</div>
    </div>
    {state.post.done&&state.pre.done&&<button className="anxt" onClick={()=>{onClose();setView('comparison');}}>📊 View Comparison</button>}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
