py supports severity: stepped diuretic titration, electrolyte repletion. citeturn2search37\n- If transfused: **acute blood loss anemia vs anemia of chronic disease** not present—state rationale and **hemoglobin threshold ~7 g/dL** per AABB when documenting decision. citeturn2search3\n", "decompensated-heart-failure.md": "---\nfilename: decompensated-heart-failure.md\nid: decompensated-heart-failure\ntitle: Decompensated Heart Failure\nslug: decompensated-heart-failure\ntags: [cardiology, inpatient, night-float, acute-heart-failure, guideline-based]\nlevel: resident\nestimated_time_min: 20\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Decompensated Heart Failure\n\n## Panic Card\n- Elevate HOB, monitor, IV access, supplemental O₂ to maintain **SpO₂ ≥92%** (use **88–92%** if chronic hypercapnia risk); start **NIV (BiPAP/CPAP) immediately** for severe dyspnea/flash edema.\n- If SBP >**110 mmHg** with pulmonary edema: start **IV nitroglycerin 40–80 mcg/min**, titrate q3–5 min; add **IV loop diuretic 1–2.5× home oral daily dose (IV equivalent)**.\n- If hypotension/shock: aim **MAP ≥65 mmHg**; start **norepinephrine** if needed; add **dobutamine 2–5 mcg/kg/min** for low-output signs; avoid large fluid boluses unless clear RV failure.\n- Place Foley for strict I&O; target early urine output **≥150–200 mL/h** after diuretic dose; reassess lungs, BP, and urine q15–30 min.\n- Treat precipitants now: ACS (ECG, troponin), tachyarrhythmia (rate/rhythm control), hypertensive crisis, infection.\n- Confirm Before Proceed: invasive lines, intubation, or mechanical circulatory support should follow team discussion and indication verification.\n\n## Brief Overview\n- Acute decompensated HF (ADHF) is a spectrum from hypertensive flash pulmonary edema to cardiogenic shock; early trajectory depends on blood pressure, perfusion, and congestion phenotype. **Guideline Must‑Know:** Initial IV loop diuretic dose should be **1–2.5× the patient’s total daily oral loop diuretic (IV equivalent)**, then reassess diuresis within **2–6 h** (AHA/ACC/HFSA 2022).\n- **Guideline Must‑Know:** If **SBP >110 mmHg** with severe pulmonary edema, prioritize **vasodilators (IV nitroglycerin 40–200 mcg/min or nitroprusside)** plus NIV; this often relieves dyspnea faster than diuretic alone and can avert intubation (AHA/ACC/HFSA 2022; ESC 2021).\n- **Guideline Must‑Know:** In suspected cardiogenic shock, target **MAP ≥65 mmHg**; use **norepinephrine** as first‑line vasopressor and add **inotrope (dobutamine or milrinone)** for hypoperfusion with low output (AHA/ACC/HFSA 2022; SCAI shock consensus).\n- **Guideline Must‑Know:** Early noninvasive ventilation (CPAP/BiPAP) reduces work of breathing and improves oxygenation in acute cardiogenic pulmonary edema; use unless contraindicated (ERS/ATS NIV guideline).\n- **Guideline Must‑Know:** Diuretic resistance warrants stepped pharmacologic therapy: escalate loop dose, consider continuous infusion, and add thiazide‑type synergy (**chlorothiazide 500 mg IV** or **metolazone 2.5–5 mg PO**), while monitoring **K⁺/Mg²⁺/Na⁺** and renal function (AHA/ACC/HFSA 2022).\n- **Guideline Must‑Know:** Avoid routine morphine; it may worsen outcomes via respiratory depression and hypotension. Reserve for refractory anxiety after other measures (AHA/ACC/HFSA 2022).\n- Assess precipitants that change management now: **ACS**, tachyarrhythmia (AF with RVR), hypertensive crisis, medication nonadherence, high salt/fluid intake, infection, PE, thyroid disease, cardiorenal syndrome.\n- What must happen now: stabilize airway/breathing/circulation, apply NIV if needed, start appropriate **vasodilator** (if hypertensive) or **pressor/inotrope** (if shock), give adequate **IV loop diuretic**, place Foley for strict I&O, obtain ECG/troponin/CXR/BMP/BNP, and identify a precipitant.\n- What can wait hours: full echocardiography (unless shock/new murmur), GDMT titration beyond urgent holds/resumptions, sodium restriction counseling, advanced device discussions unless ongoing shock.\n- Pitfalls: underdosing loop diuretic initially; giving large fluid boluses in left‑sided HF without clear RV failure; delaying vasodilator in hypertensive pulmonary edema; withholding diuretics due to rising creatinine despite congestion (cardiorenal syndrome).\n- Oxygen strategy: target **SpO₂ ≥92%**; in chronic hypercapnic respiratory disease use **88–92%** and prefer NIV if work of breathing high.\n- Vasodilators: **nitroglycerin** is first‑line for hypertensive pulmonary edema (start **40–80 mcg/min**, titrate rapidly); **nitroprusside** for severe afterload excess under ICU monitoring; avoid if **severe AS** or **RV infarction**. Monitor for hypotension.\n- Diuretics: common starting **furosemide 40–80 mg IV** if diuretic‑naïve, or **2–2.5×** home oral dose as IV; aim **net −1 to −2 L/day** and early **urine ≥150–200 mL/h**; check BMP **q6–12 h** and re‑dose based on response.\n- Inotropes: consider **dobutamine 2–20 mcg/kg/min** (short half‑life, tachyarrhythmia risk) or **milrinone 0.125–0.375 mcg/kg/min** (no bolus; watch **hypotension/renal clearance**) when hypoperfusion persists despite decongestion and MAP support.\n- **Guideline Must‑Know:** Continue guideline‑directed medical therapy if hemodynamically stable; hold **beta‑blocker** temporarily in shock or severe fluid overload with low output; hold **RAASi/ARNI/MRA** for **K⁺ >5.5 mmol/L**, **Cr rise >30–50%**, or symptomatic hypotension; SGLT2 inhibitors can often be continued or initiated when stable (AHA/ACC/HFSA 2022).\n- **Guideline Must‑Know:** Ultrafiltration is not first‑line for cardiorenal syndrome; reserve for refractory congestion after stepped pharmacologic diuresis fails (AHA/ACC/HFSA 2022).\n- **Guideline Must‑Know:** Identify right‑sided or RV‑predominant failure (clear lungs, JVP high, hypotension); avoid aggressive vasodilators and consider cautious preload support while treating precipitant (AHA/ACC/HFSA 2022).\n- Safety guardrails: maintain **K⁺ 4.0–5.0 mmol/L**, **Mg²⁺ ≥2.0 mg/dL**; avoid **Na⁺ correction >8–10 mmol/L per 24 h** if hyponatremic; monitor for **ototoxicity** with very high loop doses; use **heparin prophylaxis** unless contraindicated.\n- Consults to consider: Cardiology for shock/ischemia/advanced therapies; ICU for escalating oxygen/pressors; Nephrology for refractory congestion or AKI; Electrophysiology for unstable arrhythmias.\n\n## Top ICU/Consult Triggers\n- Persistent or worsening hypoxemia needing **NIV with FiO₂ ≥0.6** or impending intubation despite therapy.\n- **MAP <65 mmHg** or rising lactate **>2–4 mmol/L** despite initial resuscitation and vasodilator/diuretic strategy.\n- Sustained ventricular arrhythmia, high‑grade AV block with instability, or new ischemic ECG changes with hemodynamic compromise.\n- Oliguria **<0.5 mL/kg/h** with **creatinine rise ≥0.5 mg/dL** in 24 h despite stepped diuresis and hemodynamic optimization.\n- Suspected mechanical complication (acute MR/VSD) or need for mechanical circulatory support.\n\n## Orders to Place Now\n- Order: Noninvasive ventilation (BiPAP/CPAP) — {mode, IPAP/EPAP or CPAP cm H₂O, FiO₂%, titration targets: **SpO₂ ≥92%** or **88–92%** if hypercapnia risk}\n- Order: Nitroglycerin infusion — {start **40–80 mcg/min**, titrate q3–5 min to relieve dyspnea while maintaining **SBP ≥100–110 mmHg**}\n- Order: Furosemide IV — {**dose mg IV now** = 1–2.5× home oral daily dose (IV equivalent) or **40–80 mg IV** if naïve; reassess urine in 2–6 h}\n- Order: Foley catheter — {insert for strict I&O; goal early urine **≥150–200 mL/h**; daily weight}\n- Order: Basic metabolic panel, magnesium — {baseline now, then **q6–12 h** while adjusting diuretics/vasoactives}\n- Order: Cardiology consult — {reason: ADHF with {hypertensive pulmonary edema|suspected shock|refractory congestion}; urgency: {STAT|urgent}}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 62‑year‑old with hypertension and known HFrEF (EF 30%) presents with acute severe dyspnea, pink frothy sputum, BP 190/110 mmHg, HR 120, RR 32, SpO₂ 86% on room air, diffuse rales, and no peripheral edema. ECG shows sinus tachycardia without ischemia. He takes furosemide 40 mg PO daily at home. CXR shows alveolar edema.\n\n### Options\nA. Give 500 mL normal saline bolus, then start dobutamine\nB. Start high‑flow oxygen by nasal cannula and low‑dose morphine\nC. Initiate BiPAP and start IV nitroglycerin infusion, then give IV loop diuretic at 80–100 mg\nD. Start nitroprusside infusion only; avoid diuretics initially\nE. Give his home furosemide dose (40 mg IV) and observe\n\n### Correct answer\nC\n\n### Rationale\nHypertensive acute pulmonary edema is afterload‑driven; immediate **NIV** plus **rapidly titrated IV nitroglycerin** relieves congestion, followed by adequate **IV loop diuretic (≥2× home oral dose as IV)**. Saline bolus and morphine are harmful; nitroprusside may be used in ICU but nitroglycerin is appropriate and readily available. Guidelines emphasize vasodilator‑first strategy when **SBP >110 mmHg** (AHA/ACC/HFSA 2022; ESC 2021).\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 74‑year‑old with chronic HFrEF (EF 25%) and CKD stage 4 (baseline creatinine 2.8 mg/dL) is admitted for edema, orthopnea, JVP 12 cm, crackles, and weight gain 5 kg. BP 118/72 mmHg, MAP 87, HR 92, SpO₂ 94% on 2 L. After **furosemide 120 mg IV**, urine output is 60 mL/h and creatinine rises to 3.4 mg/dL. He is comfortable, warm, and not hypotensive.\n\n### Options\nA. Stop diuretics due to AKI and give 1 L normal saline\nB. Continue current dose and recheck BMP tomorrow\nC. Escalate diuresis with higher loop dose or continuous infusion and add metolazone 2.5–5 mg PO, with electrolyte monitoring\nD. Start ultrafiltration now because creatinine increased\nE. Start dobutamine for renal perfusion despite stable BP\n\n### Correct answer\nC\n\n### Rationale\nThis is congestive **cardiorenal syndrome**; the pitfall is **withholding decongestion due to creatinine rise**. Guidelines recommend stepped pharmacologic diuresis (escalated loop ± thiazide synergy) before considering ultrafiltration; inotropes are not indicated without hypoperfusion. Monitor **K⁺/Mg²⁺/Na⁺** and renal function closely (AHA/ACC/HFSA 2022).\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What is an appropriate initial IV loop diuretic dose for a patient on furosemide 40 mg PO daily at home?\n  A: **80–100 mg IV furosemide** (about **2–2.5×** the home oral daily dose as IV), then reassess within 2–6 hours.\n- Q: What is the MAP goal in cardiogenic shock?\n  A: **MAP ≥65 mmHg** while addressing low output with inotrope and avoiding fluid overload.\n- Q: What early urine output target suggests adequate decongestion after IV diuretic?\n  A: **≥150–200 mL/h** in the first hours, with a daily **net −1 to −2 L** goal if tolerated.\n- Q: When should a thiazide‑type diuretic be added?\n  A: With diuretic resistance after adequate loop dosing; options include **chlorothiazide 500 mg IV** or **metolazone 2.5–5 mg PO** with electrolyte monitoring.\n\n## Guidelines & Key References\n- AHA/ACC/HFSA Guideline for the Management of Heart Failure (2022) — https://www.ahajournals.org/doi/10.1161/CIR.0000000000001063\n- ESC Guidelines for the diagnosis and treatment of acute and chronic heart failure (2021) — https://academic.oup.com/eurheartj/article/42/36/3599/6358045\n- ERS/ATS Clinical Practice Guidelines: Noninvasive Ventilation for Acute Respiratory Failure (2017) — https://www.atsjournals.org/doi/full/10.1164/rccm.201705-1325ST\n- SCAI/ACC/AHA Expert Consensus on Cardiogenic Shock Classification and Management (2022) — https://www.jscai.org/article/S2772-9303(22)00005-3/fulltext\n\n## CDI: What to Document Clearly Tonight\n- Acute on chronic HFrEF due to {ischemia|dietary/medication nonadherence|hypertensive crisis}; severity: {acute respiratory failure with hypoxemia|shock}; evidence: {SpO₂, ABG, CXR edema, BNP}; treatment: {NIV, IV diuretics, vasodilator/pressors}.\n- Volume overload with diuretic resistance; etiology: {cardiorenal syndrome}; evidence: {JVP elevation, edema, weight gain, low urine output, creatinine trend}; treatment: {escalated loop + thiazide synergy, strict I&O}.\n- Hypertensive pulmonary edema; cause: afterload excess; evidence: {SBP, rales, CXR}; treatment: {IV nitroglycerin with titration targets, NIV, IV diuretic}.\n- Cardiogenic shock; cause: {ischemia|advanced HFrEF}; evidence: {MAP <65 mmHg, lactate, cool extremities, oliguria}; treatment: {norepinephrine, inotrope, ICU, consider MCS}.\n- Arrhythmia precipitant; type: {AF with RVR|VT}; evidence: {ECG, vitals}; treatment: {rate/rhythm control, anticoagulation decision}.", "chest-pain-acs-post-rosc.md": "---\nfilename: chest-pain-acs-post-rosc.md\nid: chest-pain-acs-post-rosc\ntitle: Chest Pain (ACS/Post‑ROSC)\nslug: chest-pain-acs-post-rosc\ntags: [cardiology, inpatient, night-float, post-rosc, acute-coronary-syndrome]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Chest Pain (ACS/Post‑ROSC)\n\n## Panic Card\n- ABCs first: cardiac monitor, defibrillation pads on, large‑bore IV/IO; obtain 12‑lead ECG within **≤10 min** of arrival/chest‑pain report.\n- Oxygen only if hypoxemic; target **SpO₂ 92–98%** (avoid hyperoxia), ensure **PaCO₂ 35–45 mmHg** if ventilated; maintain **MAP ≥65 mmHg** (first‑line norepinephrine).\n- Give **aspirin 162–325 mg chew now** unless true anaphylaxis or active major bleeding; keep **NPO** for potential cath.\n- Treat pain/ischemia: **nitroglycerin** SL 0.4 mg q5 min up to 3 doses if **SBP ≥100 mmHg**, no RV infarct, no recent PDE5 inhibitor; avoid routine morphine.\n- Reassess ECG if pain persists; activate cath lab immediately for diagnostic **ST‑elevation** or new LBBB with ischemic symptoms.\n- Confirm Before Proceed: fibrinolysis for STEMI only if PCI unavailable; verify absolute contraindications; typical window **≤12 h** (consider up to 24 h if ongoing ischemia or shock).\n\n## Brief Overview\n- Night priorities: rule in/out ACS rapidly (ECG **≤10 min**, repeat if pain continues), control oxygenation (**SpO₂ 92–98%**), stabilize hemodynamics (**MAP ≥65 mmHg**), give antiplatelet early, and decide PCI vs fibrinolysis vs conservative pathway.\n- **Guideline Must‑Know:** AHA/ACC 2021 Chest Pain guideline prioritizes rapid ECG acquisition/interpretation and hs‑troponin‑based algorithms (0/1‑h or 0/2‑h) for ED/inpatient chest pain; dynamic change plus symptoms elevates ACS probability.\n- **Guideline Must‑Know:** For STEMI, emergent PCI is preferred (door‑to‑balloon **≤90 min**) or fibrinolysis (door‑to‑needle **≤30 min**) if PCI delay exceeds thresholds; avoid fibrinolysis if contraindicated (intracranial hemorrhage history, aortic dissection, active bleeding).\n- **Guideline Must‑Know:** Oxygen is indicated for **SpO₂ <90–92%** or respiratory distress; avoid hyperoxia in ACS and post‑ROSC because it increases mortality/neurologic injury risk; target **SpO₂ 92–98%** and normocapnia.\n- **Guideline Must‑Know:** Post‑ROSC bundle: secure airway/ventilation (PaCO₂ 35–45), titrate FiO₂ to avoid hyperoxia, maintain **MAP ≥65 mmHg** (norepinephrine first‑line), active temperature control to prevent fever (target **≤37.5°C**, many centers 36°C), glucose 7.8–10 mmol/L, and early neuro‑prognostication deferred **≥72 h** after normothermia.\n- **Guideline Must‑Know:** Immediate angiography after ROSC is indicated for clear **ST‑elevation** or ongoing ischemia/shock; routine immediate cath for comatose post‑ROSC patients **without ST‑elevation** has not shown benefit—use a selective approach.\n- **Guideline Must‑Know:** Antiplatelet strategy: **aspirin** loading universally (if no contraindication); add a P2Y₁₂ inhibitor (ticagrelor/prasugrel preferred over clopidogrel in PCI‑planned ACS) after cardiology plan is set, especially if urgent CABG is possible.\n- Anticoagulation: **UFH** preferred in unstable patients or severe CKD/anticipated procedures; **enoxaparin** acceptable if renal function allows; monitor anti‑Xa/aPTT per protocol; avoid if dissection/major bleed suspected.\n- Blood pressure/ischemia: give **SL nitroglycerin** if hypertensive and no RV infarct; for inferior STEMI with RV involvement and hypotension, give **250–500 mL** isotonic fluid bolus and **avoid nitrates**; consider low‑dose beta‑blocker if hypertensive/tachycardic and no signs of acute heart failure or shock.\n- Pain control: prioritize nitrates and reperfusion; avoid routine morphine due to potential harm and delayed antiplatelet absorption; if needed, use the lowest dose with careful monitoring.\n- What must happen now: ECG, aspirin, O₂ titration, hemodynamic stabilization, cath lab activation for STEMI, anticoagulation when ACS is likely and bleeding risk acceptable, POCUS for shock/source.\n- What can wait (briefly): formal echocardiography (once stable), full secondary prevention regimen (high‑intensity statin should be started early but does not delay reperfusion), risk stratification scores, and detailed etiology workup (e.g., vasospasm, MINOCA).\n- Pitfalls: treating all troponin elevations as type 1 MI; consider **type 2 MI** (supply/demand) and **myocardial injury** (e.g., sepsis, PE, CKD); integrate symptoms, ECG, and dynamics (rise/fall).\n- Pitfalls: missing aortic dissection (tearing pain, pulse/BP differential, mediastinal widening) or pulmonary embolism (tachycardia, hypoxemia, D‑dimer/CTPA) where anticoagulation or thrombolysis decisions diverge.\n- **Guideline Must‑Know:** Fibrinolysis absolute contraindications include prior intracranial hemorrhage, ischemic stroke within 3 months, known intracranial neoplasm, suspected aortic dissection, active bleeding; confirm carefully before administering.\n- **Guideline Must‑Know:** Temperature control in comatose post‑ROSC: active fever prevention with target **32–37.5°C** per local protocol; avoid shivering; defer neuro‑prognostication **≥72 h** after rewarming/normalization.\n- **Guideline Must‑Know:** Use hs‑troponin serial testing (0/1‑h or 0/2‑h pathways) with sex‑specific cutoffs where validated; a single value below limit of detection with non‑ischemic ECG and onset >3 h can safely rule out in selected settings.\n- Call cardiology stat for STEMI, persistent ischemia, hemodynamic instability, recurrent VT/VF, or cardiogenic shock; call ICU for escalating vasopressors, increasing oxygen/vent needs, or post‑ROSC coma needing temperature control.\n- Confirm Before Proceed: before fibrinolysis/anticoagulation, screen for dissection, intracranial pathology, recent surgery, or anticoagulant use; document risks/benefits and contraindication checklist.\n\n## Top ICU/Consult Triggers\n- Persistent chest pain with **ST‑elevation** or new posterior/inferior changes, recurrent VT/VF, or dynamic ST shifts with rising hs‑troponin.\n- Shock or impending shock: **MAP <65 mmHg** despite fluids/vasopressors, **lactate ≥4 mmol/L**, or escalating pressor needs.\n- Hypoxemia/hypercapnia requiring **FiO₂ >0.6**, high PEEP, or mechanical ventilation post‑ROSC; GCS ≤8 or coma needing temperature control.\n- Suspected aortic dissection, papillary muscle rupture, ventricular septal rupture, or new severe MR on POCUS—urgent cardiothoracic/cardiology consult.\n\n## Orders to Place Now\n- Order: 12‑lead ECG — {stat, repeat in 15 min if ongoing pain or initial non‑diagnostic}\n- Order: High‑sensitivity troponin — {0/1‑h or 0/2‑h protocol; add baseline CKD note if applicable}\n- Order: Aspirin PO — {chew 325 mg now, then 81 mg daily}\n- Order: Heparin infusion (UFH) — {weight kg, bolus yes/no, aPTT/anti‑Xa target per protocol, bleeding risk checklist}\n- Order: Nitroglycerin — {SL 0.4 mg q5 min ×3 if SBP ≥100 mmHg; consider IV titration if persistent pain and no RV infarct}\n- Order: Post‑ROSC temperature control — {target 36.0°C, active fever prevention, shiver suppression plan, neuro checks schedule}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 62‑year‑old man with hypertension and hyperlipidemia presents with 60 minutes of crushing chest pain. ECG shows ST elevation in II, III, and aVF. BP is 92/58 mmHg, JVP is elevated, lungs are clear. He took no erectile‑dysfunction medications. O₂ saturation is 95% on room air.\n\n### Options\nA. Administer sublingual nitroglycerin and start IV morphine  \nB. Give a 250–500 mL isotonic fluid bolus and prepare for emergent PCI activation  \nC. Start high‑flow oxygen to maintain SpO₂ at 100%  \nD. Give IV labetalol to reduce heart rate and blood pressure  \nE. Begin immediate fibrinolysis regardless of PCI availability\n\n### Correct answer\nB\n\n### Rationale\nInferior STEMI with RV involvement is suggested by hypotension, clear lungs, and elevated JVP; the next step is **250–500 mL** IV fluid bolus and emergent reperfusion, avoiding nitrates which can precipitate shock. Oxygen is not indicated with **SpO₂ 95%**; routine morphine and beta‑blockade are harmful in hypotension. Reperfusion should be via PCI if available within guideline time targets; fibrinolysis is reserved when PCI delays exceed thresholds (AHA/ACC STEMI; AHA/ACC Chest Pain; ESC ACS).\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 58‑year‑old man is resuscitated from out‑of‑hospital ventricular fibrillation arrest. He is intubated, comatose, and hemodynamically stable on low‑dose norepinephrine. ECG shows no ST‑elevation. SpO₂ is 97% on 40% FiO₂. Head CT is normal.\n\n### Options\nA. Immediate coronary angiography for all post‑ROSC patients regardless of ECG  \nB. Increase FiO₂ to 100% to maximize oxygen delivery  \nC. Initiate active temperature control at 36°C, maintain **SpO₂ 92–98%**, and admit to ICU with selective angiography if instability develops  \nD. Start routine morphine infusion for sedation and pain  \nE. Begin fibrinolysis empirically for presumed occult STEMI\n\n### Correct answer\nC\n\n### Rationale\nIn comatose post‑ROSC patients **without ST‑elevation**, guidelines support active temperature control (fever prevention, commonly 36°C) and avoidance of hyperoxia while pursuing selective angiography if recurrent ischemia or shock emerges. The pitfall is assuming all post‑ROSC patients require immediate cath or 100% FiO₂; both approaches may harm outcomes unless specific indications are present (AHA ACLS 2020/2023 updates; Chest Pain/ACS guidance).\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Start oxygen if SpO₂ is 98% on room air?  \n  A: No; avoid hyperoxia in ACS/post‑ROSC. Target SpO₂ 92–98% and titrate FiO₂ down when safe.\n- Q: Initial inpatient aspirin dose for suspected ACS?  \n  A: 162–325 mg chew immediately unless true anaphylaxis or active major bleeding.\n- Q: Minimum MAP target during ischemic shock/post‑ROSC stabilization?  \n  A: MAP ≥65 mmHg using norepinephrine as first‑line vasopressor if fluids insufficient.\n- Q: When can fibrinolysis be given for STEMI if PCI is unavailable?  \n  A: Generally within ≤12 h of symptom onset (consider up to 24 h if ongoing ischemia or shock and no contraindications).\n\n## Guidelines & Key References\n- AHA/ACC Guideline for the Evaluation and Diagnosis of Chest Pain (2021)\n- AHA Guidelines for CPR and ECC (Adult ACLS) (2020) with 2023 Focused Updates on Post‑ROSC Care/Temperature Control\n- ESC Guidelines for the Management of Acute Coronary Syndromes (2023)\n- ACC/AHA/SCAI Consensus and STEMI systems of care performance targets (door‑to‑balloon and door‑to‑needle)\n- Fourth Universal Definition of Myocardial Infarction (2018) and subsequent statements on type 2 MI/myocardial injury (2022)\n\n## CDI: What to Document Clearly Tonight\n- Acute MI type and acuity: STEMI vs NSTEMI vs type 2 MI; culprit territory if known; reperfusion strategy chosen and timing.\n- Hemodynamic status: shock vs not; MAP targets; vasopressor use and response; lactate with trends.\n- Post‑ROSC care: coma vs awake, temperature target, oxygen/vent targets (SpO₂ 92–98%, PaCO₂ 35–45), sedation/analgesia, neuro‑monitoring plan.\n- Contraindication screening: fibrinolysis/anticoagulation checklist (ICH history, dissection concern, recent surgery, active bleeding).\n- Objective evidence: ECG changes, hs‑troponin dynamics, imaging/POCUS findings, oxygenation/ventilator settings, and treatments supporting severity.\n", "arrhythmias-you-cant-miss.md": "---\nfilename: arrhythmias-you-cant-miss.md\nid: arrhythmias-you-cant-miss\ntitle: Arrhythmias You Can’t Miss\nslug: arrhythmias-you-cant-miss\ntags: [cardiology, inpatient, night-float]\nlevel: resident\nestimated_time_min: 25\nversion: 2026-02-20\nsource: IM_NightFloat_Engine\n---\n\n# Arrhythmias You Can’t Miss\n\n## Panic Card\n- Check responsiveness, pulse, and ABCs; place on monitor, defibrillator at bedside; target **MAP ≥65 mmHg**, **SpO₂ ≥94%**.\n- Unstable tachyarrhythmia (hypotension, shock, chest pain, altered mental status): immediate **synchronized cardioversion 100–200 J biphasic**; escalate if ineffective.\n- Pulseless VT/VF: **defibrillate 200 J biphasic**, high‑quality CPR, epinephrine **1 mg IV q3–5 min**, consider amiodarone **300 mg IV push** after second shock.\n- Torsades de pointes: **magnesium sulfate 2 g IV over 10–15 min**, repeat once if needed; correct **K⁺ to 4.0–4.5 mmol/L**; consider overdrive pacing if recurrent.\n- Symptomatic bradycardia: **atropine 1 mg IV q3–5 min (max 3 mg)**; if ineffective, **transcutaneous pacing** and start **dopamine 5–20 µg/kg/min** or **epinephrine 2–10 µg/min** infusion.\n- **Confirm Before Proceed:** If AF + pre‑excitation (irregular wide‑complex tachycardia), avoid AV nodal blockers (adenosine, diltiazem, beta‑blockers, digoxin); use **procainamide** or synchronized cardioversion.\n\n## Brief Overview\n- Night‑float success hinges on rapidly distinguishing stable vs unstable rhythms; instability mandates electricity first (synchronized cardioversion for organized tachyarrhythmias, defibrillation for pulseless/irregular polymorphic VT). Keep pads on, oxygen, IV access, and airway readiness.\n- **Guideline Must‑Know:** AHA ACLS recommends immediate synchronized cardioversion for tachyarrhythmias with hypotension, shock, ischemic chest pain, acute heart failure, or altered mental status; start at **100–200 J biphasic** and escalate as needed.\n- **Guideline Must‑Know:** For symptomatic bradycardia, give **atropine 1 mg IV**, repeat q3–5 min to **3 mg max**; if ineffective, pace and consider **dopamine 5–20 µg/kg/min** or **epinephrine 2–10 µg/min** infusions.\n- **Guideline Must‑Know:** Torsades de pointes (polymorphic VT with prolonged QT) requires **magnesium sulfate 2 g IV over 10–15 min**, correction of **K⁺ 4.0–4.5 mmol/L, Mg²⁺ ≥0.8 mmol/L**, removal of QT‑prolonging drugs, and possible overdrive pacing.\n- **Guideline Must‑Know:** In AF with pre‑excitation (WPW pattern), avoid AV nodal blockers; use **procainamide 10 mg/kg IV over 20–30 min** if stable or synchronized cardioversion if unstable.\n- **Guideline Must‑Know:** Stable monomorphic wide‑complex tachycardia of uncertain origin should be treated as VT; preferred IV options include **amiodarone 150 mg over 10 min**, repeat as needed, then infusion **1 mg/min**.\n- **Guideline Must‑Know:** High‑grade AV block (Mobitz II or complete heart block) with symptoms warrants **temporary pacing** and evaluation for reversible causes (ischemia, drugs, hyperkalemia); consult cardiology early for permanent pacing needs.\n- When the rhythm is unclear, prioritize patient status: oxygenation, perfusion, and mental status. Get a 12‑lead ECG quickly but do not delay life‑saving cardioversion/defibrillation for diagnostics.\n- Common precipitants at night: ischemia, hypoxemia, sepsis, **K⁺/Mg²⁺ abnormalities**, drug effects (e.g., sotalol, amiodarone interactions, digoxin), and missed beta‑blocker doses. Replace electrolytes early and aggressively within safety limits.\n- Misleading patterns: AF with aberrancy vs VT—treat uncertain wide‑complex tachycardia as VT. Irregular wide‑complex tachycardia suggests AF with pre‑excitation; electricity or procainamide, not AV nodal blockers.\n- What must happen now: stabilize, attach defib pads, verify hemodynamics, obtain ECG, correct electrolytes, prepare sedation for cardioversion, and call ICU if escalating support is needed. What can wait: long‑term anticoagulation strategy, EP study planning, and upstream risk modification.\n- **Guideline Must‑Know:** For pulseless VT/VF, defibrillation plus high‑quality CPR, **epinephrine 1 mg IV q3–5 min**, and **amiodarone 300 mg IV push** (then **150 mg**) improves defibrillation success; resume compressions immediately after shocks.\n- **Guideline Must‑Know:** Rate control in hemodynamically stable AF with RVR typically uses **diltiazem** or **metoprolol**; however, in decompensated HFrEF, prefer **amiodarone** or **digoxin** for rate control; electricity for instability.\n- Pitfalls: Giving amiodarone for torsades (can worsen QT), using adenosine in irregular wide‑complex tachycardia with pre‑excitation, or delaying pacing in complete heart block. Recognize drug accumulation in CKD and avoid multiple AV nodal blockers together.\n- Call ICU/Consult: refractory VT/VF, recurrent torsades, complete heart block not responding to atropine, unstable AF/flutter requiring repeated cardioversion, or need for temporary transvenous pacing or antiarrhythmic infusions with vasopressors.\n\n## Top ICU/Consult Triggers\n- Persistent or recurrent VT/VF, torsades, or need for **>1** cardioversion/defibrillation with ongoing instability.\n- High‑grade AV block with hypotension, syncope, or bradycardia **<40/min** requiring pacing or vasoactive infusions.\n- Escalating oxygen/pressor requirements, ischemia with dynamic ST changes, or rising troponin with malignant arrhythmia.\n- Wide‑complex tachycardia requiring antiarrhythmic infusion and continuous titration or need for temporary transvenous pacing.\n\n## Orders to Place Now\n- Order: 12‑Lead ECG — {STAT acquisition; repeat after intervention}\n- Order: Continuous cardiac monitoring — {telemetry with external defibrillation/pacing pads applied}\n- Order: Electrolyte repletion — {potassium goal 4.0–4.5 mmol/L; magnesium goal ≥0.8 mmol/L; protocolized IV/PO replacement}\n- Order: Antiarrhythmic infusion — {amiodarone 150 mg IV over 10 min → 1 mg/min for 6 h → 0.5 mg/min; adjust for hypotension}\n- Order: Synchronized cardioversion — {energy {100–200 J biphasic}, sedation {etomidate 0.15–0.3 mg/kg or ketamine 0.5–1 mg/kg}, oxygen and suction ready}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 62‑year‑old man with palpitations and dizziness becomes hypotensive (BP 78/48 mmHg). Monitor shows an irregular wide‑complex tachycardia at 180/min; ECG reveals delta waves when briefly slower. He is diaphoretic and confused.\n\n### Options\nA. Adenosine rapid IV push  \nB. Diltiazem IV bolus  \nC. Synchronized cardioversion  \nD. Metoprolol IV bolus  \nE. Digoxin IV load\n\n### Correct answer\nC\n\n### Rationale\nUnstable AF with pre‑excitation requires immediate **synchronized cardioversion**. AV nodal blockers (adenosine, diltiazem, beta‑blockers, digoxin) can accelerate conduction down the accessory pathway and precipitate VF. When stable, **procainamide** is preferred for AF with WPW.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 55‑year‑old woman on sotalol for PVCs presents with syncope. ECG shows polymorphic VT with prolonged QTc 530 ms. She is awake with BP 92/56 mmHg and ongoing runs of torsades.\n\n### Options\nA. Amiodarone IV bolus  \nB. Magnesium sulfate 2 g IV over 10–15 min  \nC. Diltiazem IV bolus  \nD. Lidocaine IV bolus  \nE. Immediate thrombolysis\n\n### Correct answer\nB\n\n### Rationale\nTorsades due to QT prolongation is treated with **magnesium sulfate 2 g IV**, electrolyte optimization (**K⁺ 4.0–4.5 mmol/L; Mg²⁺ ≥0.8 mmol/L**), and stopping QT‑prolonging drugs; overdrive pacing if recurrent. The pitfall is giving **amiodarone**, which can further prolong QT.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: First step for unstable organized tachyarrhythmia?  \n  A: Immediate synchronized cardioversion with **100–200 J biphasic**, do not delay for ECG interpretation.\n- Q: Atropine dose for symptomatic bradycardia?  \n  A: **1 mg IV q3–5 min** to a **maximum of 3 mg**, then pacing/infusion if ineffective.\n- Q: Initial magnesium dose for torsades de pointes?  \n  A: **2 g IV over 10–15 min**, may repeat once; consider infusion and overdrive pacing if recurrent.\n- Q: Electrolyte targets on telemetry to reduce ectopy?  \n  A: **K⁺ 4.0–4.5 mmol/L** and **Mg²⁺ ≥0.8 mmol/L**, unless contraindicated by renal function.\n\n## Guidelines & Key References\n- AHA Adult ACLS Tachycardia/Bradycardia Algorithms, 2020 with focused updates 2023–2024 — https://cpr.heart.org\n- 2023 ACC/AHA/ACCP/HRS Guideline for the Management of Atrial Fibrillation — https://www.ahajournals.org/doi/10.1161/CIR.0000000000001193\n- 2018 ACC/AHA/HRS Guideline on the Evaluation and Management of Patients With Bradycardia and Cardiac Conduction Delay — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000628\n- 2017 AHA/ACC/HRS Guideline for Management of Ventricular Arrhythmias and the Prevention of Sudden Cardiac Death — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000549\n- AHA Scientific Statement on Drug‑Induced Arrhythmias (QT prolongation), 2020 — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000905\n\n## CDI: What to Document Clearly Tonight\n- Arrhythmia diagnosis + acuity: e.g., “Unstable monomorphic VT” or “Symptomatic complete heart block” with hemodynamic effects (hypotension, shock, altered mental status).\n- Etiology/cause: ischemia, electrolyte disturbance (e.g., hypokalemia, drug‑induced QT prolongation), structural heart disease, or conduction disease.\n- Severity/organ dysfunction: need for cardioversion/defibrillation, vasoactive support, pacing, respiratory failure, lactate elevation.\n- Objective evidence: ECG rhythm/intervals (QRS/QTc), vitals, troponin, electrolytes (K⁺, Mg²⁺), imaging if ischemia suspected.\n- Treatment/monitoring: cardioversion/defibrillation energy, antiarrhythmic doses, pacing parameters, electrolyte targets, continuous telemetry, and consults placed.\n", "hypertensive-emergency-vs-urgency.md": "---\nfilename: hypertensive-emergency-vs-urgency.md\nid: hypertensive-emergency-vs-urgency\ntitle: Hypertensive Emergency vs Urgency\nslug: hypertensive-emergency-vs-urgency\ntags: [hypertension, critical-care, inpatient, night-float, cardiology]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Hypertensive Emergency vs Urgency\n\n## Panic Card\n- Recheck BP with correct cuff/position; place continuous monitoring; if end-organ injury present, target **MAP reduction ≤20–25% in first hour**, then gradual control—avoid precipitous drops. Consider arterial line for titratable IV therapy. citeturn2search44turn2search6\n- Rapidly screen BARKH end organs (brain, arteries/aorta, retina, kidney, heart) and obtain problem-directed imaging/labs; treat pain/anxiety that can elevate BP. citeturn2search6\n- Start a titratable IV antihypertensive (e.g., nicardipine, clevidipine, labetalol) when emergency confirmed; set clear numeric BP goals based on the specific organ injury. citeturn2search6turn2search44\n- Aortic dissection suspected: **IV beta-blocker first (e.g., esmolol), then vasodilator; goal SBP <120 mmHg and HR 60–80 within ~20 min**. citeturn2search13turn2search15\n- Intracerebral hemorrhage: favor smooth control to **SBP 130–150 mmHg**; avoid lowering **<130 mmHg** acutely. citeturn2search7\n- Acute ischemic stroke: before IV thrombolysis, **BP <185/110**; maintain **<180/105** for 24 h; if no reperfusion therapy, generally avoid lowering unless **≥220/120** (then reduce ~15% in 24 h). citeturn2search47turn2search46\n\n## Brief Overview\n- **Guideline Must‑Know:** The AHA 2024 acute care statement recommends abandoning “hypertensive urgency” terminology in favor of “asymptomatic markedly elevated BP” (≥180/110–120 without new/worsening target-organ damage); treat the patient, not the number. citeturn2search6turn2search1\n- **Guideline Must‑Know:** Hypertensive emergency is severe BP elevation with **acute target-organ injury** (BARKH: encephalopathy/stroke/ICH, aortic catastrophe, high-grade retinopathy, AKI/MAHA, ACS/acute pulmonary edema) and requires **IV** therapy with monitored titration. citeturn2search6\n- **Guideline Must‑Know:** Initial goal is **MAP ↓ ≤20–25% in the first hour**, then to **~160/100–110** over the next 2–6 h, unless a specific condition dictates otherwise (e.g., dissection, stroke). citeturn2search44\n- **Guideline Must‑Know:** Measurement matters—recheck with proper cuff/position, resolve reversible drivers (pain, anxiety, hypoxia, bladder distention, stimulants), and note that arterial lines are preferred when giving titratable IV agents. citeturn2search6turn2search1\n- **Guideline Must‑Know:** Asymptomatic markedly elevated BP generally should **not** be acutely lowered with IV agents; initiate/adjust oral therapy and arrange close follow‑up; avoid PRN IV hydralazine/labetalol “just for numbers.” citeturn2search6turn2search45\n- **Guideline Must‑Know:** Organ‑specific targets vary: aortic dissection **SBP <120** and HR 60–80 (beta‑blockade first), ICH **SBP 130–150**, AIS with thrombolysis **<185/110 pre‑bolus** and **<180/105 for 24 h**; AIS without reperfusion typically treat only if **≥220/120**. citeturn2search13turn2search7turn2search47turn2search46\n- Differentiate pulmonary edema/ACS (favor IV nitroglycerin or clevidipine/nicardipine) versus sympathetic crises (avoid pure vasodilators until beta‑blockade if aortic dissection or pheo suspected). citeturn2search44\n- In pregnancy/puerperium, **treat ≥160/110 confirmed within 15 min** using IV labetalol, IV hydralazine, or oral immediate‑release nifedipine; evaluate for preeclampsia/eclampsia and give magnesium when indicated. citeturn2search27turn2search29\n- For AKI/CKD, avoid over‑rapid falls that worsen renal perfusion; choose easily titratable agents and track creatinine/urine output. citeturn2search44\n- What must happen now: confirm emergency (symptoms/signs/labs/imaging), start titratable IV therapy with clear numeric targets, continuous monitoring, and early ICU involvement when instability, IV infusion, or neuro/ACS/aortic pathology is present. citeturn2search6\n- What can wait until daytime: chronic regimen optimization, secondary HTN workup, ambulatory targets/risk calculators (per 2025 ACC/AHA outpatient guideline updates). citeturn2search4\n- Pitfalls: mistaking pain/anxiety readings for emergencies; chasing “normal” BP quickly (risk of cerebral/coronary/renal hypoperfusion); giving thrombolysis without meeting BP thresholds; missing dissection in chest/back pain with pulse deficit. citeturn2search44turn2search47turn2search13\n- ICU/consult calls to make early: neuro for ICH/AIS, cardiology for ACS/flash edema, cardiothoracic/vascular for dissection, nephrology for severe AKI; transfer if lacking continuous titration capacity. citeturn2search7turn2search13\n- Documentation should distinguish “hypertensive emergency” from “asymptomatic markedly elevated BP”; avoid the ambiguous term “urgency” per AHA 2024. citeturn2search6\n- **Confirm Before Proceed:** In AIS, do **not** rapidly normalize BP below recommended thresholds before/after reperfusion; in suspected dissection, **beta‑block first** before vasodilator; irreversible therapies (e.g., thrombolysis) require strict BP verification. citeturn2search47turn2search13\n- Disposition pearls: most asymptomatic markedly elevated BP can be managed outpatient; true emergencies need monitored beds and IV drips; avoid unnecessary imaging in well patients without red flags. citeturn2search6turn2search42\n\n## Top ICU/Consult Triggers\n- Requirement for titratable IV antihypertensive infusion and/or arterial line to meet time‑sensitive organ‑specific targets (e.g., ICH, AIS reperfusion, dissection). citeturn2search6\n- Neurologic deficit or hemorrhage on imaging; SBP not achieving **130–150** in ICH within 1 h despite therapy. citeturn2search7\n- Suspected or confirmed aortic dissection; need to reach **SBP <120** and HR 60–80 promptly with beta‑blockade. citeturn2search13\n- Refractory pulmonary edema/ACS or ongoing end‑organ ischemia despite initial measures. citeturn2search44\n\n## Orders to Place Now\n- Order: Continuous IV antihypertensive infusion (nicardipine or clevidipine) — {start rate, titration increment, BP goal, max rate, monitoring frequency} citeturn2search6\n- Order: IV labetalol bolus — {dose mg, repeat interval, maximum total dose, hold parameters} citeturn2search6\n- Order: Arterial line placement — {site, ultrasound guidance, waveform monitoring, blood sampling protocol} citeturn2search6\n- Order: Non‑contrast head CT (stroke/ICH check) — {indication, timing, stat read, neuro consult if positive} citeturn2search7turn2search47\n- Order: CTA chest/abdomen/pelvis for aortic syndrome — {indication, beta‑block before scanner if hypertensive/tachycardic, contrast precautions} citeturn2search13\n\n## ABIM‑Style Question 1\n\n### Stem\nA 62‑year‑old with sudden tearing chest pain radiating to the back has BP 208/118 mmHg and HR 112. Exam shows asymmetric arm BPs and a new diastolic murmur. ECG without STEMI. You suspect acute aortic dissection.\n\n### Options\nA. Start IV nicardipine infusion immediately to lower SBP below 120 mmHg  \nB. Start IV esmolol, then add nicardipine to reach SBP <120 mmHg and HR 60–80  \nC. Give sublingual nifedipine and observe  \nD. Give IV hydralazine to rapidly lower SBP to normal  \nE. Begin IV nitroprusside alone to rapidly lower MAP\n\n### Correct answer\nB\n\n### Rationale\nFor suspected dissection, guidelines recommend **beta‑blockade first** to blunt shear (HR 60–80), then add a vasodilator to achieve **SBP <120 mmHg** rapidly. Pure vasodilation before rate control can increase shear; hydralazine/nifedipine are inappropriate here. citeturn2search13turn2search15\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 74‑year‑old with acute ischemic stroke (NIHSS 6) arrives 7 hours after last‑known‑well, not eligible for thrombolysis or thrombectomy. BP is 210/112 mmHg; he is comfortable, oxygenating well, and has no chest pain, dyspnea, or AKI.\n\n### Options\nA. Start IV nicardipine to lower SBP to <140 mmHg in the first hour  \nB. Give IV labetalol to reduce SBP by 30% immediately  \nC. Allow permissive hypertension; no urgent BP lowering unless SBP ≥220 or DBP ≥120  \nD. Start IV nitroprusside to normalize BP quickly  \nE. Start oral captopril and amlodipine to reduce SBP to <130 mmHg tonight\n\n### Correct answer\nC\n\n### Rationale\nIn AIS patients **not** receiving reperfusion, guidelines generally avoid treatment unless **BP ≥220/120 mmHg**; if treated, reduce only about **15% in the first 24 h** to preserve perfusion. The pitfall is over‑rapid normalization worsening cerebral ischemia. citeturn2search47turn2search46\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Max initial BP reduction allowed in most hypertensive emergencies?  \n  A: **MAP ↓ ≤20–25% in first hour**, then gradual lowering based on organ‑specific targets. citeturn2search44\n- Q: Pre‑thrombolysis BP requirement in AIS?  \n  A: **<185/110 mmHg** before bolus and **<180/105 mmHg** for 24 h afterward. citeturn2search47\n- Q: ICH acute BP goal?  \n  A: Target **SBP 130–150 mmHg** with smooth control; avoid <130 mmHg. citeturn2search7\n- Q: Aortic dissection hemodynamic targets and sequence?  \n  A: **HR 60–80** and **SBP <120 mmHg** with **beta‑blockade first**, then vasodilator. citeturn2search13\n- Q: Pregnancy severe hypertension confirmation and first‑line agents?  \n  A: Confirm **≥160/110 within 15 min**; treat with IV labetalol, IV hydralazine, or oral immediate‑release nifedipine. citeturn2search27\n\n## Guidelines & Key References\n- AHA Scientific Statement: Management of Elevated BP in Acute Care (2024) — summary and practice points. citeturn2search6turn2search1\n- ACC/AHA Guideline for High Blood Pressure in Adults (2025) — outpatient fundamentals and updates relevant to inpatient transitions. citeturn2search4turn2search2\n- AHA/ASA Guideline for Spontaneous ICH (2022) — BP targets and smooth control emphasis. citeturn2search7\n- ACC/AHA Aortic Disease Guideline (2022) — dissection HR/BP targets and sequencing. citeturn2search13\n- AHA/ASA Acute Ischemic Stroke 2019 Update — BP thresholds around thrombolysis and early care. citeturn2search47\n\n## CDI: What to Document Clearly Tonight\n- Hypertensive emergency vs asymptomatic markedly elevated BP; specify acute target‑organ injury present/absent and which organ(s) (brain/aorta/retina/kidney/heart) with objective evidence (exam/imaging/labs).  \n- Acuity and severity with numeric goals: initial **MAP ↓ ≤20–25%**, organ‑specific targets (e.g., ICH SBP 130–150; AIS reperfusion thresholds; dissection SBP <120 & HR 60–80).  \n- Etiology/precipitants (med nonadherence, stimulant use, pain, volume overload) and treatments used (IV nicardipine/clevidipine/labetalol, beta‑blocker first for dissection, magnesium for eclampsia) with responses.  \n- Monitoring/intensity: continuous telemetry, arterial line if used, ICU vs step‑down, consults placed (neuro/cardiology/CT surgery/nephrology).", "neurologic-emergencies-status-epilepticus-and-stroke.md": "---\nfilename: neurologic-emergencies-status-epilepticus-and-stroke.md\nid: neurologic-emergencies-status-epilepticus-and-stroke\ntitle: Neurologic Emergencies (Status Epilepticus & Stroke)\nslug: neurologic-emergencies-status-epilepticus-and-stroke\ntags: [neurology, inpatient, night-float, emergencies]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-20\nsource: IM_NightFloat_Engine\n---\n\n# Neurologic Emergencies (Status Epilepticus & Stroke)\n\n## Panic Card\n- Airway, breathing, circulation; check **FSBG now**; give **thiamine 100 mg IV before dextrose** if malnourished risk; place on cardiorespiratory and end‑tidal CO₂ monitoring. citeturn2search50\n- Ongoing seizures ≥5 min: give **lorazepam 0.1 mg/kg IV (max 4 mg)** or **midazolam 10 mg IM** immediately; repeat once in 5 min if needed. citeturn2search50turn2search22\n- Suspected acute ischemic stroke: determine **Last Known Well**; get **noncontrast head CT**; aim **door‑to‑imaging ≤20 min**; consider **IV alteplase ≤4.5 h** or **mechanical thrombectomy up to 24 h in selected LVO**. **Confirm Before Proceed:** thrombolysis contraindications reviewed. citeturn2search2turn2search4\n- Before IV thrombolysis, lower **BP <185/110 mmHg** (e.g., labetalol, nicardipine); after treatment, maintain **<180/105 mmHg for 24 h**. citeturn2search2\n- If hemorrhage on CT: reverse anticoagulants per agent; target **SBP ~140–160 mmHg** promptly; call neurosurgery/neuro‑ICU. **Confirm Before Proceed:** reversal products and doses verified. citeturn2search13\n\n## Brief Overview\n- **Guideline Must‑Know:** Status epilepticus (SE) is ≥5 min of continuous seizures or recurrent seizures without recovery; treat in parallel with ABCs and early benzodiazepines to prevent refractoriness. citeturn2search50\n- **Guideline Must‑Know:** First‑line for convulsive SE: **lorazepam 0.1 mg/kg IV (max 4 mg)**, **midazolam 10 mg IM** if no IV, or **diazepam 10 mg IV**; repeat once if needed. Avoid under‑dosing. citeturn2search22turn2search24\n- **Guideline Must‑Know:** If seizures persist, proceed immediately to urgent control therapy with one of: **levetiracetam 60 mg/kg IV (max 4.5 g)**, **fosphenytoin 20 mg PE/kg IV**, or **valproate 40 mg/kg IV**. Choose based on comorbidities and interactions. citeturn2search50\n- **Guideline Must‑Know:** Refractory SE (persistent after a benzodiazepine + a second agent): start anesthetic infusion (e.g., **midazolam** or **propofol**) titrated to seizure suppression/burst‑suppression with continuous EEG if available; consider transfer if cEEG unavailable. citeturn2search52\n- Evaluate precipitating causes alongside treatment: **FSBG**, electrolytes, tox, AED levels, infection workup; obtain **noncontrast head CT**; consider LP only after stabilization. citeturn2search50\n- Avoid rapid correction of chronic hyponatremia; enforce **Na⁺ correction ≤8–10 mmol/L per 24 h** (≤4–6 if high risk). citeturn2search38\n- **Guideline Must‑Know:** Stroke: for suspected acute ischemic stroke (AIS), determine **Last Known Well** precisely and activate imaging and telestroke pathways; **NCCT** is first‑line to exclude bleed; CTA ± perfusion for LVO selection. citeturn2search2\n- **Guideline Must‑Know:** IV thrombolysis should begin **as quickly as possible within ≤4.5 h** when eligible. **Alteplase 0.9 mg/kg (max 90 mg)** is standard; **tenecteplase 0.25 mg/kg (max 25 mg)** is an acceptable alternative in selected patients per recent AHA/ASA update. **Confirm Before Proceed** thrombolysis contraindications. citeturn2search2turn2search3\n- **Guideline Must‑Know:** Endovascular therapy for anterior‑circulation LVO is recommended **≤6 h** and **reasonable up to 24 h** in selected patients (DAWN/DEFUSE 3 criteria or equivalent perfusion mismatch). Escalate to neurointerventional team early. citeturn2search4\n- BP management in AIS: prior to IVT, **<185/110**; after IVT **<180/105**; avoid aggressive post‑EVT hypotension. In ICH, lower **SBP to ~140–160** promptly while avoiding large variability. citeturn2search2turn2search17\n- Antiplatelets: if no IVT, initiate **aspirin within 24 h**; if minor non‑cardioembolic stroke/TIA within 24 h, consider **short DAPT** per prevention guidance (defer if IVT given). Escalate to neurology for nuances. citeturn2search30\n- **Guideline Must‑Know:** For anticoagulated patients (e.g., DOAC within 48 h and normal renal function), **IV thrombolysis is generally contraindicated**; if LVO and otherwise eligible, **proceed to EVT**; discuss reversal only when indicated and beneficial. citeturn2search2\n- **Guideline Must‑Know:** ICH care: rapidly reverse warfarin with **4‑factor PCC**, dabigatran with **idarucizumab**, factor Xa inhibitors with **andexanet alfa** when appropriate; avoid routine platelet transfusions unless emergent surgery/severe thrombocytopenia. citeturn2search17\n- Night pitfalls: missing nonconvulsive SE post‑stopping convulsions (need cEEG if persistent encephalopathy), undertreating benzodiazepine doses, delaying CTA/perfusion for potential EVT candidates, or forgetting to re‑measure BP targets after IVT/EVT. citeturn2search50turn2search2\n- **Guideline Must‑Know:** Oxygenation/ventilation: treat hypoxemia, avoid hyperoxia; protect airway in ongoing convulsions; consider early intubation for RSE or aspiration risk; maintain **MAP ≥65 mmHg** if shock occurs and follow pressor hierarchy. citeturn2search38\n- **Guideline Must‑Know:** Document clearly: timing (LKW), NIHSS, contraindication screen, consent/risk discussion for thrombolysis/EVT, post‑treatment neuro checks, BP/bleed monitoring; for SE, total doses/timing and EEG findings. citeturn2search31\n\n## Top ICU/Consult Triggers\n- Persistent seizures despite benzodiazepine plus one second‑line agent, or need for anesthetic infusion/cEEG (refractory SE). citeturn2search52\n- AIS with **LVO**, large infarct risk/mass effect, declining mental status, or **NIHSS high** requiring EVT or neuro‑ICU monitoring. citeturn2search4\n- ICH, SAH suspicion, or post‑thrombolysis deterioration (new headache, emesis, acute HTN, neuro decline). citeturn2search13\n- Airway compromise, **SpO₂ <90%**, aspiration, or hemodynamic instability/shock. citeturn2search38\n\n## Orders to Place Now\n- Order: CT head without contrast — {stat, stroke_protocol=yes, include_time_last_known_well} citeturn2search2\n- Order: CTA head/neck ± CT perfusion — {if LVO suspected or late window; renal_function={Cr,eGFR}} citeturn2search4\n- Order: Alteplase IV for AIS — {weight_kg, total_dose=0.9 mg/kg max 90 mg, bolus=10%, infusion=90% over 60 min, BP_goal=<180/105} citeturn2search2\n- Order: Tenecteplase IV push for AIS (if appropriate) — {dose=0.25 mg/kg max 25 mg, single bolus, BP_goal=<180/105} citeturn2search3\n- Order: Benzodiazepine for SE — {lorazepam 0.1 mg/kg IV max 4 mg OR midazolam 10 mg IM if no IV access} citeturn2search22turn2search50\n- Order: Urgent control antiseizure med — {choose one: levetiracetam 60 mg/kg IV max 4.5 g OR fosphenytoin 20 mg PE/kg IV OR valproate 40 mg/kg IV} citeturn2search50\n\n## ABIM‑Style Question 1\n\n### Stem\nA 68‑year‑old with hypertension presents 90 minutes after sudden aphasia and right hemiparesis. BP is 198/112 mmHg, glucose 110 mg/dL, NIHSS 14. Noncontrast CT shows no hemorrhage. CTA is not yet done.\n\n### Options\nA. Give IV alteplase now without further delay  \nB. Lower BP to **<185/110 mmHg** with IV labetalol, then give IV alteplase  \nC. Wait for CTA and perfusion imaging before deciding on thrombolysis  \nD. Start aspirin 325 mg now and plan dual antiplatelet therapy  \nE. Give tenecteplase 0.25 mg/kg now without addressing BP\n\n### Correct answer\nB\n\n### Rationale\nIV thrombolysis should be administered within **≤4.5 h** in eligible patients, but **BP must be <185/110 mmHg before** treatment and maintained **<180/105** after; antihypertensive therapy (e.g., labetalol) should precede alteplase. Delaying for advanced imaging (CTA/perfusion) is not required to start IVT when NCCT excludes hemorrhage. Tenecteplase is reasonable in selected patients per updated guidance but still requires BP control. citeturn2search2turn2search4turn2search3\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 72‑year‑old with atrial fibrillation (on apixaban; last dose 3 hours ago) presents 2 hours after LKW with left MCA syndrome, NIHSS 16. BP 172/98 mmHg. NCCT shows no hemorrhage. CTA shows a proximal left M1 occlusion.\n\n### Options\nA. Give IV alteplase because within 4.5 h  \nB. Give tenecteplase 0.25 mg/kg because it is easier to administer  \nC. Proceed directly to mechanical thrombectomy; withhold IV thrombolysis  \nD. Reverse apixaban with andexanet alfa, then give IV alteplase  \nE. Start heparin infusion while awaiting interventional team\n\n### Correct answer\nC\n\n### Rationale\nRecent DOAC ingestion is a **contraindication to IV thrombolysis** in most cases; this patient has an LVO and is an EVT candidate, so proceed to thrombectomy without IVT. Reversal solely to enable thrombolysis is not routine in AIS and should be individualized; anticoagulation is not indicated acutely. The pitfall is giving thrombolysis despite **recent DOAC use**. citeturn2search2\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What lorazepam dose is recommended first‑line for adult convulsive SE?  \n  A: **0.1 mg/kg IV (max 4 mg)**; repeat once in 5 minutes if needed.\n- Q: What BP must be achieved before IV thrombolysis for AIS?  \n  A: **<185/110 mmHg** before IVT; then **<180/105 mmHg** for 24 h after.\n- Q: What is the extended window for EVT in select anterior circulation LVO strokes?  \n  A: Up to **24 hours** from LKW if advanced imaging shows salvageable tissue.\n- Q: List one standard second‑line agent and dose for established SE.  \n  A: **Levetiracetam 60 mg/kg IV (max 4.5 g)**; alternatives are fosphenytoin or valproate.\n- Q: What sodium correction limit prevents osmotic demyelination in hyponatremia?  \n  A: **≤8–10 mmol/L per 24 h** (≤4–6 if high risk).\n\n## Guidelines & Key References\n- AHA/ASA. Guidelines for the Early Management of Patients With Acute Ischemic Stroke: 2019 Update to the 2018 Guidelines. [Slide deck PDF] citeturn2search2\n- AHA/ASA. Acute Ischemic Stroke Guideline — published in Stroke, January 26, 2026 (publication schedule notice). [Professional Heart Daily] citeturn2search26\n- AHA/ASA. Guidelines for Managing Patients With Acute Ischemic Stroke: Key Summary (late window EVT up to 24 h). [AIS toolkit PDF] citeturn2search4\n- Neurocritical Care Society. ENLS 6.0 Status Epilepticus Protocol (July 2024). [PDF] citeturn2search50\n- American Epilepsy Society. Evidence‑Based Guideline: Treatment of Convulsive Status Epilepticus (2016). [PDF] citeturn2search22\n- AHA/ASA. 2022 Guideline for Management of Spontaneous Intracerebral Hemorrhage (clinical update slides). [PDF] citeturn2search13\n- JAMA Medical News. 2026 AHA/ASA AIS guideline highlights (tenecteplase option). citeturn2search3\n\n## CDI: What to Document Clearly Tonight\n- Acute ischemic stroke due to presumed large‑vessel thromboembolism — onset (LKW), NIHSS, territory, candidacy/decision for IVT/EVT, contraindication screen, BP targets, objective imaging/labs, treatment given (dose/time), complications monitoring.\n- Status epilepticus — convulsive vs nonconvulsive, etiology (e.g., metabolic/toxic/structural), total antiseizure doses/timing, response, airway/vent support, cEEG findings.\n- Hypertensive emergency secondary to stroke — severity, end‑organ effects (neuro deficits, imaging), agents/doses to achieve **SBP/BP goals**, monitoring plan.\n- Anticoagulation status — agent, last dose/time, renal function, reversal decision/rationale, risks/benefits discussion documented.\n- Aspiration risk or pneumonia due to neurologic deficit — evidence (CXR/fever/leukocytosis), type (aspiration), severity, treatment and need for NPO/SLP evaluation.\n", "altered-mental-status.md": "---\nfilename: altered-mental-status.md\nid: altered-mental-status\ntitle: Altered Mental Status\nslug: altered-mental-status\ntags: [neurology, inpatient, night-float, emergencies, delirium]\nlevel: resident\nestimated_time_min: 25\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Altered Mental Status\n\n## Panic Card\n- Assess ABCs; secure airway if **GCS ≤8** or loss of protective reflexes; target **MAP ≥65 mmHg**; titrate O₂ to **SpO₂ 94–98%** (or **88–92%** if chronic hypercapnic risk).  \n- Check capillary glucose immediately; if **<3.0 mmol/L**, give **dextrose 25 g IV** and recheck; give **thiamine 100 mg IV** in malnutrition/alcohol use (do not delay glucose for thiamine).  \n- Suspected opioid toxicity: give **naloxone 0.04–0.4 mg IV**, titrate q2–3 min up to 2 mg; consider infusion if recurrent.  \n- Active seizure/status: **lorazepam 2 mg IV q1–2 min** up to 4–8 mg, then **levetiracetam 60 mg/kg (max 4500 mg)** or **fosphenytoin 20 mg PE/kg**; prepare for airway protection.  \n- Suspected sepsis: obtain cultures, give broad‑spectrum antibiotics within 1 h, start fluids and **norepinephrine** to **MAP ≥65 mmHg**; lactate and repeat assessment.\n\n## Brief Overview\n- Altered mental status (AMS) spans agitation, delirium, somnolence, and coma; prioritize reversible causes (hypoxia, hypoglycemia, opioids/sedatives, seizures, stroke, sepsis, electrolyte/acid‑base disorders, hepatic/uremic encephalopathy, Wernicke encephalopathy, CNS infection, trauma).\n- **Guideline Must‑Know:** For suspected stroke with focal deficit/acute onset, obtain non‑contrast head CT rapidly; **IV thrombolysis ≤4.5 h** from last‑known‑well in eligible patients; evaluate for mechanical thrombectomy up to **24 h** in selected LVO patients.  \n- **Guideline Must‑Know:** Sepsis with AMS is organ dysfunction; initiate **antibiotics within 1 h**, **30 mL/kg** balanced crystalloids for hypotension or lactate ≥4, and **norepinephrine** as first‑line vasopressor to **MAP ≥65 mmHg**; reassess volume and perfusion frequently.  \n- **Guideline Must‑Know:** Status epilepticus requires benzodiazepines first (IM midazolam or IV lorazepam), then a second‑line antiseizure medication (fosphenytoin, valproate, or levetiracetam) if seizures persist; avoid treatment delays.  \n- **Guideline Must‑Know:** ICU delirium management emphasizes non‑pharmacologic measures (reorientation, sleep, mobilization), pain control, and light sedation; avoid benzodiazepines unless specifically indicated (e.g., alcohol withdrawal).  \n- **Guideline Must‑Know:** Alcohol withdrawal delirium presents with tremor, tachycardia, diaphoresis, agitation, hallucinations; treat with symptom‑triggered or front‑loaded benzodiazepines; add adjuncts (e.g., phenobarbital) per protocol if refractory; correct electrolytes and give **thiamine**.  \n- **Guideline Must‑Know:** In hyper‑ or hyponatremia causing AMS, limit **Na⁺ correction to ≤8–10 mmol/L per 24 h** (≤4–6 if high risk) to prevent osmotic demyelination or cerebral edema; for severe symptomatic hyponatremia (e.g., seizures), give **3% saline 100 mL IV bolus** and recheck sodium.\n- What must happen now vs later: now—stabilize airway/breathing/circulation, glucose check/tx, antidotes (naloxone), seizure control, treat sepsis, obtain head CT if focal deficits/trauma/anticoagulation. Later—broad diagnostic panels, medication reconciliation, neurocognitive assessment, delirium prevention bundle, collateral history.\n- Red flags demanding rapid escalation: new focal neurologic deficit, fever/hypotension, meningismus, head trauma/anticoagulation use, **GCS drop ≥2**, persistent hypoxemia/hypercapnia, refractory seizures, severe metabolic derangement (pH **<7.2**, K⁺ **≥6.0 mmol/L** with ECG changes).\n- Pitfalls: missing hypoglycemia; over‑oxygenating hypercapnic COPD patients (worsening CO₂ narcosis—target **SpO₂ 88–92%**); giving haloperidol in prolonged QT; delaying antibiotics in sepsis; overlooking polypharmacy (anticholinergics, sedatives, baclofen, gabapentinoids); not checking **AMMONIA** in cirrhosis or **TSH** when indicated.\n- Imaging: non‑contrast head CT first for bleed/mass; consider C‑spine imaging if trauma; MRI brain when CT non‑diagnostic and suspicion for stroke/encephalitis remains; lumbar puncture after imaging if meningitis/encephalitis suspected—start empiric antimicrobials promptly if high suspicion.\n- Labs to send early: CBC, CMP (Na⁺/K⁺/Ca²⁺/Mg²⁺), VBG/ABG, lactate, osmolar gap if toxic alcohols suspected, ammonia, TSH, B12, troponin, UA/urine culture, blood cultures, ethanol, acetaminophen/salicylate levels, urine tox screen.\n- Medication issues: hold/adjust CNS depressants and renally cleared drugs in AKI; consider baclofen toxicity in CKD; evaluate for serotonin syndrome (hyperreflexia/clonus) vs neuroleptic malignant syndrome (rigidity, hyperthermia) and treat accordingly.\n- **Guideline Must‑Know:** For CAP‑related sepsis with AMS, follow ATS/IDSA CAP recommendations for empiric coverage based on severity and risk factors; de‑escalate with culture data and treat typical durations (often **5–7 days** if improving).\n- **Guideline Must‑Know:** Transfusion for anemia‑related AMS is rarely emergent unless hemodynamically unstable or with active ischemia; most stable adults use **restrictive thresholds (Hb <7 g/dL)**—individualize to symptoms/ischemia.\n- “Confirm Before Proceed” warnings: thrombolysis/anticoagulation reversal, hypertonic saline, lumbar puncture in coagulopathy, and aggressive Na⁺ correction; re‑verify last‑known‑well, anticoagulant use, and current labs before irreversible steps.\n- When to call ICU/consults: airway compromise, shock, refractory seizures, deteriorating neuro status, suspected stroke (neurology) or ICH, fulminant hepatic failure (transplant/hepatology), meningitis/encephalitis (ID), toxicology for complex overdoses.\n\n## Top ICU/Consult Triggers\n- **GCS ≤8**, persistent airway compromise, or escalating oxygen/ventilation support (need for NIV or intubation).  \n- Refractory seizures or **status epilepticus ≥5 min** despite first‑line therapy.  \n- Septic shock requiring **norepinephrine ≥0.1–0.2 μg/kg/min** or lactate rising despite resuscitation.  \n- Rapidly evolving focal deficit or suspected large‑vessel stroke candidate for thrombectomy.  \n- Severe metabolic derangement: pH **<7.2**, K⁺ **≥6.0 mmol/L** with ECG changes, or Na⁺ **<120**/**>160 mmol/L** with symptoms.\n\n## Orders to Place Now\n- Order: Point‑of‑care glucose — {now}  \n- Order: Airway management — {O₂ device; target SpO₂ {88–92% if hypercapnic risk, else 94–98%}; EtCO₂ if available}  \n- Order: Naloxone IV — {0.04–0.4 mg IV; repeat q2–3 min to desired effect; consider infusion if recurrent}  \n- Order: Lorazepam IV for seizure — {2 mg IV q1–2 min up to 4–8 mg}  \n- Order: Non‑contrast head CT — {stat for focal deficit/trauma/anticoagulation/new severe headache}  \n- Order: Broad labs & cultures — {CBC, CMP, Mg²⁺/PO₄³⁻, VBG/ABG, lactate, ammonia, TSH, B12, ethanol, acetaminophen/salicylate, urine tox, UA/urine culture, blood cultures}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 62‑year‑old man with poorly controlled epilepsy is brought from the ward for unresponsiveness and tonic–clonic movements lasting 6 minutes. Vitals: BP 148/86, HR 112, RR 20, SpO₂ 95% on nasal cannula. He received no medications yet. Bedside glucose is 6.0 mmol/L. Neurologic exam shows ongoing generalized convulsions.\n\n### Options\nA. Administer IV dextrose 25 g immediately  \nB. Administer IV lorazepam 2 mg, repeat as needed, then load IV levetiracetam 60 mg/kg  \nC. Intubate now and start propofol infusion without benzodiazepines  \nD. Give IV phenytoin 10 mg/kg as initial therapy  \nE. Obtain urgent MRI brain before treatment\n\n### Correct answer\nB\n\n### Rationale\nConvulsive status epilepticus requires immediate benzodiazepines (e.g., **lorazepam 2 mg IV**, repeat) followed by a second‑line antiseizure medication such as **levetiracetam 60 mg/kg** if seizures persist; delaying therapy worsens outcomes. MRI should not precede stabilization; phenytoin/fosphenytoin, valproate, or levetiracetam are appropriate second‑line agents, but benzodiazepines come first per the guideline algorithm.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 74‑year‑old woman with atrial fibrillation on apixaban (last dose 3 hours ago) develops acute right‑sided weakness and aphasia 45 minutes after last‑known‑well. BP 168/92, glucose 7.2 mmol/L. Non‑contrast CT head shows no hemorrhage.\n\n### Options\nA. Administer IV alteplase now  \nB. Withhold IV thrombolysis; urgently evaluate for mechanical thrombectomy and consult neurology  \nC. Lower BP to <140/90 before any other intervention  \nD. Give full‑dose IV heparin infusion immediately  \nE. Delay all therapy pending MRI brain\n\n### Correct answer\nB\n\n### Rationale\nRecent factor‑Xa inhibitor use is a contraindication to IV thrombolysis unless specific reversal/lab criteria are met; giving alteplase here risks major bleeding—the pitfall is missing anticoagulant exposure. Proceed with rapid large‑vessel occlusion evaluation for endovascular therapy if eligible; manage blood pressure per stroke protocols.  \n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What is the safe daily limit for sodium correction in symptomatic dysnatremia?  \n  A: **≤8–10 mmol/L in 24 h** (use **≤4–6** if high risk: alcoholism, malnutrition, advanced liver disease, hypokalemia).  \n- Q: After benzodiazepines, what is an effective second‑line loading dose of levetiracetam for status epilepticus?  \n  A: **60 mg/kg IV** (maximum **4500 mg**), infused over 10–15 minutes.  \n- Q: What **MAP** target should be maintained in septic shock?  \n  A: **MAP ≥65 mmHg**, titrating norepinephrine as first‑line vasopressor and reassessing perfusion.  \n- Q: What oxygen saturation target minimizes CO₂ retention risk in chronic hypercapnic COPD?  \n  A: **SpO₂ 88–92%**, with ABG/VBG monitoring if worsening mental status.  \n- Q: What is the IV thrombolysis window for acute ischemic stroke and extended window for thrombectomy?  \n  A: **≤4.5 h** for IV thrombolysis in eligible patients; **≤24 h** for mechanical thrombectomy in selected LVO cases.\n\n## Guidelines & Key References\n- AHA/ASA. Guidelines for the Early Management of Patients With Acute Ischemic Stroke (2019 Update). https://professional.heart.org/en/guidelines-statements/guidelines-for-the-early-management-of-patients-with-acute-ischemic-stroke-2019101161str0000000000  \n- Surviving Sepsis Campaign. International Guidelines for Management of Sepsis and Septic Shock (2021). https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021  \n- American Epilepsy Society. Treatment of Convulsive Status Epilepticus in Children and Adults (2016). https://www.aesnet.org/clinical-care/clinical-guidance/guideline-prolonged-seizures  \n- SCCM PADIS Guidelines: Pain, Agitation/Sedation, Delirium, Immobility, Sleep (2018). https://sccm.org/clinical-resources/guidelines/guidelines/guidelines-for-the-prevention-and-management-of-pa  \n- ASAM. Clinical Practice Guideline on Alcohol Withdrawal Management (2020). https://www.asam.org/quality-care/clinical-guidelines/alcohol-withdrawal-management-guideline\n\n## CDI: What to Document Clearly Tonight\n- Acute metabolic encephalopathy — etiology {sepsis/hypoxia/hypercapnia/hyper‑ or hyponatremia/hepatic/uremic/toxic}; severity; objective evidence (GCS, ABG, Na⁺, ammonia, lactate, imaging); treatment/monitoring provided.  \n- Delirium (specify hyperactive/hypoactive/mixed) — precipitant(s) {infection, medications, withdrawal, metabolic}; objective findings (CAM‑ICU/4AT, vitals); safety risks; non‑pharm bundle and meds used/avoided.  \n- Toxic encephalopathy due to {drug/toxin} — exposure history, serum levels if available, ECG/QT, antidotes (e.g., naloxone) and response.  \n- Suspected acute ischemic stroke — last‑known‑well time, NIHSS, imaging results, anticoagulant use, thrombolysis/thrombectomy eligibility decisions with reasons (“Confirm Before Proceed” applied).  \n- Sepsis with acute organ dysfunction (encephalopathy) — source, qSOFA/SOFA elements, lactate, cultures, antibiotics/timing, fluids/pressors, response to therapy.\n", "alcohol-withdrawal-and-agitation.md": "---\nfilename: alcohol-withdrawal-and-agitation.md\nid: alcohol-withdrawal-and-agitation\ntitle: Alcohol Withdrawal & Agitation\nslug: alcohol-withdrawal-and-agitation\ntags: [addiction-medicine, toxicology, inpatient, night-float]\nlevel: resident\nestimated_time_min: 22\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Alcohol Withdrawal & Agitation\n\n## Panic Card\n- Protect airway, breathing, circulation; place on continuous pulse oximetry and telemetry; target **SpO₂ ≥92%**, **MAP ≥65 mmHg**; treat hypoglycemia immediately—do not delay dextrose while you give thiamine. citeturn2search16\n- Give thiamine early for Wernicke risk: **thiamine 200–500 mg IV** (suspected WE) before or with glucose; for prophylaxis **100 mg IV/IM/PO** if lower risk. **Do not delay glucose in hypoglycemia.** citeturn2search2\n- First‑line sedation: symptom‑triggered benzodiazepines (e.g., **diazepam 10 mg IV q5–10 min** or **lorazepam 2–4 mg IV q10–15 min** to control autonomic surge and tremor). Escalate promptly if **CIWA‑Ar ≥19**. citeturn2search1turn2search16turn2search64\n- If refractory after adequate benzodiazepines or when on ventilatory support: consider **phenobarbital load 10–15 mg/kg** (cumulative) or **dexmedetomidine infusion 0.2–0.7 mcg/kg/h** as adjunct (not monotherapy). citeturn2search28turn2search25turn2search14\n- Identify mimics/complications: sepsis, intracranial pathology, stimulant intoxication, hepatic encephalopathy, hypomagnesemia; correct electrolytes (Mg²⁺, K⁺, PO₄³⁻). citeturn2search1\n\n## Brief Overview\n- Alcohol withdrawal typically begins **6–8 h** after last drink, peaks by **72 h**, and may last **5–7 d**; severe forms include seizures (12–48 h) and delirium tremens (48–96 h). **Guideline Must‑Know:** Expect earlier onset if BAC falling rapidly. citeturn2search16\n- **Guideline Must‑Know:** Use **CIWA‑Ar** in communicative adults to titrate meds; severity: **mild <8–10**, **moderate 10–18**, **severe ≥19**. High scores predict seizures/DTs; monitor at least q1–4 h early. citeturn2search64\n- **Guideline Must‑Know:** **Benzodiazepines are first‑line** for moderate–severe withdrawal; use symptom‑triggered strategies when 24/7 assessment is available; front‑load diazepam for rapid control if IV access and no severe hepatic impairment. citeturn2search1turn2search2\n- Practical dosing: diazepam **10 mg IV** q5–10 min until light somnolence and vitals stabilize, or lorazepam **2–4 mg IV** q10–15 min (preferred in **severe liver disease/elderly** due to no active metabolites). citeturn2search16\n- **Guideline Must‑Know:** In **benzodiazepine‑refractory AWS**, consider **phenobarbital** (e.g., **10–15 mg/kg** total load IV, divided) with ICU‑capable monitoring; avoid if heavy recent BZD exposure or suspected hepatic encephalopathy. citeturn2search28turn2search25\n- **Guideline Must‑Know:** **Dexmedetomidine** may be used as an adjunct to control **tachycardia/hypertension/anxiety** when BZDs alone are insufficient; it **does not prevent seizures or DTs** and should **not be monotherapy**. citeturn2search14\n- **Guideline Must‑Know:** For intubated patients already on **propofol** or **midazolam** infusions, additional AWS‑specific sedatives may be unnecessary while on those infusions; continue thiamine and transition to BZD/barbiturate strategy as sedation is weaned. citeturn2search27\n- **Thiamine**: give **parenteral thiamine** to malnourished, decompensated liver disease, ED attendees, or inpatients with acute illness; for **suspected Wernicke’s**, give **high‑dose IV for ≥5 days**, then PO. **Do not delay emergent glucose**. citeturn2search2\n- Adjuncts: **beta‑blockers** or **clonidine** can blunt autonomic surge but **must not replace BZDs**; avoid routine **magnesium prophylaxis** for AWS itself (treat documented deficiency). citeturn2search14\n- Antipsychotics (e.g., **haloperidol**) may calm severe hallucinosis **after** adequate GABAergic therapy; in ICU delirium, routine antipsychotics show **no clear benefit**; 2025 SCCM update issues **conditional** recs prioritizing **dexmedetomidine** over propofol when light sedation and delirium reduction are priorities. citeturn2search23turn2search24\n- **Guideline Must‑Know:** Evaluate for **co‑occurring SUDs** and initiate **AUD treatment** (naltrexone, acamprosate) when medically safe; link to services per **VA/DoD 2021 SUD CPG**. citeturn2search71\n- **Guideline Must‑Know:** In **decompensated cirrhosis**, avoid long‑acting, hepatically metabolized BZDs (diazepam/chlordiazepoxide); use **lorazepam** or **oxazepam** with careful titration and close monitoring. citeturn2search2\n- **Confirm Before Proceed:** Large **phenobarbital** loads after substantial recent BZD dosing increase risk of oversedation/respiratory depression—review last **8–12 h** BZD exposure before loading. citeturn2search28\n- Pitfalls: undertreatment leading to escalating agitation; mistaking **sepsis, thyrotoxicosis, stimulant intoxication, or CNS lesions** for withdrawal; missing **electrolyte derangements** (Mg²⁺, K⁺, PO₄³⁻) that worsen arrhythmia/seizure risk. citeturn2search1\n- **Guideline Must‑Know:** Consider **front‑loading** strategies to reduce total BZD dose and ICU transfers; symptom‑triggered regimens reduce cumulative sedative use and LOS when implemented correctly. citeturn2search1turn2search16\n- **Guideline Must‑Know:** Use **CIWA‑Ar alternatives** (e.g., **mMINDS**) for non‑communicative or ICU patients; don’t rely on CIWA in intubated or delirious patients. citeturn2search64\n- **Guideline Must‑Know:** Avoid **phenytoin** for AWS seizures; use **lorazepam** as rapid‑acting therapy and review the regimen. citeturn2search2\n- Disposition: escalate to ICU for **refractory agitation, escalating sedative needs, respiratory compromise, or delirium tremens**; implement PADIS‑aligned light‑sedation strategies and early mobilization when safe. citeturn2search19turn2search23\n\n## Top ICU/Consult Triggers\n- Persistent **CIWA‑Ar ≥19** or need for **>40 mg diazepam equivalents within 1–2 h** to control symptoms. citeturn2search64turn2search16\n- Recurrent seizures, evolving **delirium tremens**, or severe autonomic instability (**HR >120**, **SBP >180**, **T ≥38.5°C**) despite therapy. citeturn2search16\n- Hypoventilation/aspiration risk, need for continuous infusions (dexmedetomidine/propofol) or **phenobarbital load ≥10 mg/kg** with close cardiorespiratory monitoring. citeturn2search25turn2search14\n\n## Orders to Place Now\n- Order: Alcohol withdrawal nursing protocol — {CIWA‑Ar q{1–4}h, seizure precautions, sitter if needed} citeturn2search64\n- Order: Thiamine — {suspected WE: **500 mg IV q8h x 3–5 days**; high risk: **200 mg IV q8–12h**; prophylaxis: **100 mg IV/PO daily**} citeturn2search2\n- Order: Benzodiazepine symptom‑triggered — {diazepam **10 mg IV** q5–10 min PRN or lorazepam **2–4 mg IV** q10–15 min PRN to CIWA <10 and calm, arousable state} citeturn2search1turn2search16\n- Order: Phenobarbital load (refractory AWS) — {**10–15 mg/kg IV** in divided doses; hold if heavy recent BZD exposure; continuous monitoring} citeturn2search28turn2search25\n- Order: Dexmedetomidine infusion (adjunct) — {start **0.2–0.7 mcg/kg/h**, titrate to light sedation; continue BZD for seizure prophylaxis} citeturn2search14\n- Order: Lab bundle — {BMP/Mg/PO₄, CBC, LFTs, ethanol, TSH if unclear, ECG/telemetry; replete **Mg²⁺ ≥1.0 mmol/L**, **K⁺ ≥4.0 mmol/L**} citeturn2search1\n\n## ABIM‑Style Question 1\n\n### Stem\nA 52‑year‑old man with alcohol use disorder is 12 hours after his last drink. He is anxious, diaphoretic, and tremulous with HR 122/min, BP 168/92 mmHg, T 37.9°C. CIWA‑Ar is 21. No focal deficits. Labs: Na 138 mmol/L, K 3.6 mmol/L, Mg 0.58 mmol/L (1.4 mg/dL), glucose 6.3 mmol/L. He is not cirrhotic. Best next step?\n\n### Options\nA. Start haloperidol 5 mg IV and observe  \nB. Begin dexmedetomidine 0.4 mcg/kg/h infusion as monotherapy  \nC. Give diazepam 10 mg IV now and repeat q5–10 min to symptom control  \nD. Administer phenytoin 20 mg/kg IV for seizure prophylaxis  \nE. Start chlordiazepoxide 50 mg PO scheduled q6h\n\n### Correct answer\nC\n\n### Rationale\nBenzodiazepines are **first‑line** for moderate–severe alcohol withdrawal; in the ED/inpatient setting, IV **diazepam 10 mg** can be rapidly titrated to control autonomic hyperactivity and prevent progression. Dexmedetomidine is an **adjunct** only and does not prevent seizures; antipsychotics do not treat AWS and may lower seizure threshold; phenytoin is **not recommended** for AWS seizures; PO chlordiazepoxide is slower onset and less suitable when **CIWA‑Ar ≥19**. citeturn2search1turn2search14turn2search2\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 58‑year‑old man with decompensated cirrhosis (ascites, INR 1.8, bilirubin 58 μmol/L) is 16 hours after last drink with agitation, tremor, and hallucinations. HR 118/min, BP 160/88 mmHg. CIWA‑Ar 20. Which initial medication strategy is best?\n\n### Options\nA. Diazepam 10 mg IV q5–10 min to sedation  \nB. Lorazepam 2–4 mg IV q10–15 min with careful titration  \nC. Chlordiazepoxide 100 mg PO once, then q6h  \nD. Phenobarbital 10 mg/kg IV load as monotherapy  \nE. Haloperidol 5 mg IV q4h scheduled\n\n### Correct answer\nB\n\n### Rationale\nIn **decompensated liver disease**, choose intermediate/short‑acting BZDs without active metabolites (e.g., **lorazepam**) and titrate carefully; avoid diazepam/chlordiazepoxide due to hepatic accumulation. Phenobarbital may be used adjunctively in refractory cases but is not first‑line and poses oversedation risk in hepatic imp
