airment—the **pitfall** is using long‑acting or barbiturate monotherapy in cirrhosis. Antipsychotics do not treat the underlying withdrawal. citeturn2search2turn2search1\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What **CIWA‑Ar** score defines severe withdrawal requiring aggressive therapy?  \n  A: **≥19** indicates severe AWS and warrants rapid escalation and close monitoring. citeturn2search64\n- Q: What’s a typical **phenobarbital** cumulative loading target in refractory AWS?  \n  A: **10–15 mg/kg IV** (ideal or actual body weight per protocol), given with continuous monitoring. citeturn2search25turn2search28\n- Q: Can **dexmedetomidine** replace benzodiazepines for AWS?  \n  A: No; it is an **adjunct** for autonomic hyperactivity and anxiety and **does not** prevent seizures or DTs. citeturn2search14\n- Q: In suspected **Wernicke’s**, how long should parenteral thiamine be continued?  \n  A: For a **minimum of 5 days**, then transition to oral therapy. citeturn2search2\n\n## Guidelines & Key References\n- ASAM Clinical Practice Guideline on Alcohol Withdrawal Management (2020), PDF. https://www.asam.org/docs/default-source/quality-science/the_asam_clinical_practice_guideline_on_alcohol-1.pdf citeturn2search1\n- SCCM PADIS Guidelines—Pain, Agitation/Sedation, Delirium, Immobility, Sleep (2018), SCCM page. https://sccm.org/clinical-resources/guidelines/guidelines/guidelines-for-the-prevention-and-management-of-pa citeturn2search19\n- SCCM Focused Update to PADIS for Adult ICU (2025), SCCM page. https://www.sccm.org/clinical-resources/guidelines/guidelines/focused-update-padis-guideline citeturn2search23\n- VA/DoD Clinical Practice Guideline: Management of Substance Use Disorder (2021), main page. https://www.healthquality.va.gov/guidelines/MH/sud/ citeturn2search71\n- NICE CG100: Alcohol‑use disorders—Diagnosis and management of physical complications (updated 2017), PDF. https://www.nice.org.uk/guidance/cg100/resources/alcoholuse-disorders-diagnosis-and-management-of-physical-complications-pdf-35109322251973 citeturn2search2\n\n## CDI: What to Document Clearly Tonight\n- Alcohol withdrawal syndrome: **acuity/severity** (e.g., severe with **CIWA‑Ar 22**, autonomic instability), **complicated vs uncomplicated**, **delirium tremens** if present; objective vitals/scores. citeturn2search64\n- Etiology: **alcohol cessation/reduction** with last drink time; history of prior severe AWS/seizures/DTs; comorbid SUDs. citeturn2search1\n- Organ dysfunction/risk: respiratory compromise, aspiration risk, electrolyte abnormalities (Mg²⁺/K⁺), hepatic impairment/cirrhosis. citeturn2search1\n- Treatments supporting severity: **benzodiazepine doses/titration**, **phenobarbital load**, **dexmedetomidine infusion**, **thiamine IV dosing**, continuous monitoring/ICU transfer. citeturn2search25turn2search14turn2search2\n", "electrolyte-emergencies-hyperkalemia-hyponatremia.md": "---\nfilename: electrolyte-emergencies-hyperkalemia-hyponatremia.md\nid: electrolyte-emergencies-hyperkalemia-hyponatremia\ntitle: Electrolyte Emergencies (Hyperkalemia/Hyponatremia)\nslug: electrolyte-emergencies-hyperkalemia-hyponatremia\ntags: [electrolytes, inpatient, night-float, hyperkalemia, hyponatremia]\nlevel: resident\nestimated_time_min: 20\nversion: 2026-02-20\nsource: IM_NightFloat_Engine\n---\n\n# Electrolyte Emergencies (Hyperkalemia/Hyponatremia)\n\n## Panic Card\n- Hyperkalemia with ECG changes or **K⁺ ≥6.5 mmol/L**: place on monitor, obtain ECG, give **calcium gluconate 10% 1 g IV over 5–10 min** (or **calcium chloride 1 g IV** via central line) and repeat if ECG not improving; then shift K⁺ with **regular insulin 10 units IV + dextrose 25 g**, add **nebulized albuterol 10–20 mg**, consider **sodium bicarbonate** if severe acidemia; arrange removal (loop diuretic, binder, or dialysis). citeturn2search24turn2search19\n- Severe symptomatic hyponatremia (seizure, coma, active vomiting with obtundation): give **3% NaCl 100–150 mL IV over 10–20 min**, reassess, and repeat up to two more times aiming **+4–6 mmol/L** initial rise; check Na⁺ **q2–4 h**. citeturn2search18turn2search49\n- Enforce correction limits: **Na⁺ rise ≤8–10 mmol/L per 24 h** (≤4–6 if high risk: malnutrition, alcoholism, liver disease, hypokalemia). Use **desmopressin (DDAVP) 2–4 μg IV** to “clamp” if rapid aquaresis emerges. citeturn2search51turn2search44\n- If refractory hyperkalemia or life‑threatening arrhythmias: call nephrology for **urgent dialysis**. citeturn2search19\n- Confirm Before Proceed: Before initiating vasopressin antagonists or ongoing hypertonic therapy, verify etiology/tonicity and chronicity to avoid **osmotic demyelination** or worsening hypovolemia. citeturn2search18\n\n## Brief Overview\n- Night-float priorities: distinguish immediately dangerous **hyperkalemia** (ECG changes, **K⁺ ≥6.5**) from milder cases; for **hyponatremia**, triage by symptom severity and chronicity (acute ≤48 h vs chronic) and treat symptomatic cases with hypertonic saline boluses. citeturn2search24turn2search18\n- **Guideline Must‑Know:** Hyperkalemia sequence = membrane stabilization (IV calcium) → intracellular shift (insulin/dextrose ± β₂‑agonist ± bicarbonate if acidemic) → removal (diuretics, potassium binders, or dialysis). Dialysis is definitive when refractory or with renal failure. citeturn2search19\n- **Guideline Must‑Know:** UK Kidney Association 2023 update and prior Renal Association guidance endorse IV calcium for ECG changes or severe K⁺, insulin–glucose therapy with close hypoglycemia monitoring for at least **6 h**, and increasing use of modern binders (sodium zirconium cyclosilicate) over calcium polystyrene sulfonate. citeturn2search7turn2search8\n- **Guideline Must‑Know:** For severe symptomatic hyponatremia, European 2014 guideline endorses **3% NaCl 100–150 mL** boluses repeated up to 3 times to achieve rapid 4–6 mmol/L rise and symptom relief. Continuous infusions are slower and risk overcorrection without strict protocols. citeturn2search38turn2search49\n- **Guideline Must‑Know:** Maintain **daily Na⁺ correction ≤8–10 mmol/L** (≤4–6 if high risk) to prevent osmotic demyelination; consider **DDAVP clamp** (scheduled desmopressin with controlled hypertonic dosing) in high‑risk or rapidly autocorrecting patients. citeturn2search51turn2search46\n- **Guideline Must‑Know:** Diagnostic first steps in hyponatremia: confirm hypotonicity (serum osmolality), then urine osmolality and urine Na⁺ to classify water intake vs ADH‑mediated causes; avoid early reliance on clinical volume assessment alone. citeturn2search17\n- **Guideline Must‑Know:** Severe symptoms (seizure/coma), **Na⁺ <120 mmol/L** with deterioration, or failure to respond to initial boluses warrant ICU level monitoring and frequent labs **q2–4 h**. citeturn2search38\n- **Guideline Must‑Know:** In hyperkalemia, modern binders (e.g., **sodium zirconium cyclosilicate 10 g TID ×48 h**) can reduce emergency dialysis needs and are endorsed by NICE for emergency use alongside standard care; onset is within hours (not minutes), so use adjunctive shifting first. citeturn2search30turn2search25turn2search26\n- What must happen now (hyperkalemia): monitor on telemetry, repeat ECG after calcium; give insulin–dextrose (with preemptive dextrose infusion if glucose <7 mmol/L) and β₂‑agonist; start binder if available; identify causes (AKI, RAASi, acidosis); plan removal strategy—loop diuretics if urine output, dialysis if ESRD/refractory. citeturn2search8turn2search24\n- What can wait (hyperkalemia): chronic medication reconciliation, diet counseling, long‑term RAASi strategy, outpatient binder titration. citeturn2search23\n- What must happen now (hyponatremia): in severe/moderate symptoms, give **3% NaCl bolus** and reassess neurologic status and Na⁺; start DDAVP if brisk diuresis or high‑risk for overcorrection; halt hypotonic fluids and offending drugs. citeturn2search18turn2search51\n- What can wait (hyponatremia): definitive SIAD therapy (fluid restriction, urea, salt + loop, cautious vaptan in select euvolemic cases after stabilization), endocrine workup (TSH, cortisol) after initial safety. citeturn2search18\n- Pitfalls: missing pseudohyperkalemia (hemolysis, thrombocytosis/leukocytosis), treating transcellular shifts without addressing decreased excretion, under‑monitoring for post‑insulin hypoglycemia, and overcorrecting chronic hyponatremia after volume repletion (autocorrection). citeturn2search24turn2search8turn2search51\n- Call ICU/nephrology early for hyperkalemia with arrhythmias, **K⁺ ≥6.5**, or rising despite therapy; call ICU for hyponatremia with seizures, impending respiratory compromise, or need for continuous hypertonic/DDAVP titration. citeturn2search24turn2search38\n- Confirm Before Proceed: Avoid **tolvaptan** in hypovolemic hyponatremia or severe symptoms requiring hypertonic saline; avoid rapid normalizing targets—aim for **initial +4–6 mmol/L** then slow. citeturn2search38\n\n## Top ICU/Consult Triggers\n- Hyperkalemia with **ECG changes**, **K⁺ ≥6.5 mmol/L**, or ventricular arrhythmia despite initial therapy. citeturn2search24\n- Hyponatremia with **seizure, coma, or rapidly worsening mental status** or need for repeated 3% NaCl boluses and DDAVP clamp. citeturn2search38\n- Refractory hyperkalemia in **AKI/ESRD** or recurrence after shifts, requiring **urgent dialysis**. citeturn2search19\n- Anticipated overcorrection risk (malnutrition, alcoholism, advanced liver disease, hypokalemia) necessitating **q2–4 h** labs and strict correction targets. citeturn2search51\n\n## Orders to Place Now\n- Order: Cardiac monitoring and 12‑lead ECG — {now; repeat after calcium and with any rhythm change} citeturn2search24\n- Order: Calcium gluconate 10% IV — {1 g IV over 5–10 min; may repeat in 5–10 min if ECG changes persist} citeturn2search24\n- Order: Regular insulin IV with dextrose — {10 units IV + 25 g dextrose; check capillary glucose q30–60 min × 6 h; start D10 if glucose <7 mmol/L} citeturn2search8\n- Order: 3% sodium chloride bolus — {100–150 mL IV over 10–20 min; reassess neuro status/Na⁺; may repeat ×2} citeturn2search38turn2search49\n- Order: Desmopressin (DDAVP) IV — {2–4 μg IV now if rapid aquaresis/high ODS risk; consider scheduled q6–8 h “clamp” with Na⁺ checks q2–4 h} citeturn2search51turn2search46\n- Order: Potassium binder (sodium zirconium cyclosilicate) — {10 g PO now, then 10 g TID ×48 h alongside standard care} citeturn2search30\n\n## ABIM‑Style Question 1\n\n### Stem\nA 72‑year‑old man with CKD4 presents with weakness. Vitals are stable. ECG shows peaked T waves with QRS widening. Labs: K⁺ 6.9 mmol/L, bicarbonate 18 mmol/L, creatinine 3.1 mg/dL. \n\n### Options\nA. Furosemide 40 mg IV and repeat potassium in 6 hours  \nB. Calcium gluconate 10% 1 g IV now  \nC. Sodium polystyrene sulfonate 30 g PO now  \nD. Regular insulin 10 units IV with 25 g dextrose, no calcium  \nE. Emergent hemodialysis only\n\n### Correct answer\nB\n\n### Rationale\nIV calcium immediately stabilizes the myocardium in hyperkalemia with ECG changes; give **calcium gluconate 1 g IV** (or **calcium chloride via central line**) and reassess ECG, then proceed with insulin/dextrose and removal strategies. Deferring calcium risks malignant arrhythmia; dialysis may be needed but not as the first step when calcium can rapidly stabilize. citeturn2search24turn2search19\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 58‑year‑old woman with severe alcoholism and malnutrition is admitted with confusion and falls. Na⁺ is 112 mmol/L, serum osmolality 250 mOsm/kg, urine osmolality 600 mOsm/kg, urine Na⁺ 45 mmol/L. After 1 L isotonic saline for presumed hypovolemia, she becomes more alert and develops brisk diuresis (urine output 300 mL/h); Na⁺ rises from 112 to 118 mmol/L in 4 hours.\n\n### Options\nA. Continue isotonic saline at current rate  \nB. Start 3% saline infusion targeting +12 mmol/L in 24 hours  \nC. Administer desmopressin 2 μg IV now and give 3% NaCl bolus to cap correction  \nD. Start tolvaptan 15 mg PO  \nE. No action; observe as Na⁺ is improving\n\n### Correct answer\nC\n\n### Rationale\nHigh ODS risk (alcoholism, malnutrition) mandates **≤4–6 mmol/L** daily correction. Rapid aquaresis after volume repletion risks overcorrection; a **DDAVP clamp** plus controlled hypertonic bolus caps the rise and treats symptoms safely. Vaptans are contraindicated in severe symptomatic hyponatremia and hypovolemia. citeturn2search51turn2search46turn2search38\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Maximum safe daily Na⁺ correction in typical adults vs high‑risk patients?  \n  A: **≤8–10 mmol/L per 24 h** (typical); **≤4–6 mmol/L per 24 h** if alcoholism, malnutrition, liver disease, or hypokalemia. citeturn2search51\n- Q: First drug for hyperkalemia with ECG changes?  \n  A: IV calcium (gluconate 1 g or chloride 1 g via central line) to stabilize myocardium before shifting/removal therapies. citeturn2search24\n- Q: Insulin/dextrose regimen effect and monitoring?  \n  A: 10 units regular insulin IV + 25 g dextrose lowers K⁺ within 15–30 min; monitor glucose **q30–60 min for ~6 h** to prevent hypoglycemia. citeturn2search8\n- Q: Initial hypertonic saline approach for seizures from hyponatremia?  \n  A: **3% NaCl 100–150 mL IV over 10–20 min**, repeat up to ×3 aiming +4–6 mmol/L. citeturn2search38turn2search49\n\n## Guidelines & Key References\n- European Society of Endocrinology/ESICM/ERA‑EDTA. Clinical practice guideline on diagnosis and treatment of hyponatraemia, 2014. https://link.springer.com/content/pdf/10.1007/s00134-014-3210-2.pdf citeturn2search37\n- AJKD Perspective: Hypertonic Saline for Hyponatremia—Meeting Goals and Avoiding Harm, 2022. https://www.ajkd.org/article/S0272-6386(21)00838-6/fulltext citeturn2search51\n- KDIGO Acute Hyperkalemia in the Emergency Department (Consensus Report), 2020. https://kdigo.org/wp-content/uploads/2018/04/KDIGO-Acute-Hyperkalemia-conf-report-FINAL.pdf citeturn2search19\n- UK Kidney Association Clinical Practice Guideline—Management of Hyperkalaemia in Adults, 2023 update. https://ukkidney.org/sites/default/files/FINAL%20VERSION%20-%20UKKA%20CLINICAL%20PRACTICE%20GUIDELINE%20-%20MANAGEMENT%20OF%20HYPERKALAEMIA%20IN%20ADULTS%20-%20191223_0.pdf citeturn2search7\n- NICE TA599: Sodium zirconium cyclosilicate for treating hyperkalaemia (updated 2022). https://www.nice.org.uk/guidance/ta599/resources/sodium-zirconium-cyclosilicate-for-treating-hyperkalaemia-pdf-82607272135621 citeturn2search29\n\n## CDI: What to Document Clearly Tonight\n- Hyperkalemia, life‑threatening due to {AKI/ESRD/RAAS inhibitor}; ECG changes present; K⁺ **{value} mmol/L**; treatments given (IV calcium, insulin/dextrose, β₂‑agonist, binder/dialysis); response on repeat ECG/labs.\n- Hyponatremia, {acute vs chronic} with {severe/moderate} symptoms due to {SIADH/hypovolemia/hypervolemia}; Na⁺ **{value} mmol/L**, serum/urine osmolality and urine Na⁺; 3% NaCl boluses and DDAVP use; correction targets and monitoring plan.\n- Encephalopathy due to hyponatremia, {acute/chronic}; objective neuro findings (seizure, GCS); imaging/labs supporting diagnosis; treatment and safety measures taken.\n- Risk for osmotic demyelination: {alcoholism/malnutrition/liver disease/hypokalemia}; stated **Na⁺ correction limits** and frequency of monitoring.\n- Dialysis candidacy/consultation if refractory hyperkalemia; indication documented (persistent **K⁺ ≥6.5**, ECG changes, failure of medical therapy). citeturn2search19turn2search38\n", "endocrine-crises.md": "---\nfilename: endocrine-crises.md\nid: endocrine-crises\ntitle: Endocrine Crises\nslug: endocrine-crises\ntags: [endocrinology, inpatient, night-float]\nlevel: resident\nestimated_time_min: 25\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Endocrine Crises\n\n## Panic Card\n- ABCs, monitor, large-bore IVs, bedside glucose; treat shock with balanced crystalloids and target **MAP ≥65 mmHg** while sending core labs (BMP, VBG/ABG, serum ketones/β‑hydroxybutyrate, osmolality, TSH/FT4/FT3 if thyrotoxic, cortisol if feasible) and infection workup. citeturn2search1turn2search13\n- Suspected adrenal crisis: give **hydrocortisone 100 mg IV now**, then **200 mg/24 h** (continuous or 50 mg IV q6h); do not delay for labs. citeturn2search41turn2search42\n- DKA/HHS: start fluids first; begin insulin only when **K⁺ ≥3.3 mmol/L** and continue close K⁺ repletion; add dextrose when glucose approaches **~11.1–13.9 mmol/L (200–250 mg/dL)**. citeturn2search13\n- Thyroid storm: **β‑blocker (esmolol or propranolol)**, give **thionamide (PTU or methimazole)**, then **iodine ≥1 h later**, plus **glucocorticoid**; avoid aspirin. citeturn2search53turn2search31\n- Myxedema coma: passive rewarming, ventilatory support, **IV levothyroxine 200–400 mcg** (with or without low‑dose liothyronine) and empiric stress‑dose steroids. citeturn2search11\n- Severe hypercalcemia (≥**3.5 mmol/L** [**14 mg/dL**]): aggressive isotonic fluids, **calcitonin**, and **denosumab or IV bisphosphonate**; limit calcitonin to 48–72 h. citeturn2search47turn2search50\n\n## Brief Overview\n- Endocrine emergencies on call commonly include **DKA/HHS**, **adrenal crisis**, **thyroid storm**, **myxedema coma**, and **hypercalcemic crisis**; prioritize hemodynamics, oxygenation, fluids, and rapid, guideline‑based disease‑specific therapy. citeturn2search1turn2search13\n- **Guideline Must‑Know:** For DKA/HHS, 2024 ADA/EASD consensus emphasizes three treatment pillars—**fluids, insulin, potassium**—with quantitative **β‑hydroxybutyrate** preferred for diagnosis and resolution criteria. citeturn2search13\n- **Guideline Must‑Know:** Start insulin only after **K⁺ ≥3.3 mmol/L**; replete K⁺ if 3.3–5.2 mmol/L and hold insulin if <3.3 mmol/L; monitor K⁺ and glucose hourly in early therapy. citeturn2search13\n- **Guideline Must‑Know:** ADA “Diabetes Care in the Hospital—2025” recommends inpatient glycemic targets **7.8–10.0 mmol/L (140–180 mg/dL)** for most adults and structured order sets for dysglycemia. citeturn2search20\n- **Guideline Must‑Know:** Thyroid storm requires **β‑blocker → thionamide → iodine (≥1 h later) + glucocorticoid**; use **PTU** if severe and early due to T4→T3 inhibition; choose **esmolol** if decompensated HF. citeturn2search53\n- **Guideline Must‑Know:** Japan Thyroid Association/JES 2016 supports multimodal therapy and ICU admission criteria for storm (organ failure, severe CHF, shock); Burch‑Wartofsky is supportive but **diagnosis is clinical**. citeturn2search31turn2search30\n- **Guideline Must‑Know:** Myxedema coma management centers on airway/ventilation, cautious fluids, **IV levothyroxine 200–400 mcg** (± liothyronine), and empiric hydrocortisone until AI is excluded. citeturn2search11\n- **Guideline Must‑Know:** Adrenal crisis: **hydrocortisone 100 mg IV bolus → 200 mg/24 h infusion or 50 mg IV q6h** plus isotonic fluids; draw cortisol/ACTH if feasible but **do not delay treatment**. citeturn2search41turn2search42\n- **Guideline Must‑Know:** Hypercalcemia of malignancy: give isotonic fluids, **calcitonin** for rapid effect (tachyphylaxis ≤72 h), and **denosumab preferred** over IV bisphosphonate when feasible; treat tumor to prevent recurrence. citeturn2search50turn2search48\n- In suspected sepsis overlap (DKA/HHS with infection), apply sepsis bundles and pressor targets (**MAP ≥65 mmHg**) while avoiding rapid sodium correction beyond **8–10 mmol/L/24 h**. citeturn2search1\n- Distinguish **DKA** (acidosis/ketosis) from **HHS** (hyperosmolality, minimal ketosis); some patients have overlap; the 2024 consensus adds explicit **HHS resolution criteria**. citeturn2search13\n- SGLT2 inhibitor‑associated **euglycemic DKA** presents with normal or mildly elevated glucose; still requires insulin, dextrose‑containing fluids, and stopping the SGLT2. citeturn2search13\n- For storm with AF and decompensated HF, use **short‑acting β‑blocker (esmolol)** under monitoring; avoid high‑dose propranolol in shock; consider early ICU and cooling. citeturn2search53\n- Myxedema coma pitfalls: avoid active external rewarming (risk of vasodilation collapse), check for precipitating infection, **correct hyponatremia slowly**; ventilatory support often required. citeturn2search11\n- Hypercalcemic crisis pearls: correct volume deficit first; avoid loop diuretics until euvolemia; consider **zoledronic acid 4 mg IV** or **denosumab 120 mg SC**; expect effect in 24–72 h (use calcitonin for bridging). citeturn2search50\n- What must happen now: stabilize ABCs, fluids, focused labs, start disease‑specific therapy (hydrocortisone for suspected AI; insulin for DKA/HHS when K⁺ safe; β‑blocker/thionamide/iodine/steroid for storm; IV LT4 for coma; fluids+calcitonin+antiresorptive for hypercalcemia). citeturn2search13turn2search41turn2search53turn2search11turn2search50\n- What can wait (after stabilization): identify triggers (infection, drugs, nonadherence), transition to subcutaneous insulin, endocrine testing refinement, and oncologic therapy planning. citeturn2search20\n\n## Top ICU/Consult Triggers\n- Shock or pressor need, **pH <7.0**, **K⁺ <2.5 or >6.0 mmol/L**, **effective osmolality ≥320 mOsm/kg** with altered mental status, or refractory hypoventilation/hypercapnia. citeturn2search13\n- Thyroid storm with heart failure, arrhythmia refractory to β‑blockade, or multiorgan failure; myxedema coma with hypothermia and CO₂ retention requiring ventilatory support. citeturn2search53turn2search31turn2search11\n- Severe hypercalcemia **(≥3.5 mmol/L [14 mg/dL])** with neurologic changes or renal failure despite initial therapy. citeturn2search50\n\n## Orders to Place Now\n- Order: Balanced crystalloid bolus/infusion — {rate mL/h, reassess MAP ≥65 mmHg, urine output, lactate} citeturn2search1\n- Order: Insulin infusion (DKA/HHS) — {start when K⁺ ≥3.3 mmol/L; initial 0.1 U/kg/h; add D10/½NS when glucose ≤11.1–13.9 mmol/L (200–250 mg/dL)} citeturn2search13\n- Order: Potassium chloride replacement — {hold insulin if K⁺ <3.3; replace to 4.0–5.0 mmol/L; telemetry} citeturn2search13\n- Order: Hydrocortisone stress dosing — {100 mg IV now, then 50 mg IV q6h or 200 mg/24 h infusion} citeturn2search41\n- Order: Thyroid storm bundle — {esmolol infusion titration; methimazole {dose} or PTU {dose}; iodine {start ≥1 h after thionamide}; dexamethasone {dose}} citeturn2search53turn2search31\n- Order: Hypercalcemia therapy — {calcitonin 4 IU/kg SC/IM q12h × 48–72 h max; denosumab 120 mg SC now or zoledronic acid 4 mg IV once; aggressive isotonic fluids} citeturn2search50\n\n## ABIM‑Style Question 1\n\n### Stem\nA 45‑year‑old with type 1 diabetes presents with abdominal pain, Kussmaul respirations, and dehydration. Labs: glucose 28 mmol/L (504 mg/dL), β‑hydroxybutyrate 5.0 mmol/L, pH 7.23, HCO₃⁻ 14 mmol/L, anion gap 22, **K⁺ 2.9 mmol/L**. Vitals: HR 118, BP 104/62.\n\n### Options\nA. Start IV regular insulin at 0.1 U/kg/h immediately  \nB. Give 1 ampule IV sodium bicarbonate and start insulin  \nC. Begin isotonic fluids and **replete potassium first**, then start insulin when K⁺ ≥3.3 mmol/L  \nD. Start dextrose 10% infusion now to prevent hypoglycemia  \nE. Administer subcutaneous rapid‑acting insulin 0.2 U/kg every 2 hours\n\n### Correct answer\nC\n\n### Rationale\nInsulin therapy is **contraindicated until K⁺ ≥3.3 mmol/L** due to arrhythmia risk; initiate fluids and aggressive potassium replacement first, then insulin infusion with hourly monitoring. Bicarbonate is not indicated at pH 7.23. Subcutaneous insulin may be used for mild‑moderate DKA in selected settings, but the immediate priority here is potassium correction before any insulin. citeturn2search13\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 62‑year‑old woman on empagliflozin presents with malaise and nausea. Vitals: HR 110, BP 112/68, RR 22. Labs: glucose 10.7 mmol/L (193 mg/dL), β‑hydroxybutyrate 3.8 mmol/L, pH 7.28, HCO₃⁻ 16 mmol/L, anion gap 18, K⁺ 4.2 mmol/L. UA: ketonuria. She is euvolemic.\n\n### Options\nA. Reassure; normal glucose excludes DKA  \nB. Start insulin infusion with dextrose‑containing fluids; stop SGLT2 inhibitor  \nC. Give bicarbonate infusion until pH >7.35  \nD. Start basal insulin only and observe  \nE. Treat as HHS with aggressive fluids only\n\n### Correct answer\nB\n\n### Rationale\nThis is **euglycemic DKA** associated with SGLT2 inhibitors; treatment mirrors DKA with **insulin plus dextrose‑containing fluids** to suppress ketogenesis while avoiding hypoglycemia; discontinue the SGLT2 agent. The pitfall is dismissing DKA because glucose is not markedly elevated. citeturn2search13\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Minimum K⁺ level before starting IV insulin in DKA/HHS?  \n  A: **≥3.3 mmol/L**; correct K⁺ below this threshold before insulin due to arrhythmia risk. citeturn2search13\n- Q: Initial steroid and dose for suspected adrenal crisis?  \n  A: **Hydrocortisone 100 mg IV**, then **200 mg over 24 h** (continuous or 50 mg IV q6h). citeturn2search41\n- Q: Sequence for thyroid storm antithyroid therapy?  \n  A: **β‑blocker → thionamide → iodine (≥1 h later) + glucocorticoid**. citeturn2search53\n- Q: Severe hypercalcemia threshold and first‑line antiresorptives?  \n  A: **≥3.5 mmol/L (14 mg/dL)**; use **denosumab** or **IV bisphosphonate**, with **calcitonin** as bridge. citeturn2search50\n\n## Guidelines & Key References\n- ADA/EASD/AACE/JBDS/DTS. **Hyperglycemic Crises in Adults With Diabetes—Consensus Report (2024)**. Diabetes Care. https://diabetesjournals.org/care/article/47/8/1257/156808/ citeturn2search13\n- ADA. **Standards of Care in Diabetes—2025: Diabetes Care in the Hospital**. Diabetes Care (Suppl 1). https://diabetesjournals.org/care/article/48/Supplement_1/S321/157551/ citeturn2search20\n- American Thyroid Association. **2016 Hyperthyroidism/Thyrotoxicosis Guideline** (storm management). https://www.liebertpub.com/doi/pdf/10.1089/thy.2016.0229 citeturn2search53\n- Japan Thyroid Association/JES. **2016 Thyroid Storm Management Guideline**. https://www.eurothyroid.com/files/download/japan-guidelines-thyroid-storm-2016.pdf citeturn2search31\n- Endocrine Society. **Primary Adrenal Insufficiency Guideline (2016)**. https://www.endocrine.org/clinical-practice-guidelines/primary-adrenal-insufficiency citeturn2search41\n- Endocrine Society. **Treatment of Hypercalcemia of Malignancy in Adults (2022)**. https://academic.oup.com/jcem/article/108/3/507/6916871 citeturn2search50\n\n## CDI: What to Document Clearly Tonight\n- Diabetic ketoacidosis or hyperosmolar hyperglycemic state: acuity, severity (pH/HCO₃⁻/β‑hydroxybutyrate/osmolality), precipitant (infection, nonadherence, SGLT2 inhibitor), objective values, and insulin/fluids/electrolyte therapy.\n- Adrenal crisis due to primary/secondary adrenal insufficiency: trigger, hypotension/shock, electrolyte abnormalities (hyponatremia/hyperkalemia), cortisol/ACTH if obtained, and hydrocortisone dosing/response.\n- Thyroid storm: etiology (Graves’, toxic nodular), organ dysfunction (fever, CNS, CHF, arrhythmia), specific sequence of β‑blocker → thionamide → iodine → steroid, and ICU need.\n- Myxedema coma: precipitant, hypothermia, ventilatory failure, hyponatremia, IV levothyroxine dose (± liothyronine), empiric steroids, and ventilatory support.\n- Hypercalcemia of malignancy: severity (peak corrected/ionized Ca²⁺), etiology (PTHrP/osteolytic/calcitriol), renal/neurologic impact, fluids + calcitonin and **denosumab/IV bisphosphonate**, and oncology plan. citeturn2search50\n", "fever-and-empiric-antibiotics.md": "---\nfilename: fever-and-empiric-antibiotics.md\nid: fever-and-empiric-antibiotics\ntitle: Fever & Empiric Antibiotics\nslug: fever-and-empiric-antibiotics\ntags: [infectious-diseases, inpatient, night-float]\nlevel: resident\nestimated_time_min: 22\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Fever & Empiric Antibiotics\n\n## Panic Card\n- Assess ABCs; stabilize airway/breathing; target **SpO₂ 92–96%** (or **88–92%** if chronic hypercapnia risk) and **MAP ≥65 mmHg**; give **30 mL/kg** balanced crystalloid rapidly if septic shock.\n- Obtain **blood cultures ×2 sets** from different sites before antibiotics if this will not delay therapy; if shock, **start antibiotics within 1 hour**.\n- Start guideline-concordant broad-spectrum therapy based on syndrome and risk (e.g., **cefepime or piperacillin–tazobactam ± vancomycin**; add **meropenem** if ESBL risk).\n- Check **lactate** and repeat if initial elevated; place continuous cardiac and pulse oximetry monitoring; treat fever discomfort with **acetaminophen** unless contraindicated.\n- Confirm Before Proceed: if meningitis suspected, give **empiric antibiotics immediately after blood cultures**; do not delay for CT/LP beyond **1 hour**.\n\n## Brief Overview\n- Fever on nights demands rapid triage for sepsis vs localized infection; differentiate unstable (shock, hypoxemia, altered mental status) from stable—start resuscitation and antibiotics early in shock while obtaining cultures.\n- **Guideline Must‑Know:** Surviving Sepsis recommends **antibiotics within 1 hour** for septic shock and as soon as possible for sepsis after appropriate evaluation; each hour of delay increases mortality.\n- **Guideline Must‑Know:** Draw **two sets of blood cultures** (aerobic/anaerobic) from separate sites before first dose when feasible; do not delay therapy in shock to finish cultures.\n- Initial empiric choices hinge on source: urinary, pneumonia (CAP vs HAP/VAP), intra‑abdominal, skin/soft tissue, catheter‑related bloodstream infection, meningitis/encephalitis, or unknown source.\n- **Guideline Must‑Know:** For HAP/VAP or prior IV antibiotics/structural lung disease, start **anti‑pseudomonal β‑lactam** (e.g., cefepime, piperacillin–tazobactam, or meropenem) ± **MRSA** coverage (vancomycin) depending on local MRSA prevalence and risk factors.\n- **Guideline Must‑Know:** In CAP without severe disease or MRSA/Pseudomonas risks, **ceftriaxone + azithromycin** or **respiratory fluoroquinolone**; avoid routine anaerobic coverage for aspiration unless **abscess/empyema** suspected.\n- **Guideline Must‑Know:** Febrile neutropenia (ANC **<0.5 ×10⁹/L** or expected to drop) requires **immediate anti‑pseudomonal β‑lactam** (cefepime, piperacillin–tazobactam, or meropenem) within **1 hour**; add vancomycin only for specific indications (MRSA risk, catheter infection, pneumonia, hemodynamic instability).\n- **Guideline Must‑Know:** Suspected meningitis: give **vancomycin + ceftriaxone (or cefotaxime)**; add **ampicillin** if age ≥50/immunocompromised for Listeria; add **acyclovir** if encephalitis features; do not delay antibiotics for imaging/LP beyond **1 hour**.\n- **Guideline Must‑Know:** Catheter‑related bloodstream infection: obtain **paired blood cultures (peripheral + line)**; consider **line removal** for S. aureus, Pseudomonas, Candida, or severe sepsis; start vancomycin plus gram‑negative coverage tailored to risk.\n- For complicated intra‑abdominal infection, use **piperacillin–tazobactam** or **cefepime + metronidazole**; use **meropenem** if ESBL risk or severe sepsis; arrange source control (surgery/IR).\n- In UTI/pyelonephritis with sepsis, give **ceftriaxone** or **cefepime**; escalate to **piperacillin–tazobactam** or **meropenem** for obstruction, recent healthcare exposure, or ESBL risk; obtain renal ultrasound if obstruction suspected.\n- Document allergies carefully; in low‑risk penicillin “allergy” (non‑IgE, remote rash), β‑lactams are usually safe; consider test dose if needed—this improves outcomes and stewardship.\n- Adjust doses for renal/hepatic dysfunction; monitor vancomycin AUC/levels; avoid stacking nephrotoxins (loop diuretics, ACEi/ARBs, IV contrast) when possible.\n- De‑escalate within **48–72 h** based on cultures and clinical response; target **5–7 days** for many uncomplicated bacterial syndromes (e.g., HAP without complications), longer when deep-seated or source not controlled.\n- Pitfalls: missing hypoperfusion (normal BP but **lactate ≥4 mmol/L**), under‑dosing in obesity, unnecessary anaerobic coverage for aspiration pneumonitis, and forgetting antifungal/atypical coverage in high‑risk hosts.\n- **Guideline Must‑Know:** Hemodynamic targets: **MAP ≥65 mmHg**; if persistent hypotension after fluids, start **norepinephrine** first‑line; add **vasopressin** if needed; reassess volume responsiveness with dynamic measures.\n- Confirm Before Proceed: before removing a suspected infected central line, ensure paired cultures and assess for instability/tunnel infection; removal is irreversible and impacts diagnostic yield/source control documentation.\n\n## Top ICU/Consult Triggers\n- Persistent **MAP <65 mmHg** or rising **lactate ≥4 mmol/L** despite fluids and early antibiotics.\n- Escalating oxygen needs to **HFNC/NRB** or new **acute hypoxemic respiratory failure**.\n- New **altered mental status**, focal neurologic deficits, or concern for **meningitis/encephalitis**.\n- Rapidly progressive soft tissue infection, suspected **necrotizing fasciitis**, or **compartment syndrome**.\n\n## Orders to Place Now\n- Order: Sepsis bundle labs — {CBC, CMP, magnesium, phosphorus, lactate now and 2–4 h, PT/INR, aPTT}\n- Order: Blood cultures ×2 — {two peripheral sites before first antibiotic dose if feasible}\n- Order: Empiric antibiotics — {syndrome={HAP/VAP, CAP, UTI/pyelo, IAI, unknown}, agents={cefepime or piperacillin–tazobactam ± vancomycin; meropenem if ESBL risk}, time=now, renal_dose=adjust}\n- Order: Imaging — {CXR portable now; add CT {abdomen/pelvis} with contrast if IAI suspected; CT head before LP only if focal deficits, immunocompromise, or papilledema}\n- Order: Fluid resuscitation — {balanced crystalloid 30 mL/kg bolus; reassess hemodynamics; start norepinephrine if MAP <65 mmHg after fluids}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 72‑year‑old man with diabetes presents from the ward with fever 39.2°C, HR 118, BP 88/54 mmHg, RR 26, SpO₂ 93% on 2 L. He is confused. Exam shows suprapubic tenderness and a chronic Foley. Labs: WBC 17 ×10⁹/L, creatinine 2.1 mg/dL (baseline 1.0), lactate 4.2 mmol/L. Chest x‑ray is clear. Two nurses are at bedside to draw cultures.\n\n### Options\nA. Await blood culture completion before giving antibiotics  \nB. Give 30 mL/kg crystalloid, start norepinephrine if needed, and administer cefepime plus vancomycin now  \nC. Start acetaminophen and repeat vitals in 2 hours  \nD. Order CT abdomen/pelvis first to evaluate for obstruction  \nE. Start ceftriaxone and delay pressors until after 3 L fluids regardless of MAP\n\n### Correct answer\nB\n\n### Rationale\nEarly broad‑spectrum antibiotics within **1 hour** of septic shock and **30 mL/kg** fluids with pressors to **MAP ≥65 mmHg** improve survival per Surviving Sepsis. Obtain cultures first if it does not delay therapy, but do not wait in shock. Cefepime plus vancomycin covers gram‑negatives including Pseudomonas and MRSA risk from chronic devices; imaging can follow stabilization.\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 63‑year‑old woman with prior stroke aspirates during dinner and develops fever 38.6°C and cough 6 hours later. She is stable: BP 132/78, HR 96, SpO₂ 95% on room air. CXR shows right lower lobe infiltrate without cavitation or effusion. No severe periodontal disease. No prior MRSA/Pseudomonas risks.\n\n### Options\nA. Start ampicillin–sulbactam for “aspiration” to cover anaerobes routinely  \nB. Start ceftriaxone plus azithromycin and withhold anaerobic coverage  \nC. Start piperacillin–tazobactam plus vancomycin for broad coverage  \nD. Start levofloxacin plus metronidazole for anaerobes  \nE. Withhold all antibiotics because aspiration pneumonitis never needs antibiotics\n\n### Correct answer\nB\n\n### Rationale\nGuidelines advise **no routine anaerobic coverage** for suspected aspiration pneumonia unless **abscess/empyema** or poor dentition/necrosis; standard CAP therapy is appropriate. The pitfall is reflexively adding anaerobic therapy without indications, increasing adverse effects and resistance.\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What is the antibiotic timing goal in septic shock?  \n  A: Administer broad‑spectrum antibiotics within **1 hour** of recognition after obtaining cultures if this does not delay therapy.\n- Q: Define febrile neutropenia by ANC.  \n  A: **ANC <0.5 ×10⁹/L** or expected to fall below that within 48 hours warrants immediate anti‑pseudomonal β‑lactam.\n- Q: When do you add anaerobic coverage in aspiration?  \n  A: Only if **lung abscess, empyema, or severe periodontal disease/necrotizing infection** is suspected.\n- Q: What MAP target guides vasopressor titration?  \n  A: **MAP ≥65 mmHg** with norepinephrine first‑line; add vasopressin if needed.\n\n## Guidelines & Key References\n- Surviving Sepsis Campaign Guidelines 2021 — https://www.sccm.org/clinical-resources/guidelines/guidelines/surviving-sepsis-guidelines-2021\n- ATS/IDSA Community‑Acquired Pneumonia Guideline 2019 — https://www.atsjournals.org/doi/10.1164/rccm.201908-1581ST\n- IDSA Febrile Neutropenia in Adults Guideline 2010 (with updates/ASCO‑IDSA 2018) — https://academic.oup.com/cid/article/52/4/e56/382256\n- IDSA/ATS HAP/VAP Guideline 2016 — https://www.idsociety.org/practice-guideline/hospital-acquired-and-ventilator-associated-pneumonia/\n\n## CDI: What to Document Clearly Tonight\n- Sepsis due to suspected catheter‑associated UTI, with acute kidney injury: include acuity, source, organism if known, **objective evidence** (T 39.2°C, **lactate 4.2 mmol/L**, hypotension, WBC 17), and treatments (30 mL/kg fluids, norepinephrine, cefepime + vancomycin).\n- Hospital‑acquired pneumonia vs aspiration pneumonia: specify type, risk factors (recent hospitalization/ventilation), radiographic findings, oxygen requirement, and chosen empiric regimen with rationale (no anaerobes unless abscess/empyema).\n- Febrile neutropenia due to chemotherapy: include **ANC value**, hemodynamic status, suspected source, and immediate anti‑pseudomonal therapy timing; note MRSA indications if adding vancomycin.\n- Catheter‑related bloodstream infection suspected: document paired cultures, line status (kept vs removed with indication), organism if available, and hemodynamic impact; capture source control steps and ID consult if obtained.\n", "community-acquired-pneumonia.md": "---\nfilename: community-acquired-pneumonia.md\nid: community-acquired-pneumonia\ntitle: Community-Acquired Pneumonia\nslug: community-acquired-pneumonia\ntags: [pulmonology, infectious-diseases, inpatient, night-float]\nlevel: resident\nestimated_time_min: 22\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Community-Acquired Pneumonia\n\n## Panic Card\n- Assess ABCs; start supplemental O₂ and titrate for work of breathing; if shock suspected, initiate sepsis bundle: obtain lactate, draw blood cultures, give **30 mL/kg crystalloid within 3 h**, and start norepinephrine to **MAP ≥65 mmHg** if hypotension persists. citeturn2search12\n- Start empiric antibiotics within **≤1 h** if sepsis or septic shock is suspected; avoid delays for imaging or labs once cultures obtained. citeturn2search12\n- For non‑severe inpatient CAP without MRSA/Pseudomonas risks: give **beta‑lactam + macrolide** (e.g., ceftriaxone + azithromycin) or **respiratory fluoroquinolone** monotherapy; use **beta‑lactam + doxycycline** if macrolide/FQ contraindicated. citeturn2search2turn2search4\n- For severe CAP or clear MRSA/Pseudomonas risk factors: add **anti‑MRSA** (e.g., vancomycin) and an **anti‑pseudomonal beta‑lactam** pending cultures, then de‑escalate. citeturn2search7\n- Consider early HFNC/NIV for hypoxemic respiratory failure; intubate if worsening mental status, exhaustion, or refractory hypoxemia. citeturn2search12\n- Confirm Before Proceed: Before fluoroquinolones or macrolides, review **QT prolongation** and drug interactions; avoid routine anaerobic coverage unless lung abscess/empyema suspected. citeturn2search18\n\n## Brief Overview\n- **Guideline Must‑Know:** The 2019 ATS/IDSA guideline is the core adult CAP reference; it updates diagnostics, empiric therapy, and severity assessment (replacing HCAP and emphasizing individual MRSA/Pseudomonas risk factors). citeturn2search2\n- **Guideline Must‑Know:** Determine site of care with clinical judgement plus a tool (PSI preferred) and identify **severe CAP** by 1 major (invasive ventilation or vasopressors) or **≥3 minor criteria** (e.g., **PaO₂/FiO₂ ≤250**, **RR ≥30**, **BUN ≥7.14 mmol/L**, **PLT <100 ×10⁹/L**, multilobar infiltrates, hypotension needing fluids, leukopenia, confusion, or hypothermia). These predict ICU need and mortality. citeturn2search10\n- **Guideline Must‑Know:** Diagnostic testing differs by severity. For non‑severe inpatient CAP, routine blood/sputum cultures and urinary antigens generally **not** recommended; for severe CAP, obtain **blood cultures, sputum Gram/culture, and S. pneumoniae/Legionella urinary antigens** before antibiotics when feasible. citeturn2search2turn2search7\n- **Guideline Must‑Know:** Start empiric antibiotics promptly. Non‑severe inpatient: **beta‑lactam + macrolide** or **respiratory FQ**; if macrolide/FQ not suitable, **beta‑lactam + doxycycline** is acceptable. Severe CAP (no MRSA/Pseudomonas risks): **beta‑lactam + macrolide** or **beta‑lactam + respiratory FQ**. citeturn2search2turn2search4\n- **Guideline Must‑Know:** Avoid routine anaerobic coverage in suspected aspiration **without** abscess/empyema; extended anaerobic coverage shows **no mortality benefit** and **higher C. difficile** risk. citeturn2search18\n- **Guideline Must‑Know:** Treat minimum **5 days** and reassess; ensure clinical stability (afebrile, HR/RR normalizing, hemodynamics stable, able to take PO) before stopping or switching to oral therapy. citeturn2search10\n- Distinguish immediate vs delayed tasks: “Now” = stabilize ABCs, cultures (if severe), empiric antibiotics, fluids/pressors for sepsis, early oxygen/ventilatory support; “Can wait hours” = vaccine assessment, atypical/viral add‑ons, swallow assessment if aspiration risk after stabilization. citeturn2search12turn2search2\n- Use MRSA nares PCR to **de‑escalate** vancomycin if negative and no other MRSA risks, per stewardship pathways aligned with 2019 guidance. citeturn2search7turn2search3\n- Viral testing: when influenza/respiratory viruses circulate, test and **treat influenza** positives with antivirals; continue empiric antibacterials initially for inpatients given bacterial‑viral coinfection risk. citeturn2search4\n- Legionella considerations: order UAT in severe CAP, outbreak/travel, or when epidemiology suggests; pair with lower respiratory **PCR or culture** when feasible to broaden detection. citeturn2search7turn2search20\n- Procalcitonin: **do not** withhold initial antibiotics in clinically/radiographically confirmed CAP based on a low PCT; consider PCT trends only for stewardship after stabilization. citeturn2search26\n- When to add MRSA/Pseudomonas coverage: prior respiratory isolation, or **recent hospitalization with IV antibiotics** (local risks matter). Reassess daily and narrow promptly if tests negative and patient stabilizing. citeturn2search2turn2search7\n- Duration nuances: bacteremic pneumococcal CAP often needs **≥7 days**; Legionella typically **7–10 days** depending on agent/response—ensure clinical stability and source control. citeturn2search2\n- Early mobilization, incentive spirometry, and DVT prophylaxis reduce complications; assess aspiration risk and perform swallow evaluation once stable. citeturn2search2\n- Pitfalls: relying on “HCAP” label (retired), overusing broad antipseudomonal/anti‑MRSA agents without patient‑specific risks, and adding metronidazole/clindamycin for uncomplicated aspiration. citeturn2search2turn2search18\n- ICU/consult: escalate early for rising O₂ needs (HFNC/NIV to invasive), shock, or ≥3 minor severe CAP criteria; involve ID/pulmonary for complex resistance, rapid de‑escalation, and ventilatory strategy. citeturn2search10turn2search12\n- Discharge readiness: afebrile, hemodynamically stable, **SpO₂ stable on room air or baseline**, tolerating PO, and safe outpatient follow‑up; convert to oral agents with high bioavailability (e.g., levofloxacin, doxycycline, azithromycin, amoxicillin‑clavulanate) per susceptibilities. citeturn2search2\n\n## Top ICU/Consult Triggers\n- Need for invasive mechanical ventilation or vasopressors (major criteria for severe CAP). citeturn2search10\n- **≥3 minor severe CAP criteria** (e.g., **PaO₂/FiO₂ ≤250**, multilobar infiltrates, **RR ≥30**, **BUN ≥7.14 mmol/L**, **PLT <100 ×10⁹/L**, confusion, hypotension requiring fluids, leukopenia, or hypothermia). citeturn2search10\n- Rising oxygen/ventilatory support needs (escalating HFNC/NIV) or refractory hypoxemia despite optimization. citeturn2search12\n- Septic shock physiology (elevated lactate, hypotension despite fluids) or rapidly worsening organ dysfunction. citeturn2search12\n\n## Orders to Place Now\n- Order: Empiric antibiotics — {choose: ceftriaxone 2 g IV q24h + azithromycin 500 mg IV/PO daily; or levofloxacin 750 mg IV/PO daily; if macrolide/FQ contraindicated, ampicillin‑sulbactam 3 g IV q6h + doxycycline 100 mg IV/PO q12h}\n- Order: Sepsis bundle — {lactate now and 2–4 h recheck if initial ≥2 mmol/L; blood cultures ×2 before antibiotics if severe; 30 mL/kg IV crystalloid; start norepinephrine if MAP <65 mmHg after fluids}\n- Order: Microbiology — {sputum Gram stain/culture; pneumococcal and Legionella urinary antigens if severe; MRSA nares PCR to guide de‑escalation}\n- Order: Respiratory support — {oxygen {device}; target SpO₂ individualized; consider HFNC/NIV if persistent hypoxemia or increased WOB}\n- Order: Diagnostics — {CXR or chest CT if unclear; respiratory viral PCR panel during respiratory virus season}\n- Order: Daily stewardship reassessment — {narrow/stop MRSA/Pseudomonas coverage if risk tests negative and patient improving; transition to PO when stable}\n\n## ABIM‑Style Question 1\n\n### Stem\nA 67‑year‑old man with COPD (on LABA/LAMA), HTN, and diabetes presents with fever, productive cough, pleuritic chest pain, and consolidation on CXR. He is hypoxic to 90% on 2 L but hemodynamically stable. ECG shows **QTc 510 ms**. No prior MRSA/Pseudomonas isolation; no hospitalization with IV antibiotics in the last year. You admit him to the ward.\n\n### Options\nA. Azithromycin monotherapy  \nB. Levofloxacin monotherapy  \nC. Ceftriaxone plus azithromycin  \nD. Ceftriaxone plus doxycycline  \nE. Piperacillin‑tazobactam plus vancomycin\n\n### Correct answer\nD\n\n### Rationale\nFor non‑severe inpatient CAP without MRSA/Pseudomonas risks, **beta‑lactam + macrolide** or **respiratory FQ** are first‑line; when macrolide/FQ are **contraindicated** (here, marked QT prolongation), **beta‑lactam + doxycycline** is guideline‑supported. Avoid azithromycin monotherapy and broad anti‑Pseudomonas/MRSA agents without risk factors. Treat for **≥5 days** with clinical stability before stop/step‑down. citeturn2search2turn2search10\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nAn 82‑year‑old woman aspirates during a syncopal episode at dinner. She has fever, cough, right lower‑lobe infiltrate, and needs 3 L O₂ by nasal cannula. No abscess or empyema on CT. No MRSA/Pseudomonas risks. She is stable on the ward.\n\n### Options\nA. Ceftriaxone plus azithromycin  \nB. Ampicillin‑sulbactam plus doxycycline  \nC. Ceftriaxone plus metronidazole  \nD. Piperacillin‑tazobactam plus vancomycin  \nE. Clindamycin monotherapy\n\n### Correct answer\nA\n\n### Rationale\nIn uncomplicated aspiration‑associated CAP **without** lung abscess/empyema, routine **anaerobic coverage is not recommended**; standard CAP regimens (e.g., ceftriaxone + azithromycin) are appropriate. Extended anaerobic coverage (metronidazole/clindamycin or broad anti‑anaerobes) **does not improve mortality and increases C. difficile risk**—the pitfall is overtreating presumed “aspiration pneumonia.” citeturn2search18\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: What are the two **major** severe CAP criteria?  \n  A: Need for invasive mechanical ventilation or need for vasopressors for septic shock. citeturn2search10\n- Q: Minimum antibiotic duration for uncomplicated inpatient CAP?  \n  A: **5 days** with clinical stability before discontinuation or switch to oral therapy. citeturn2search10\n- Q: Should a low procalcitonin delay initial antibiotics in radiographically confirmed CAP?  \n  A: No; initiate empiric therapy regardless of initial PCT. citeturn2search26\n- Q: When are pneumococcal and Legionella urinary antigens most indicated?  \n  A: In **severe CAP** or epidemiologic triggers (e.g., outbreak/travel), ideally paired with lower respiratory testing for Legionella. citeturn2search7turn2search20\n\n## Guidelines & Key References\n- ATS/IDSA Clinical Practice Guideline: Diagnosis and Treatment of Adults with Community‑Acquired Pneumonia (2019) — American Thoracic Society/IDSA; full text/PDF. citeturn2search1 citeturn2search1\n- IDSA CAP Clinical Pathway (2019 guideline‑aligned; updated resources) — criteria, diagnostics, and empiric regimens tables (2023). citeturn2search7 citeturn2search7\n- Surviving Sepsis Campaign: International Guidelines for Management of Sepsis and Septic Shock (2021) — initial fluids, **MAP ≥65 mmHg**, early antibiotics. citeturn2search12 citeturn2search12\n- CHEST (2024): Anaerobic Coverage in Aspiration Pneumonia—no mortality benefit; ↑ C. difficile with extended anaerobic therapy. citeturn2search18 citeturn2search18\n- JAMA/AAFP guideline synopsis of ATS/IDSA CAP (2020) — severe CAP criteria and 5‑day duration with reassessment. citeturn2search4 citeturn2search4\n\n## CDI: What to Document Clearly Tonight\n- CAP, acuity and severity: “Community‑acquired pneumonia, {non‑severe|severe by {major/minor} criteria}” + objective findings (fever, WBC, **PaO₂/FiO₂**, imaging).  \n- Etiology/cause if known or suspected: “Likely {pneumococcal|atypical|viral coinfection}; tests sent: {UATs, cultures, PCR}.”  \n- Sepsis/shock status when present: criteria met (SOFA change, lactate, hypotension), **MAP goals**, pressors/fluids given.  \n- Respiratory failure when present: type (hypoxemic/hypercapnic), oxygen/vent support level, ABG/SpO₂ targets.  \n- Treatment and response: empiric regimen (agents/doses), time to first dose, de‑escalation plan, duration target (≥5 days with stability).\n", "gi-bleeding.md": "---\nfilename: gi-bleeding.md\nid: gi-bleeding\ntitle: GI Bleeding\nslug: gi-bleeding\ntags: [gastroenterology, inpatient, night-float, hemorrhage, critical-care]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# GI Bleeding\n\n## Panic Card\n- Secure ABCs; two large-bore IVs; start balanced crystalloids; target **MAP ≥65 mmHg**; if septic physiology suspected, begin sepsis bundle and **antibiotics within 1 h**. citeturn2search41turn2search46\n- Transfuse packed RBCs for **Hb <7 g/dL** (consider **8 g/dL** if CAD/orthopedic/cardiac surgery); activate MTP if ongoing shock. citeturn2search35turn2search40\n- Suspected variceal UGIB: start **octreotide 50 mcg IV bolus, then 50 mcg/h** and **ceftriaxone 1 g IV daily (7 d)**; arrange endoscopy **≤12 h**. citeturn2search15\n- Nonvariceal UGIB: give **erythromycin 250 mg IV 20–90 min pre‑EGD**; plan EGD **≤24 h**; initiate post‑hemostasis **high‑dose PPI**. citeturn2search24turn2search29\n- Brisk hematochezia with instability: obtain **CTA A/P now** to localize and enable IR embolization; urgent colonoscopy rarely improves outcomes in severe LGIB. citeturn2search59turn2search34\n- Confirm Before Proceed: use **andexanet alfa/idarucizumab** only for life‑threatening DOAC‑associated bleeding given thrombotic risk; consider **4F‑PCC** if specific antidote unavailable. citeturn2search63turn2search61\n\n## Brief Overview\n- GI bleeding on nights splits into UGIB (proximal to ligament of Treitz) and LGIB (colonic) with different first moves: stabilize, risk‑stratify, choose endoscopy vs CTA appropriately; early resuscitation and restrictive transfusion strategy (**Hb <7 g/dL**) reduce harm. **Guideline Must‑Know:** AABB 2023 endorses restrictive thresholds, with **8 g/dL** reasonable for selected cardiac contexts. citeturn2search35\n- **Guideline Must‑Know:** For hospitalized UGIB, perform EGD **within 24 h** after stabilization; pre‑endoscopic **erythromycin 250 mg IV** improves visualization and reduces repeat EGD; high‑dose PPI is recommended after endoscopic hemostasis of ulcer bleeding. citeturn2search24turn2search29\n- **Guideline Must‑Know:** For variceal hemorrhage, start vasoactive therapy (octreotide or terlipressin) plus **ceftriaxone** at presentation; perform band ligation early (typically **≤12 h**); consider **preemptive TIPS** in high‑risk patients (e.g., Child‑Pugh **C 10–13** or **B with active bleeding**). citeturn2search15turn2search10\n- **Guideline Must‑Know:** For LGIB with hemodynamic significance, **CTA** is preferred for localization and guides transcatheter embolization; routine urgent colonoscopy within 24 h has not shown outcome benefit; most inpatient colonoscopies can be **non‑urgent** (≤14 d if stable). citeturn2search59turn2search34\n- **Guideline Must‑Know:** Risk scores: use **Glasgow‑Blatchford (GBS)** at first assessment to identify very‑low‑risk UGIB (GBS **0–1**) for potential discharge; GBS outperforms pre‑endoscopic Rockall for predicting interventions. citeturn2search24turn2search58\n- **Guideline Must‑Know:** Transfusion/product targets: maintain **platelets >50 ×10⁹/L** for active bleeding needing hemostasis; reverse **warfarin** with PCC for life‑threatening bleeding; for DOACs, use **andexanet** (apixaban/rivaroxaban) or **idarucizumab** (dabigatran) when bleeding is life‑threatening; otherwise hold drug/supportive care. citeturn2search59turn2search63\n- In UGIB, give **PPI after** endoscopic hemostasis (continuous or intermittent high‑dose for 72 h, then BID for 2 weeks); pre‑EGD PPI has uncertain benefit and is not strongly recommended for outcomes. citeturn2search24\n- **Guideline Must‑Know:** Endoscopic hemostasis options for ulcers include thermal (heater probe/bipolar), mechanical (clips), injection (epinephrine as adjunct only), with **hemostatic powder** for active bleeding and **over‑the‑scope clips** for recurrent bleeding; consider IR embolization if endoscopy fails. citeturn2search24\n- Distinguish variceal stigmata (cirrhosis, portal hypertension signs) from nonvariceal causes; if uncertain and unstable, treat as variceal (octreotide + antibiotics) while arranging urgent EGD. **Confirm Before Proceed:** avoid delaying vasoactive therapy for diagnostic certainty. citeturn2search15\n- **Guideline Must‑Know:** Sepsis bundle if infection suspected: **30 mL/kg** crystalloid for hypoperfusion, dynamic fluid assessment, and **MAP 65 mmHg** with norepinephrine first‑line. GI bleeding with fever/ascites or aspiration risk warrants vigilance for sepsis. citeturn2search41turn2search46\n- In LGIB, after CTA‑positive localization, **IR embolization within ~90 min** can control bleeding with high technical success; monitor for bowel ischemia; coordinate with GI for subsequent diagnostic colonoscopy when stable. citeturn2search34\n- **Guideline Must‑Know:** Antithrombotic resumption: resume **aspirin for secondary prevention** once hemostasis achieved; individualized timing for anticoagulation (often ~7 days) balancing rebleed vs thrombosis; document plan with GI/Cardiology/Heme. citeturn2search59\n- ICU triggers include refractory hypotension, transfusion needs **>4 units/24 h**, persistent hematemesis/melena with rising lactate, or escalating oxygen/airway support; consider early anesthesia involvement for high‑risk EGD. citeturn2search41\n- **Guideline Must‑Know:** For brisk hematochezia with shock, remember an **upper source is possible**; consider EGD when suspicion moderate/high even if CTA pending or negative. citeturn2search26\n- Pitfalls: over‑transfusion raising portal pressures; failing to give **ceftriaxone** in variceal bleed; delaying vasoactive therapy; attempting urgent colonoscopy in unstable LGIB instead of **CTA→IR**; not using erythromycin pre‑EGD in UGIB. citeturn2search15turn2search59turn2search24\n- **Guideline Must‑Know:** Post‑EGD ulcer bleed: high‑dose PPI **continuous (8 mg/h) or intermittent** for 72 h is acceptable; repeat endoscopy for rebleeding; IR embolization if endoscopic therapy fails. citeturn2search24\n- **Guideline Must‑Know:** Early antibiotic prophylaxis in variceal bleeding reduces infections and mortality; **ceftriaxone 1 g daily** preferred in areas with high quinolone resistance. citeturn2search15\n- **Guideline Must‑Know:** Preemptive **TIPS** improves outcomes in selected high‑risk variceal bleeders; coordinate urgently with Hepatology/IR; document Child‑Pugh/MELD and failure criteria. citeturn2search15turn2search10\n\n## Top ICU/Consult Triggers\n- Persistent hypotension requiring vasopressors or **lactate >4 mmol/L** despite resuscitation. citeturn2search41\n- Transfusion requirement **>4 pRBC units in 24 h** or anticipated massive transfusion. citeturn2search34\n- Ongoing hematemesis/hematochezia with Hb drop **>2 g/dL** and tachycardia despite fluids. citeturn2search24\n- Suspected variceal bleeding in **Child‑Pugh C** or **B with active bleeding** (consider early TIPS). citeturn2search15\n- Increasing oxygen needs or airway compromise from aspiration/encephalopathy. citeturn2search41\n\n## Orders to Place Now\n- Order: Type and crossmatch — {units_pRBC: 2, hold_samples: true} citeturn2search35\n- Order: Pantoprazole infusion — {80 mg IV bolus, then 8 mg/h x 72 h; switch to PO BID x 14 d post‑EGD if ulcer hemostasis} citeturn2search24\n- Order: Erythromycin pre‑EGD — {250 mg IV over 20–30 min, give 20–90 min before endoscopy} citeturn2search24turn2search29\n- Order: Octreotide infusion (if variceal suspected) — {50 mcg IV bolus, then 50 mcg/h infusion} citeturn2search15\n- Order: Ceftriaxone prophylaxis (variceal bleed) — {1 g IV q24h x 7 days} citeturn2search15\n- Order: CT Angiography Abdomen/Pelvis (LGIB with instability) — {indication: ongoing hematochezia with shock; proceed to IR if positive} citeturn2search59turn2search34\n\n## ABIM‑Style Question 1\n\n### Stem\nA 58‑year‑old man with melena and orthostasis is admitted. Vitals improve after fluids. Hb is 7.2 g/dL. He is not on anticoagulants. You plan endoscopy.  \n\n### Options\nA. Start continuous PPI now and schedule elective EGD in 48–72 hours  \nB. Administer erythromycin 250 mg IV 30 minutes before EGD and perform EGD within 24 hours  \nC. Give octreotide infusion and ceftriaxone empirically for all UGIB  \nD. Transfuse to a goal hemoglobin of 10 g/dL before EGD  \nE. Obtain CTA abdomen/pelvis now instead of EGD  \n\n### Correct answer\nB\n\n### Rationale\nACG UGIB guidance suggests **EGD within 24 h** after stabilization and recommends **erythromycin 250 mg IV 20–90 min prior** to improve visualization and reduce repeat procedures; high‑dose PPI is recommended **after** endoscopic therapy for ulcer bleeding. Restrictive transfusion (**Hb <7 g/dL**) is preferred; routine octreotide/antibiotics is reserved for suspected variceal bleeding. citeturn2search24turn2search29turn2search35\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 72‑year‑old woman on apixaban for AF presents with brisk hematochezia, SBP 82 mmHg, HR 122, Hb 8.1 g/dL. After fluids and 1 unit pRBC, she remains unstable.\n\n### Options\nA. Urgent colonoscopy within 6 hours after a rapid prep  \nB. Start octreotide infusion empirically and schedule EGD tomorrow  \nC. CT angiography of abdomen/pelvis now to localize bleeding with plan for IR embolization if positive  \nD. Tagged RBC scan to localize bleeding before any other imaging  \nE. Start high‑dose IV PPI and observe 24 hours  \n\n### Correct answer\nC\n\n### Rationale\nFor hemodynamically significant LGIB, **CTA is recommended** to localize bleeding and expedite **IR embolization**; urgent colonoscopy has not improved key outcomes in severe LGIB. The pitfall is defaulting to colonoscopy first in unstable LGIB. If bleeding is life‑threatening and driven by a recent factor Xa inhibitor, consider **andexanet** per institutional criteria. citeturn2search59turn2search34\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Transfuse RBCs at what hemoglobin for most stable adults?  \n  A: **<7 g/dL** (consider **8 g/dL** with cardiovascular disease/orthopedic/cardiac surgery). citeturn2search35\n- Q: EGD timing for hospitalized UGIB after stabilization?  \n  A: Perform within **24 hours**; sooner if ongoing instability after resuscitation. citeturn2search24\n- Q: First‑line imaging for unstable LGIB with active hematochezia?  \n  A: **CT angiography** to localize and facilitate IR embolization. citeturn2search59turn2search34\n- Q: Initial variceal bundle at presentation?  \n  A: **Vasoactive agent** (e.g., octreotide), **ceftriaxone**, and early EGD with band ligation. citeturn2search15\n- Q: Erythromycin pre‑EGD dose?  \n  A: **250 mg IV** 20–90 minutes before endoscopy. citeturn2search24\n\n## Guidelines & Key References\n- ACG Clinical Guideline: Upper Gastrointestinal and Ulcer Bleeding (2021). citeturn2search24\n- ACG Updated Guideline: Acute Lower Gastrointestinal Bleeding (2023). citeturn2search59\n- AASLD Practice Guidance: Portal Hypertension & Variceal Bleeding (2023) and Baveno VII Consensus (2022). citeturn2search15turn2search10\n- AABB International Guidelines for Red Blood Cell Transfusion (2023). citeturn2search35\n- Surviving Sepsis Campaign: Management of Sepsis and Septic Shock (2021). citeturn2search41\n\n## CDI: What to Document Clearly Tonight\n- Acute upper GI bleeding — etiology: {peptic ulcer vs variceal vs other}; severity: {hemorrhagic shock vs acute blood loss anemia}; objective evidence: {Hb trend, lactate, hemodynamics, EGD findings}; treatment: {endoscopic hemostasis type, vasoactive infusion, PPI/antibiotics, transfusion units}.  \n- Acute lower GI bleeding — suspected source: {diverticular vs angiodysplasia vs post‑polypectomy}; severity: {ongoing transfusion needs, CTA localization}; objective evidence: {CTA result, IR embolization performed}; treatment: {IR embolization details, bowel prep/colonoscopy timing}.  \n- Coagulopathy/anticoagulant‑related hemorrhage — drug and last dose; reversal used ({PCC/andexanet/idarucizumab}); risk–benefit justification; thrombotic risk plan and restart timing.  \n- Shock (type and criteria) — specify **hypovolemic** vs mixed **septic**; document **MAP**, vasopressor use, fluids, urine output, lactate response.  \n- Aspiration risk/encephalopathy — airway protection decisions, oxygen/vent settings, antibiotics if indicated.\n", "anaphylaxis.md": "---\nfilename: anaphylaxis.md\nid: anaphylaxis\ntitle: Anaphylaxis\nslug: anaphylaxis\ntags: [allergy-immunology, inpatient, night-float, emergency, resuscitation]\nlevel: resident\nestimated_time_min: 18\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Anaphylaxis\n\n## Panic Card\n- Give epinephrine IM to mid‑anterolateral thigh now: **0.3–0.5 mg (1 mg/mL)**; repeat every **5–15 min** as needed. Keep patient **supine with legs elevated**; apply **high‑flow O₂**. Call for help and bring airway cart. citeturn2search13turn2search24\n- Establish 2 large‑bore IVs; rapid isotonic crystalloids **1–2 L**; target **MAP ≥65 mmHg**. citeturn2search7\n- If airway compromise (stridor/voice change/lingual or laryngeal edema), call anesthesia/ENT early and prepare for **difficult airway**; avoid sitting upright if hypotensive. citeturn2search24\n- Refractory hypotension despite IM epinephrine and fluids: start **epinephrine infusion** (titrate to **MAP ≥65 mmHg**) and consider **glucagon 1–5 mg IV over 5 min, then 5–15 µg/min** if on β‑blocker. citeturn2search24turn2search32\n- Confirm Before Proceed: use **pump‑driven epinephrine infusion with correct concentration**; avoid IV epinephrine bolus outside cardiac arrest/experienced hands to prevent dosing error. citeturn2search24\n\n## Brief Overview\n- Anaphylaxis is a rapidly evolving, multi‑system emergency; **IM epinephrine is first‑line and time‑critical**, and treatment should not wait for diagnostic certainty. Night‑float priorities are airway, breathing, circulation, and immediate IM dosing with repeat assessment every 5–15 minutes. citeturn2search13\n- **Guideline Must‑Know:** Adult IM dose **0.3–0.5 mg (1 mg/mL)** to the lateral thigh, repeat every **5–15 min** until improved; do not substitute antihistamines or steroids for epinephrine. citeturn2search13turn2search18\n- **Guideline Must‑Know:** Positioning matters—keep the patient **supine with legs elevated** (or left lateral in late pregnancy) to reduce sudden circulatory collapse; provide high‑flow oxygen and continuous monitoring. citeturn2search24\n- **What must happen now:** Remove/stop the trigger (e.g., antibiotic/IV contrast), give IM epinephrine, start O₂, secure IV access, give **1–2 L** isotonic fluids rapidly if hypotensive, and call for senior help/anesthesia early for voice change/stridor. **What can wait:** adjunct H1/H2 blockers, corticosteroids, root‑cause workup. citeturn2search7turn2search24\n- **Guideline Must‑Know:** For **refractory shock**, start **epinephrine infusion** (use pump; avoid IV bolus) and titrate to **MAP ≥65 mmHg**; large fluid volumes may be required due to profound vasodilation and capillary leak. citeturn2search24turn2search7\n- **Guideline Must‑Know:** If on **β‑blockers** and not responding, give **glucagon 1–5 mg IV over 5 min**, then **5–15 µg/min** infusion (watch for nausea/vomiting). citeturn2search32\n- Bronchospasm: add **nebulized β‑agonist (albuterol)**; consider nebulized epinephrine for laryngeal edema while preparing a definitive airway—these are **adjuncts**, not substitutes for IM epinephrine. citeturn2search24\n- **Confirm Before Proceed:** Double‑check **epinephrine concentration and route** (1 mg/mL IM vs 0.1 mg/mL IV infusion) to prevent **10–100×** dosing errors. citeturn2search24\n- **Guideline Must‑Know:** Draw **serum tryptase** as soon as feasible **within 1–3 h of symptom onset**, and a **baseline at 24–48 h**; apply the **20% + 2 ng/L rule** to support mast‑cell activation and consider mast‑cell disorders when baseline is elevated. citeturn2search2turn2search4\n- **Guideline Must‑Know:** Observation: low‑risk patients who respond promptly may be observed **≥2–6 h**; higher‑risk (severe presentation, multiple epinephrine doses, hypotension, airway involvement) often require **≥6–12 h** or admission due to **biphasic risk**. citeturn2search24\n- Common inpatient triggers: antibiotics, perioperative agents (neuromuscular blockers, chlorhexidine, latex), radiocontrast, blood products, biologics; document precisely and refer for allergy evaluation after stabilization. citeturn2search7\n- **Guideline Must‑Know:** Do **not** delay epinephrine while applying formal diagnostic criteria; meeting criteria is **not required** before giving epinephrine. citeturn2search16\n- Antihistamines (H1±H2) can reduce cutaneous symptoms; **corticosteroids do not treat acute life‑threatening features** and should never replace epinephrine; they may be used as adjuncts per clinician judgment. citeturn2search18\n- **Guideline Must‑Know:** Early **anesthesia/ICU** involvement for progressive airway edema, stridor, fatigue, or refractory hypotension; prepare for a **difficult airway** and **early intubation** if voice changes/stridor evolve. citeturn2search24\n- **Pitfalls:** Attributing hypotension/wheeze to other causes (e.g., sepsis, COPD) and **withholding epinephrine**; giving IV bolus epinephrine; sitting the hypotensive patient upright; missing biphasic deterioration after early discharge. citeturn2search24\n- **Guideline Must‑Know:** After stabilization, ensure **discharge planning** (if appropriate) includes education, trigger avoidance plan, and epinephrine auto‑injector prescribing/training with documented allergy follow‑up. citeturn2search18\n\n## Top ICU/Consult Triggers\n- Need for **epinephrine infusion** or persistent hypotension despite ≥2 IM doses and adequate fluids. citeturn2search24\n- Stridor, voice change, tongue/laryngeal edema, or anticipated **difficult airway**. citeturn2search24\n- Recurrent/worsening symptoms during observation (suspected **biphasic** reaction) or need for prolonged monitoring due to comorbidities (CAD, severe asthma, pregnancy). citeturn2search24\n- Suspected peri‑operative anaphylaxis or high‑risk triggers (e.g., neuromuscular blockers, chlorhexidine) requiring specialty evaluation. citeturn2search7\n\n## Orders to Place Now\n- Order: Epinephrine IM (1 mg/mL) — {dose: 0.3–0.5 mg IM to lateral thigh; frequency: q5–15 min PRN; start now} citeturn2search13\n- Order: Oxygen therapy — {delivery: non‑rebreather; flow: 10–15 L/min; target: SpO₂ ≥94%} citeturn2search24\n- Order: IV crystalloids — {type: lactated Ringer’s or normal saline; bolus: 1–2 L rapid; goal: MAP ≥65 mmHg} citeturn2search7\n- Order: Epinephrine infusion — {start: pump infusion; initial rate: low‑dose titration; goal: MAP ≥65 mmHg; avoid IV bolus} citeturn2search24\n- Order: Glucagon IV — {indication: refractory anaphylaxis on β‑blocker; bolus: 1–5 mg over 5 min; infusion: 5–15 µg/min; monitoring: N/V, glucose} citeturn2search32\n- Order: Serum tryptase — {timing: as soon as feasible within 1–3 h of onset; baseline: 24–48 h after recovery} citeturn2search2\n\n## ABIM‑Style Question 1\n\n### Stem\nA 58‑year‑old inpatient develops generalized urticaria, hoarseness, wheeze, and systolic BP 82 mmHg five minutes after starting IV cefazolin. He is tachycardic and anxious. IV access is in place.\n\n### Options\nA. Administer intramuscular epinephrine 0.5 mg now to the lateral thigh and place the patient supine\nB. Give IV diphenhydramine 50 mg and observe for response\nC. Start methylprednisolone 125 mg IV and obtain a stat tryptase level before any other therapy\nD. Begin norepinephrine infusion and avoid epinephrine due to CAD risk\nE. Intubate now without medications and reassess before giving epinephrine\n\n### Correct answer\nA\n\n### Rationale\n**IM epinephrine is first‑line and should be given immediately** for suspected anaphylaxis with airway and circulatory involvement; positioning and oxygen are concurrent priorities. Antihistamines and corticosteroids are adjuncts only and **must not delay epinephrine**. IV pressors may be needed later if refractory after IM epinephrine and fluids. citeturn2search13turn2search24\n\n## Second ABIM‑Style Case (Pitfall Variant)\n\n### Stem\nA 72‑year‑old with atrial fibrillation on metoprolol develops hypotension (SBP 72 mmHg), diffuse hives, and wheeze after vancomycin. He received two appropriate IM epinephrine doses and 1.5 L isotonic fluid with minimal improvement. He is alert, with persistent bronchospasm.\n\n### Options\nA. Administer an IV epinephrine bolus\nB. Start an epinephrine infusion and add glucagon 1–5 mg IV over 5 min, then 5–15 µg/min\nC. Give methylprednisolone 125 mg IV and observe\nD. Start diphenhydramine 50 mg IV and albuterol; avoid further adrenergics due to β‑blocker\nE. Begin vasopressin infusion and avoid epinephrine due to β‑blocker\n\n### Correct answer\nB\n\n### Rationale\nRefractory anaphylaxis in patients on **β‑blockers** may improve with **glucagon** (bypasses β‑receptors) along with **epinephrine infusion** titrated to MAP goals. Avoid IV epinephrine **bolus** due to dosing error/arrhythmia risk—the pitfall is undertreating epinephrine‑refractory shock without adding glucagon when β‑blockade is present. citeturn2search24turn2search32\n\nWhat changed the decision here?\n\n## Check‑Yourself Micro‑Questions\n- Q: Adult IM epinephrine dose and route for anaphylaxis?  \n  A: **0.3–0.5 mg (1 mg/mL) IM** into the lateral thigh; may repeat every **5–15 min**. citeturn2search13\n- Q: Timing for serum tryptase collection after onset?  \n  A: As soon as feasible **within 1–3 h** of onset, with a **baseline at 24–48 h** to apply the 20% + 2 ng/L rule. citeturn2search2\n- Q: Minimum observation window after severe reaction or need for multiple epinephrine doses?  \n  A: At least **6–12 h** (longer if airway involvement, hypotension, or comorbid risk). citeturn2search24\n- Q: Target MAP for resuscitation in anaphylactic shock?  \n  A: **MAP ≥65 mmHg**. citeturn2search24\n\n## Guidelines & Key References\n- AAAAI/ACAAI Joint Task Force Practice Parameter (2023) — citeturn2search13\n- World Allergy Organization (2020) — citeturn2search7\n- EAACI (2021 update; Allergy 2022) — citeturn2search18\n- Resuscitation Council UK (2021) — citeturn2search24\n- NICE CG134 (updated 2021) — citeturn2search26\n\n## CDI: What to Document Clearly Tonight\n- Anaphylaxis, acute—trigger suspected {drug/food/latex/contrast/unknown}; systems involved {airway, respiratory, cardiovascular, skin/GI}; severity {hypotension present/absent; airway edema present/absent}.\n- Objective evidence: lowest BP/HR, **SpO₂**, wheeze/stridor, edema findings; treatments given (IM epinephrine doses ×{n}, fluids {L}, epinephrine infusion start/stop, adjuncts).\n- Shock due to anaphylaxis (if applicable)—MAP nadir, lactate, total fluids, vasopressor/infusion requirements, response to therapy.\n- Complications/risk: β‑blocker use, asthma/COPD, pregnancy, CAD; monitoring level (telemetry/ICU), observation duration; biphasic symptoms yes/no.\n- Disposition plan: allergy referral, trigger avoidance counseling, auto‑injector education/order, updated allergy list with exact agent and reaction.\n", "toxidromes-overdose-and-arrest-in-poisoning.md": "---\nfilename: toxidromes-overdose-and-arrest-in-poisoning.md\nid: toxidromes-overdose-and-arrest-in-poisoning\ntitle: Toxidromes, Overdose & Arrest in Poisoning\nslug: toxidromes-overdose-and-arrest-in-poisoning\ntags: [toxicology, inpatient, night-float]\nlevel: resident\nestimated_time_min: 15\nversion: 2026-02-21\nsource: IM_NightFloat_Engine\n---\n\n# Toxidromes, Overdose & Arrest in Poisoning\n\n## Panic Card\n- Airway first: assess for hypoventilation; give **oxygen**, prepare for **rapid sequence intubation** if **GCS ≤8** or impending failure; avoid **succinylcholine** if hyperkalemia/rhabdomyolysis suspected.\n- If opioid toxidrome: bag-mask ventilation, then **naloxone** titrated to respirations (e.g., **0.04–0.4 mg IV**, repeat to effect) without delaying **ACLS** if pulseless.\n- Check **finger‑stick glucose**; if low, **dextrose 25–50 g IV**; give **thiamine 100 mg IV** before glucose if malnourished/heavy alcohol use.\n- Seizures or severe agitation (sympathomimetic, isoniazid, theophylline): **benzodiazepines** first‑line; add **pyridoxine 5 g IV** for isoniazid.\n- Wide QRS from sodium‑channel blockade (e.g., TCA, cocaine, diphenhydramine): **sodium bicarbonate 1–2 mEq/kg IV bolus**, target **pH 7.50–7.55** and QRS narrowing.\n- Refractory cardiotoxicity from lipophilic agents (local anesthetics, some CCB/BB): consider **20% lipid emulsion** (**1.5 mL/kg bolus**, then **0.25 mL/kg/min**); escalate vasopressors; **MAP ≥65 mmHg**.\n\n## Brief Overview\n- Night‑float priorities: secure airway/ventilation, identify headline toxidrome (opioid, sympathomimetic, anticholinergic, cholinergic, sedative‑hypnotic, serotonin, sodium‑channel blockade), correct immediately reversible threats, and align with **AHA poisoning ACLS** modifications. **Guideline Must‑Know:** AHA special circumstances emphasize antidotes/support **without interrupting high‑quality CPR/defibrillation**.  \n- **Guideline Must‑Know:** In suspected opioid‑associated emergencies, **CPR + ventilation** takes precedence; give **naloxone ASAP** but **do not delay CPR/AED**. Titrate naloxone to restore breathing to avoid precipitated withdrawal and pulmonary edema.  \n- **Guideline Must‑Know:** For sodium‑channel blockade (e.g., TCA) with **QRS ≥100 ms** or tall **R in aVR**, treat with **IV sodium bicarbonate** boluses and alkalinization (**pH 7.50–7.55**); avoid class Ia/III antiarrhythmics; use **lidocaine** if ventricular arrhythmias persist.  \n- **Guideline Must‑Know:** Severe **CCB/BB** overdose with cardiogenic shock warrants **high‑dose insulin euglycemia therapy (HIET)** early: typical start **1 U/kg regular insulin IV bolus**, then **0.5–1 U/kg/h** infusion with dextrose/electrolyte protocol; add calcium (for CCB), vasopressors, and consider **ECMO**.  \n- **Guideline Must‑Know:** **Lipid emulsion** is reasonable for **local anesthetic systemic toxicity** and may be considered when **lipophilic xenobiotic toxicity** causes refractory instability despite standard care; monitor for pancreatitis and lab interference.  \n- **Guideline Must‑Know:** **Activated charcoal** (single dose **50–100 g** adult) is **not routine**; consider within **≤1 h** of a potentially toxic ingestion if the **airway is protected**; beyond 1 h consider only if ongoing absorption (e.g., sustained‑release).  \n- **Guideline Must‑Know:** **Whole bowel irrigation** (PEG‑ELS **1.5–2 L/h** adult) is a niche option for **sustained‑release/enteric‑coated** drugs, **iron**, or **body packers** when the airway is protected and no ileus/obstruction.  \n- In **acetaminophen** ingestion, draw levels at **≥4 h** post-ingestion; start **N‑acetylcysteine** promptly when indicated and continue per stopping criteria; high‑risk “massive” ingestions may need modified protocols and adjuncts (e.g., fomepizole in select expert‑guided cases).  \n- Cardiac arrest in poisoning: **ACLS core** plus **poison‑specific actions** (e.g., bicarb for sodium‑blockers, **calcium** for CCB, **glucagon** optional for BB, **lipid** for LAST). Consider **ECPR/ECMO** early for reversible, toxin‑mediated collapse if available.  \n- **Confirm Before Proceed:** **Physostigmine** can rapidly reverse isolated central anticholinergic delirium but is **contraindicated** if **QRS ≥100 ms**, **AV/intraventricular block**, **TCA co‑ingestion**, or seizures; if used, give **0.5–1 mg IV over ≥5 min**, with **atropine at bedside**.  \n- **Confirm Before Proceed:** **Flumazenil** is generally **avoided** in undifferentiated overdose due to **seizure risk** (mixed overdoses, BZD dependence, co‑ingested pro‑convulsants). Reserve for iatrogenic isolated benzodiazepine sedation in low‑risk settings.  \n- Sympathomimetic toxicity (cocaine/meth): prioritize **aggressive benzodiazepine sedation**, **active cooling** if **T >40–41°C**, IV fluids for rhabdomyolysis; avoid pure **beta‑blockers** for hypertension/tachycardia; use **nitroglycerin**/**phentolamine** as needed.  \n- For **organophosphates/carbamates** (cholinergic toxidrome): **atropine** titrated to **dry lungs** (start **1–2 m
